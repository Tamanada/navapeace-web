<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @font-face {
      font-family: 'Nasalization';
      src: url('nasalization.woff') format('woff');
    }
    body {
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    h3 {
      color: rgba(255,255,255,0.6);
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── PEACE BUTTON ── */
    .peace-btn {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: transparent;
      font-family: 'Nasalization', Arial, sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transition: transform 0.15s;
      outline: none;
    }

    .peace-btn .btn-logo {
      width: 180px;
      height: 180px;
      object-fit: contain;
      pointer-events: none;
      opacity: 1;
      position: absolute;
    }

    .btn-hint {
      position: absolute;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0,80,140,0.7);
      text-align: center;
      line-height: 2.1;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 2;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    .peace-btn::before,
    .peace-btn::after {
      content: '';
      position: absolute;
      inset: 50%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      animation: ring-pulse 2.5s ease-out infinite;
    }
    .peace-btn::after { animation-delay: 1.25s; }

    @keyframes ring-pulse {
      0%   { inset: 50%;    opacity: 0.85; }
      100% { inset: -55px;  opacity: 0; }
    }

    .peace-btn:hover { transform: scale(1.04); }
    .peace-btn:active { transform: scale(0.97); }

    /* DONE STATE (aperçu) */
    .peace-btn.done {
      background: rgba(255,255,255,0.25);
      width: 180px; height: 180px;
    }
    .peace-btn.done::before,
    .peace-btn.done::after { display: none; }

  </style>
</head>
<body>

  <h3>État : Pas encore voté</h3>

  <button class="peace-btn">
    <img src="dove-btn.png" class="btn-logo" />
    <span class="btn-hint">PRESS<br>TO CHOOSE<br>PEACE</span>
  </button>

  <h3>État : Déjà voté (aperçu)</h3>

  <button class="peace-btn done" disabled>
    <img src="logo.png" style="width:60px;height:60px;opacity:0.2;position:absolute;" />
    <span style="font-family:'Nasalization',Arial,sans-serif;font-size:11px;color:#1A5F82;text-align:center;letter-spacing:2px;line-height:1.8;z-index:2;position:absolute;">NEXT ACTION IN<br><strong style="font-size:20px;">10:32:43</strong><br>TAP TO SEE<br>THE MAP</span>
  </button>

</body>
</html>
