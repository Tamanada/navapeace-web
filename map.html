  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 0;
      color: #fff;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 18px;
    }

    .header img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 3px 10px rgba(255,255,255,0.4));
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 7px;
      text-shadow: 0 1px 16px rgba(255,255,255,0.4);
    }

    .header .tagline {
      font-size: 20px;
      letter-spacing: 3.5px;
      color: #FFFFFF;
      opacity: 1;
      margin-top: 4px;
      text-align: center;
      width: 100%;
      line-height: 1.55;
      text-wrap: balance;
    }

    /* ── COUNTER STRIP ── */
    .counter-strip {
      display: flex;
      gap: 28px;
      margin-bottom: 16px;
      flex-wrap: nowrap;
      justify-content: center;
      align-items: center;
    }

    .counter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 100px;   /* prevent neighbours shifting when number grows */
      flex-shrink: 0;
    }

    .counter-item .num {
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums; /* equal-width digits → no jitter */
      white-space: nowrap;                /* never wraps mid-number */
    }

    .counter-item .lbl {
      font-size: 13px;
      letter-spacing: 2.5px;
      color: #F0EDE4;
      opacity: 0.7;
      text-transform: uppercase;
      margin-top: 2px;
      text-align: center;
    }

    .counter-sep {
      width: 1px;
      background: rgba(255,255,255,0.3);
      height: 60px;
      align-self: center;
    }

    /* ── MOBILE : grille 2×2 ── */
    @media (max-width: 540px) {
      .counter-strip {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px 28px;
        margin-bottom: 14px;
        justify-items: center;
        align-items: center;
      }
      .counter-sep { display: none; }
      .counter-item { min-width: 0; width: 100%; }
      .counter-item .num { font-size: 34px; }
      #cnt-timer { font-size: 18px !important; letter-spacing: 1px !important; }
      .counter-item .lbl { font-size: 12px; letter-spacing: 1.5px; }
      /* DOVES — pleine largeur sur mobile */
      #cnt-doves-item {
        grid-column: 1 / -1;
        border-top: 1px solid rgba(255,255,255,0.12);
        padding-top: 14px;
        margin-top: 4px;
      }
      #cnt-doves-item .num { font-size: 38px; }
      /* DAYS+TIMER — pleine largeur aussi */
      #cnt-doves-item ~ .counter-sep { display: none; }
      .counter-item:last-child { grid-column: 1 / -1; border-top: 1px solid rgba(255,255,255,0.12); padding-top: 14px; margin-top: 4px; }
      .personal-strip { font-size: 13px; letter-spacing: 1.5px; }
    }

    /* ── MAP CARD ── */
    .map-card {
      width: 100%;
      max-width: 900px;
      background: rgba(247,247,241,0.12);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(20,80,130,0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    #chartdiv {
      width: 100%;
      height: 420px;
    }

    /* ── SOCIALS ── */
    .socials-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 22px 0 28px;
      margin-top: auto;
    }

    .socials-icons {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 32px;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      transition: color 0.2s, transform 0.2s;
    }

    .social-link:hover {
      color: #fff;
      transform: translateY(-3px);
    }

    .social-link svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .social-link span {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .social-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.25);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(20, 90, 140, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 10px 0 24px;
      z-index: 200;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: rgba(255,255,255,0.45);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-item.active { color: #fff; }
    .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

    /* add bottom padding so content doesn't hide behind nav */
    body { padding-bottom: 90px; }

    /* ── TOOLTIP POPOVER ── */
    .info-trigger {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .info-trigger .lbl {
      border-bottom: 1px dashed rgba(255,255,255,0.35);
      padding-bottom: 1px;
    }

    .popover-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(10,50,90,0.35);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeOverlay 0.2s ease both;
    }

    .popover-overlay.open { display: flex; }

    @keyframes fadeOverlay {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .popover-box {
      background: rgba(30,100,160,0.88);
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 22px;
      padding: 28px 28px 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 50px rgba(10,40,100,0.5);
      animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .popover-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }

    .popover-title {
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .popover-num {
      font-size: 52px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 24px rgba(255,255,255,0.5);
      margin-bottom: 16px;
      display: block;
    }

    .popover-text {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.8);
      line-height: 1.9;
      text-transform: uppercase;
    }

    .popover-close {
      display: block;
      margin: 20px auto 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      color: rgba(255,255,255,0.75);
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .popover-close:hover { background: rgba(255,255,255,0.25); }

    /* ── PEACE MESSAGES FEED ── */
    .messages-section {
      width: 100%;
      max-width: 900px;
      margin: 20px 0 0;
      padding: 0 0 8px;
    }
    .messages-title {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-bottom: 14px;
    }
    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 340px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .messages-list::-webkit-scrollbar { display: none; }
    .msg-card {
      background: rgba(247,247,241,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 13px 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: msgFadeIn 0.3s ease both;
    }
    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .msg-pseudo {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      flex: 1;
    }
    .msg-date {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
    }
    .msg-text {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.88);
      line-height: 1.7;
      font-family: 'Nasalization', Arial, sans-serif;
    }
    .msgs-no-data {
      text-align: center;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      padding: 10px 0;
    }

    /* ── PERSONAL STREAK ── */
    .personal-strip {
      font-size: 14px;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      margin-top: -8px;
      margin-bottom: 14px;
      text-align: center;
    }

    .personal-strip span {
      color: #fff;
      font-size: 20px;
      font-weight: 400;
    }
  </style>
</head>

  <script>
  // ── Coordonnées approximatives par pays ─────────────────────────
  const COUNTRY_COORDS = {
    "Afghanistan":{lat:33.9,lon:67.7},"Albania":{lat:41.2,lon:20.2},"Algeria":{lat:28.0,lon:1.7},

  // ── Chronomètre depuis le lancement ─────────────────────────────
  function initTimer() {
    const LAUNCH = new Date('2026-03-06T00:00:00Z');
    function tick() {
      const diff = Math.max(0, Date.now() - LAUNCH.getTime());
      const days = Math.floor(diff / 86400000);
      const h    = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
      const m    = Math.floor((diff % 3600000)  / 60000).toString().padStart(2,'0');
      const s    = Math.floor((diff % 60000)    / 1000).toString().padStart(2,'0');
      document.getElementById('cnt-days').textContent  = days;
      document.getElementById('cnt-timer').textContent = `${h}:${m}:${s}`;
    }
    tick();
    setInterval(tick, 1000);
  }

  // ── Initialisation Supabase & chargement des données ────────────
  async function loadPeaceData() {
    const isConfigured = SUPABASE_URL && !SUPABASE_URL.includes('XXXXXXX');

    if (isConfigured) {
      try {
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Tous les votes
        const { data, error } = await sb
          .from('peace_votes')
          .select('country, created_at, referred_by')
          .not('country', 'is', null);

        if (error) throw error;

        // Votes d'aujourd'hui
        const todayStr = new Date().toISOString().split('T')[0];
        const todayCount = data.filter(r => r.created_at && r.created_at.startsWith(todayStr)).length;
        document.getElementById('cnt-today').textContent = '+' + todayCount.toLocaleString('fr-FR');

        // Total doves = daily actions + referral bonus doves
        const dailyDoves    = data.length;
        const referralDoves = data.filter(r => r.referred_by).length;
        const totalDoves    = dailyDoves + referralDoves;
        document.getElementById('cnt-doves').textContent = totalDoves.toLocaleString('fr-FR');

        // Agréger par pays
        const counts = {};
        data.forEach(r => { counts[r.country] = (counts[r.country] || 0) + 1; });

        const rows = Object.entries(counts).map(([country, count]) => {
          const coords = COUNTRY_COORDS[country] || {lat:0,lon:0};
          return { country, user_count: count, lat: coords.lat, lng: coords.lon };
        }).filter(r => r.lat !== 0);

        return rows.length > 0 ? rows : MOCK_DATA;
      } catch(e) {
        console.warn('Supabase non disponible, données mock utilisées.', e);
        return MOCK_DATA;
      }
    }
    return MOCK_DATA;
  }

  // ── Rendu amCharts 5 ────────────────────────────────────────────
  async function initMap() {
    const peaceData = await loadPeaceData();

    // Mettre à jour les compteurs
    const total = peaceData.reduce((s, r) => s + r.user_count, 0);
    document.getElementById('cnt-people').textContent = total.toLocaleString('fr-FR');
    document.getElementById('cnt-countries').textContent = peaceData.length;
    // Fallback doves si Supabase non configuré (données mock)
    if (document.getElementById('cnt-doves').textContent === '—') {
      document.getElementById('cnt-doves').textContent = total.toLocaleString('fr-FR');
    }

    const root = am5.Root.new("chartdiv");
    root.setThemes([am5themes_Animated.new(root)]);

    const chart = root.container.children.push(
      am5map.MapChart.new(root, {
        projection: am5map.geoNaturalEarth1(),
        panX: "translateX",
        panY: "translateY",
        wheelY: "zoom"
      })
    );

    // Pays polygons
    const polygonSeries = chart.series.push(
      am5map.MapPolygonSeries.new(root, {
        geoJSON: am5geodata_worldLow,
        exclude: ["AQ"]
      })
    );
    polygonSeries.mapPolygons.template.setAll({
      fill: am5.color(0xFFFFFF),
      fillOpacity: 0.18,
      stroke: am5.color(0xFFFFFF),
      strokeOpacity: 0.35,
      strokeWidth: 0.6,
      tooltipText: "{name}",
      interactive: true
    });
    polygonSeries.mapPolygons.template.states.create("hover", {
      fillOpacity: 0.38,
      fill: am5.color(0xF0EDE4)
    });

    // Bulles pulsantes
    const maxVal = Math.max(...peaceData.map(d => d.user_count));
    const bubbleSeries = chart.series.push(
      am5map.MapPointSeries.new(root, {
        latitudeField: "lat",
        longitudeField: "lng"
      })
    );

    bubbleSeries.bullets.push((root, series, dataItem) => {
      const d = dataItem.dataContext;
      const radius = 5 + ((d.user_count / maxVal) * 17);
      const container = am5.Container.new(root, {});

      const pulse = container.children.push(am5.Circle.new(root, {
        radius: radius + 4, fill: am5.color(0xFFFFFF), fillOpacity: 0,
        stroke: am5.color(0xFFFFFF), strokeOpacity: 0.6, strokeWidth: 1.5
      }));
      pulse.animate({ key:"radius", from:radius+2, to:radius+14, duration:1800, loops:Infinity, easing:am5.ease.out(am5.ease.cubic) });
      pulse.animate({ key:"strokeOpacity", from:0.6, to:0, duration:1800, loops:Infinity, easing:am5.ease.out(am5.ease.cubic) });

      container.children.push(am5.Circle.new(root, {
        radius,
        fill: am5.color(0xFFFFFF), fillOpacity: 0.85,
        stroke: am5.color(0xF0EDE4), strokeWidth: 1.5,
        tooltipText: `[bold]{country}[/]\n{user_count} voices`,
        cursorOverStyle: "pointer"
      }));

      return am5.Bullet.new(root, { sprite: container });
    });

    bubbleSeries.data.setAll(peaceData);

  const POPOVER_DATA = {

      numId: 'cnt-people',
      buildContent: (num) => {
        const WORLD   = 8_200_000_000;
        const count   = parseInt((num || '').replace(/[^\d]/g, '')) || 0;
        const ROWS    = 10, COLS = 22, TOTAL = ROWS * COLS; // 220 dots
        const perDot  = WORLD / TOTAL;
        const litDots = count > 0 ? Math.max(1, Math.round(count / perDot)) : 0;
        const perDotM = Math.round(perDot / 1_000_000);

        // SVG glow filter + dots
        let dotsSvg = `
          <defs>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2.5" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>`;
        for (let i = 0; i < TOTAL; i++) {
          const col = i % COLS;
          const row = Math.floor(i / COLS);
          const cx  = 6 + col * 11;
          const cy  = 6 + row * 11;
          const lit = i < litDots;
          dotsSvg += `<circle cx="${cx}" cy="${cy}" r="${lit ? 4.5 : 3.5}"
            fill="${lit ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.1)'}"
            ${lit ? 'filter="url(#glow)"' : ''}/>`;
        }

        return `
          <div style="margin:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:8px;">
            <svg viewBox="0 0 248 116" width="248" height="116" style="display:block;overflow:visible;">

    document.getElementById('popoverOverlay').classList.add('open');
  }

  function closePopover(e) {
    if (!e || e.target === document.getElementById('popoverOverlay')) {
      document.getElementById('popoverOverlay').classList.remove('open');
    }
  }

  // ── PEACE MESSAGES FEED ──────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function loadPeaceMessages() {
    const list    = document.getElementById('messages-list');
    const loading = document.getElementById('msgs-loading');
    try {
      const isConfigured = SUPABASE_URL && !SUPABASE_URL.includes('XXXXXXX');
      if (!isConfigured) { list.innerHTML = ''; return; }

      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data, error } = await sb
        .from('peace_messages')
        .select('pseudo, message, updated_at')
        .eq('share_msg', true)
        .not('message', 'is', null)
        .neq('message', '')
        .order('updated_at', { ascending: false })
        .limit(20);

      if (error) throw error;

      if (!data || data.length === 0) {
        list.innerHTML = `<p class="msgs-no-data">${t('no_msgs_yet')}</p>`;
        return;
      }

      list.innerHTML = data.map((m, i) => {
        const d       = new Date(m.updated_at);
        const dateStr = d.toLocaleDateString([], { day: '2-digit', month: 'short', year: '2-digit' });
        return `<div class="msg-card" style="animation-delay:${i * 0.05}s">
          <div class="msg-header">
            <span class="msg-pseudo">🕊 ${escapeHtml(m.pseudo)}</span>
            <span class="msg-date">${dateStr}</span>
          </div>
          <p class="msg-text">${escapeHtml(m.message)}</p>
        </div>`;
      }).join('');
    } catch(e) {
      console.warn('Peace messages load error', e);
      if (loading) loading.remove();
    }
  }

  loadPeaceMessages();
  </script>

</body>
