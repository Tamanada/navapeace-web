    .counter-strip {

    }

    .counter-item {

      flex-direction: column;
      align-items: center;

      font-weight: 400;
      letter-spacing: 2px;

    }

      letter-spacing: 2px;
      color: #F0EDE4;
      opacity: 0.7;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .counter-sep {
      width: 1px;
      background: rgba(255,255,255,0.3);
      height: 40px;
      align-self: center;
    }

    /* ── MOBILE : grille 2×2 ── */
    @media (max-width: 540px) {
      .counter-strip {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px 24px;
        margin-bottom: 14px;
      }
      .counter-sep { display: none; }

      .counter-item .lbl { font-size: 8px; letter-spacing: 1.5px; }

      height: 420px;
    }

  // ── Chronomètre depuis le lancement ─────────────────────────────
  function initTimer() {
    const LAUNCH = new Date('2026-03-06T00:00:00Z');
    function tick() {
      const diff = Math.max(0, Date.now() - LAUNCH.getTime());
      const days = Math.floor(diff / 86400000);
      const h    = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
      const m    = Math.floor((diff % 3600000)  / 60000).toString().padStart(2,'0');
      const s    = Math.floor((diff % 60000)    / 1000).toString().padStart(2,'0');
      document.getElementById('cnt-timer').textContent = `${days}D ${h}:${m}:${s}`;
    }
    tick();
    setInterval(tick, 1000);
  }

  // ── Initialisation Supabase & chargement des données ────────────
  async function loadPeaceData() {
    const isConfigured = SUPABASE_URL && !SUPABASE_URL.includes('XXXXXXX');

    if (isConfigured) {
      try {
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Tous les votes
        const { data, error } = await sb
          .from('peace_votes')
          .select('country, created_at')
          .not('country', 'is', null);

        if (error) throw error;

        // Votes d'aujourd'hui
        const todayStr = new Date().toISOString().split('T')[0];
        const todayCount = data.filter(r => r.created_at && r.created_at.startsWith(todayStr)).length;
        document.getElementById('cnt-today').textContent = '+' + todayCount.toLocaleString('fr-FR');

        // Agréger par pays
        const counts = {};
        data.forEach(r => { counts[r.country] = (counts[r.country] || 0) + 1; });

        const rows = Object.entries(counts).map(([country, count]) => {
          const coords = COUNTRY_COORDS[country] || {lat:0,lon:0};
          return { country, user_count: count, lat: coords.lat, lng: coords.lon };
        }).filter(r => r.lat !== 0);

        return rows.length > 0 ? rows : MOCK_DATA;
      } catch(e) {
        console.warn('Supabase non disponible, données mock utilisées.', e);
        return MOCK_DATA;
      }
    }
    return MOCK_DATA;
  }

  // ── Rendu amCharts 5 ────────────────────────────────────────────
  async function initMap() {
    const peaceData = await loadPeaceData();

    // Mettre à jour les compteurs
    const total = peaceData.reduce((s, r) => s + r.user_count, 0);
    document.getElementById('cnt-people').textContent = total.toLocaleString('fr-FR');
    document.getElementById('cnt-countries').textContent = peaceData.length;

    const root = am5.Root.new("chartdiv");
    root.setThemes([am5themes_Animated.new(root)]);

    const chart = root.container.children.push(
      am5map.MapChart.new(root, {
        projection: am5map.geoNaturalEarth1(),
        panX: "translateX",
        panY: "translateY",
        wheelY: "zoom"
      })
    );

    // Pays polygons
    const polygonSeries = chart.series.push(
      am5map.MapPolygonSeries.new(root, {
        geoJSON: am5geodata_worldLow,
        exclude: ["AQ"]
      })
    );
    polygonSeries.mapPolygons.template.setAll({
      fill: am5.color(0xFFFFFF),
      fillOpacity: 0.18,
      stroke: am5.color(0xFFFFFF),
      strokeOpacity: 0.35,
      strokeWidth: 0.6,
      tooltipText: "{name}",
      interactive: true
    });
    polygonSeries.mapPolygons.template.states.create("hover", {
      fillOpacity: 0.38,
      fill: am5.color(0xF0EDE4)
    });

    // Bulles pulsantes
    const maxVal = Math.max(...peaceData.map(d => d.user_count));
    const bubbleSeries = chart.series.push(
      am5map.MapPointSeries.new(root, {
        latitudeField: "lat",
        longitudeField: "lng"
      })
    );

    bubbleSeries.bullets.push((root, series, dataItem) => {
      const d = dataItem.dataContext;
      const radius = 5 + ((d.user_count / maxVal) * 17);
      const container = am5.Container.new(root, {});

      const pulse = container.children.push(am5.Circle.new(root, {
        radius: radius + 4, fill: am5.color(0xFFFFFF), fillOpacity: 0,
        stroke: am5.color(0xFFFFFF), strokeOpacity: 0.6, strokeWidth: 1.5
      }));
      pulse.animate({ key:"radius", from:radius+2, to:radius+14, duration:1800, loops:Infinity, easing:am5.ease.out(am5.ease.cubic) });
      pulse.animate({ key:"strokeOpacity", from:0.6, to:0, duration:1800, loops:Infinity, easing:am5.ease.out(am5.ease.cubic) });

      container.children.push(am5.Circle.new(root, {
        radius,
        fill: am5.color(0xFFFFFF), fillOpacity: 0.85,
        stroke: am5.color(0xF0EDE4), strokeWidth: 1.5,
        tooltipText: `[bold]{country}[/]\n{user_count} voices`,
        cursorOverStyle: "pointer"
      }));

      return am5.Bullet.new(root, { sprite: container });
    });

    bubbleSeries.data.setAll(peaceData);

    // ── Mots PAIX dans les océans ────────────────────────────────
    // [word, lat, lng, connectLat, connectLng]
    // Positionnés dans les zones océaniques, reliés au pays proche
    const OCEAN_WORDS = [
      // Océan Atlantique Nord
      { word: "PAIX",       lat: 44,   lng: -42,  cLat: 46.2,  cLng: 2.2   }, // Français → France
      { word: "Frieden",    lat: 64,   lng: -26,  cLat: 51.2,  cLng: 10.4  }, // Allemand → Allemagne
      { word: "Vrede",      lat: 56,   lng: -18,  cLat: 52.1,  cLng: 5.3   }, // Néerlandais → Pays-Bas
      // Océan Atlantique Sud
      { word: "PAZ",        lat: 6,    lng: -30,  cLat: 4.6,   cLng: -74.3 }, // Espagnol → Colombie
      { word: "Paz",        lat: -32,  lng: -22,  cLat: -14.2, cLng: -51.9 }, // Portugais → Brésil
      // Océan Pacifique Nord
      { word: "PEACE",      lat: 24,   lng: -148, cLat: 37.1,  cLng: -95.7 }, // Anglais → USA
      { word: "평화",        lat: 42,   lng: 158,  cLat: 35.9,  cLng: 127.8 }, // Coréen → Corée du Sud
      { word: "平和",        lat: 28,   lng: 165,  cLat: 36.2,  cLng: 138.3 }, // Japonais → Japon
      // Océan Pacifique Sud
      { word: "和平",        lat: -8,   lng: 170,  cLat: 35.9,  cLng: 104.2 }, // Chinois → Chine
      { word: "Damai",      lat: -18,  lng: 148,  cLat: -0.8,  cLng: 113.9 }, // Indonésien → Indonésie
      // Océan Indien
      { word: "سلام",        lat: -14,  lng: 68,   cLat: 23.9,  cLng: 45.1  }, // Arabe → Arabie Saoudite
      { word: "शांति",       lat: -28,  lng: 80,   cLat: 20.6,  cLng: 78.9  }, // Hindi → Inde
      { word: "Amani",      lat: -38,  lng: 58,   cLat: -0.0,  cLng: 37.9  }, // Swahili → Kenya
      // Océan Arctique
      { word: "Мир",        lat: 79,   lng: 38,   cLat: 61.5,  cLng: 105.3 }, // Russe → Russie
      // Méditerranée / Mer Rouge
      { word: "Pace",       lat: 34,   lng: 14,   cLat: 41.9,  cLng: 12.6  }, // Italien → Italie
      { word: "שָׁלוֹם",     lat: 26,   lng: 36,   cLat: 31.0,  cLng: 34.9  }, // Hébreu → Israël
    ];

    // Série de lignes pointillées
    const lineSeries = chart.series.push(am5map.MapLineSeries.new(root, {}));
    lineSeries.mapLines.template.setAll({
      stroke: am5.color(0xFFFFFF),
      strokeOpacity: 0.22,
      strokeWidth: 0.8,
      strokeDasharray: [4, 6]
    });

    // Série de textes dans les océans
    const wordSeries = chart.series.push(
      am5map.MapPointSeries.new(root, {
        latitudeField: "lat",
        longitudeField: "lng"
      })
    );

    wordSeries.bullets.push((root, series, dataItem) => {
      const d = dataItem.dataContext;
      const container = am5.Container.new(root, {});

      // Halo derrière le texte
      container.children.push(am5.Label.new(root, {
        text: d.word,
        fill: am5.color(0xFFFFFF),
        fillOpacity: 0.06,
        fontSize: 13,
        fontFamily: "'Nasalization', Arial, sans-serif",
        fontWeight: "400",
        letterSpacing: 3,
        textAlign: "center",
        centerX: am5.percent(50),
        centerY: am5.percent(50),
        dx: 1, dy: 1,
        blur: 8
      }));

      // Texte principal
      container.children.push(am5.Label.new(root, {
        text: d.word,
        fill: am5.color(0xFFFFFF),
        fillOpacity: 0.45,
        fontSize: 13,
        fontFamily: "'Nasalization', Arial, sans-serif",
        fontWeight: "400",
        letterSpacing: 3,
        textAlign: "center",
        centerX: am5.percent(50),
        centerY: am5.percent(50),
      }));

      return am5.Bullet.new(root, { sprite: container });
    });

    // Ajouter les mots et leurs lignes de connexion
    const wordData = [];
    OCEAN_WORDS.forEach(w => {
      wordData.push({ lat: w.lat, lng: w.lng, word: w.word });

      lineSeries.data.push({
        geometry: {
          type: "LineString",
          coordinates: [
            [w.lng,  w.lat],
            [w.cLng, w.cLat]
          ]
        }
      });
    });

    wordSeries.data.setAll(wordData);
  }

  // ── Affichage du compteur de jours personnels ────────────────────
  (function() {
    const days = parseInt(localStorage.getItem('nava_peace_days') || '0', 10);
    if (days > 0) {
      document.getElementById('personal-days').textContent = days;
      document.getElementById('personal-strip').style.display = 'block';
    }
  })();

  initTimer();
  initMap();
  </script>

</body>
</html>
