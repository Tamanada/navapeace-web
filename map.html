  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 0;
      color: #fff;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      text-align: center;
      margin-bottom: 16px;
    }

    .header img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      filter: drop-shadow(0 3px 10px rgba(255,255,255,0.4));
      margin-bottom: 6px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 7px;
      padding-left: 7px;
      text-align: center;
      text-shadow: 0 1px 16px rgba(255,255,255,0.4);
    }

    .header .tagline {
      font-size: 20px;
      letter-spacing: 3.5px;
      color: #FFFFFF;
      opacity: 1;
      margin-top: 4px;
      text-align: center;
      width: 100%;
      line-height: 1.55;
      text-wrap: balance;
    }

    /* ── COUNTER STRIP ── */
    .counter-strip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-bottom: 16px;
      width: 100%;
    }

    /* Ligne 1 : PEACE LOVERS · COUNTRIES · TODAY */
    .counter-row-top,
    .counter-row-bottom {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      width: 100%;
    }

    /* Ligne 2 : DOVES · DAYS — séparateur au-dessus */
    .counter-row-bottom {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.18);
    }

    .counter-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 100px;
      flex-shrink: 0;
    }

    .counter-item .num {
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .counter-item .lbl {
      font-size: 13px;
      letter-spacing: 2.5px;
      color: #F0EDE4;
      opacity: 0.7;
      text-transform: uppercase;
      margin-top: 2px;
      text-align: center;
    }

    .counter-sep {
      width: 1px;
      background: rgba(255,255,255,0.3);
      height: 60px;
      align-self: center;
    }

    /* ── DAYS : 2 lignes centrées ── */
    .launch-line {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 8px;
    }

    /* ── MOBILE : grille 2×2 ── */
    @media (max-width: 540px) {
      /* Les row-divs deviennent transparents → leurs enfants rejoignent la grille parente */
      .counter-strip {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px 28px;
        margin-bottom: 14px;
        justify-items: center;
        align-items: start;
      }
      .counter-row-top,
      .counter-row-bottom {
        display: contents;
      }
      .counter-sep { display: none; }
      .counter-item { min-width: 0; width: 100%; }
      .counter-item .num { font-size: 34px; }
      #cnt-timer { font-size: 18px !important; letter-spacing: 1px !important; }
      #cnt-days  { font-size: 28px !important; letter-spacing: 1px !important; }
      .counter-item .lbl { font-size: 12px; letter-spacing: 1.5px; }
      /* DAYS — pleine largeur, centré, séparateur */
      #cnt-launch-item {
        grid-column: 1 / -1;
        border-top: 1px solid rgba(255,255,255,0.12);
        padding-top: 14px;
        margin-top: 4px;
        align-items: center;
      }
      .personal-strip { font-size: 13px; letter-spacing: 1.5px; }
    }

    /* ── MAP CARD ── */
    .map-card {
      width: 100%;
      max-width: 900px;
      background: rgba(247,247,241,0.12);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(20,80,130,0.2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      flex-shrink: 0;
    }

    #chartdiv {
      width: 100%;
      height: 235px;
    }

    /* ── SOCIALS ── */
    .socials-bar {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 22px 0 28px;
      margin-top: auto;
    }

    .socials-icons {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 32px;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: rgba(255,255,255,0.75);
      transition: color 0.2s, transform 0.2s;
    }

    .social-link:hover {
      color: #fff;
      transform: translateY(-3px);
    }

    .social-link svg {
      width: 26px;
      height: 26px;
      fill: currentColor;
    }

    .social-link span {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .social-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.25);
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(20, 90, 140, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 10px 0 24px;
      z-index: 200;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: rgba(255,255,255,0.45);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-item.active { color: #fff; }
    .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

    /* add bottom padding so content doesn't hide behind nav */
    body { padding-bottom: 90px; }

    /* ── TOOLTIP POPOVER ── */
    .info-trigger {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .info-trigger .lbl {
      border-bottom: 1px dashed rgba(255,255,255,0.35);
      padding-bottom: 1px;
    }

    .popover-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(10,50,90,0.35);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeOverlay 0.2s ease both;
    }

    .popover-overlay.open { display: flex; }

    @keyframes fadeOverlay {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .popover-box {
      background: rgba(30,100,160,0.88);
      border: 1.5px solid rgba(255,255,255,0.45);
      border-radius: 22px;
      padding: 28px 28px 24px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 50px rgba(10,40,100,0.5);
      animation: popIn 0.25s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .popover-icon {
      font-size: 36px;
      margin-bottom: 12px;
      display: block;
    }

    .popover-title {
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .popover-num {
      font-size: 52px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 24px rgba(255,255,255,0.5);
      margin-bottom: 16px;
      display: block;
    }

    .popover-text {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.8);
      line-height: 1.9;
      text-transform: uppercase;
    }

    .popover-close {
      display: block;
      margin: 20px auto 0;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      color: rgba(255,255,255,0.75);
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 8px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .popover-close:hover { background: rgba(255,255,255,0.25); }

    /* ── PEACE MESSAGES FEED ── */
    .messages-section {
      width: 100%;
      max-width: 900px;
      margin: 20px 0 0;
      padding: 0 0 8px;
    }
    .messages-title {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-bottom: 14px;
    }
    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 340px;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .messages-list::-webkit-scrollbar { display: none; }
    .msg-card {
      background: rgba(247,247,241,0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 13px 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: msgFadeIn 0.3s ease both;
    }
    @keyframes msgFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .msg-pseudo {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      flex: 1;
    }
    .msg-date {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
    }
    .msg-text {
      font-size: 13px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.88);
      line-height: 1.7;
      font-family: 'Nasalization', Arial, sans-serif;
    }
    .msgs-no-data {
      text-align: center;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      padding: 10px 0;
    }

    /* ── PERSONAL STREAK ── */
    .personal-strip {
      font-size: 14px;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
      margin-top: -8px;
      margin-bottom: 14px;
      text-align: center;
    }

    .personal-strip span {
      color: #fff;
      font-size: 20px;
      font-weight: 400;
    }

    .launch-inline {
      font-size: 11px;
      letter-spacing: 2.5px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-top: 8px;
      white-space: nowrap;
    }
    .launch-inline span {
      color: #fff;
      font-size: 18px;
      font-weight: 700;
    }

    /* Share overlay */
    #share-overlay.open { display: block !important; }
    #share-overlay-close {
      position: fixed;
      top: 14px;
      right: 16px;
      z-index: 600;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      width: 36px; height: 36px;
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    #share-overlay-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 56px 16px 40px;
    }
    .share-story-frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .share-story-box {
      position: relative;
      height: min(72vh, 570px);
      aspect-ratio: 9 / 16;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15),
                  0 0 0 6px rgba(255,255,255,0.05),
                  0 20px 56px rgba(0,0,0,0.55);
    }
    #share-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .share-res-badge {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
    }
    .share-buttons-panel {
      width: min(100%, 420px);
    }
    .share-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .share-grid-btn {
      padding: 16px 10px;
      border-radius: 14px;
      color: #fff;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      line-height: 1.3;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <a href="https://www.nava-peace.world" target="_blank" style="text-decoration:none;color:inherit;display:contents;" onclick="if(typeof NAVA_TG!=='undefined'&&NAVA_TG.isTelegram){event.preventDefault();Telegram.WebApp.openLink('https://www.nava-peace.world');}">
    <img src="logo.png" alt="NAVA PEACE" />
    <h1>NAVA PEACE</h1>
    </a>
    <p class="tagline" data-i18n="tagline">TODAY HUMANITY CHOOSE PEACE</p>
    <!-- DAYS inline under tagline -->
    <p class="launch-inline">
      <span id="cnt-days">0</span> DAYS &nbsp;·&nbsp; <span id="cnt-timer">00:00:00</span> SINCE LAUNCH
    </p>
  </div>

  <!-- COUNTER -->
  <div class="counter-strip">

    <!-- PEACE LOVERS · COUNTRIES · TODAY -->
    <div class="counter-row-top">
      <div class="counter-item info-trigger" onclick="openPopover('people')">
        <span class="num" id="cnt-people">—</span>
        <span class="lbl" data-i18n="lbl_peace_lovers">PEACE LOVERS</span>
      </div>
      <div class="counter-sep"></div>
      <div class="counter-item info-trigger" onclick="openPopover('countries')">
        <span class="num" id="cnt-countries">—</span>
        <span class="lbl" style="font-size:10px;letter-spacing:1.5px;" data-i18n="lbl_countries">COUNTRIES REPRESENTED</span>
      </div>
      <div class="counter-sep"></div>
      <div class="counter-item info-trigger" onclick="openPopover('today')">
        <span class="num" id="cnt-today">—</span>
        <span class="lbl" data-i18n="lbl_today_map">GLOBAL ACTIONS TODAY</span>
      </div>
    </div>

    <!-- 🕊 TOTAL DOVES (seul sur la ligne du bas) -->
    <div class="counter-row-bottom" style="border-top:1px solid rgba(255,255,255,0.18);margin-top:16px;padding-top:16px;">
      <div class="counter-item info-trigger" id="cnt-doves-item" onclick="openPopover('doves')">
        <span class="num" id="cnt-doves">—</span>
        <span class="lbl">🕊 TOTAL DOVES</span>
      </div>
    </div>

  </div>

  <!-- PERSONAL STREAK -->
  <div class="personal-strip" id="personal-strip" style="display:none"></div>

  <!-- MAP -->
  <div class="map-card">
    <div id="chartdiv"></div>
  </div>

  <!-- SHARE BUTTON — disabled -->

  <!-- SHARE OVERLAY -->
  <div id="share-overlay" style="display:none;position:fixed;inset:0;z-index:700;background:rgba(8,30,65,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);overflow-y:auto;overflow-x:hidden;">

    <!-- Close button (fixed top-right) -->
    <button id="share-overlay-close" onclick="closeShareOverlay()">✕</button>

    <!-- Inner layout -->
    <div id="share-overlay-inner">

      <!-- Instagram Story preview frame -->
      <div class="share-story-frame">
        <p style="font-size:7px;letter-spacing:3.5px;color:rgba(255,255,255,0.4);margin:0;text-transform:uppercase;">Preview</p>
        <div class="share-story-box">
          <canvas id="share-canvas" width="1080" height="1920"></canvas>
        </div>
        <p style="font-size:7px;letter-spacing:2px;color:rgba(255,255,255,0.3);margin:0;text-transform:uppercase;">Instagram Story · 9:16</p>
      </div>

      <!-- Share buttons panel -->
      <div class="share-buttons-panel">
        <div style="text-align:center;margin-bottom:14px;">
          <p style="font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.45);margin:0 0 4px;">SHARE</p>
          <p style="font-size:14px;letter-spacing:3.5px;color:#fff;margin:0;font-weight:300;">PEACE MAP</p>
        </div>

  // ── Chronomètre depuis le lancement ─────────────────────────────
  function initTimer() {
    const LAUNCH = new Date('2026-03-06T00:00:00Z');
    function tick() {
      const diff = Math.max(0, Date.now() - LAUNCH.getTime());
      const days = Math.floor(diff / 86400000);
      const h    = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
      const m    = Math.floor((diff % 3600000)  / 60000).toString().padStart(2,'0');
      const s    = Math.floor((diff % 60000)    / 1000).toString().padStart(2,'0');
      document.getElementById('cnt-days').textContent  = days;
      document.getElementById('cnt-timer').textContent = `${h}:${m}:${s}`;
    }
    tick();
    if (window._mapTickInterval) clearInterval(window._mapTickInterval);
    window._mapTickInterval = setInterval(tick, 1000);
  }

  // ── Rafraîchissement du compteur "Actions today" toutes les 60 s ──
  async function refreshTodayCount() {
    const isConfigured = SUPABASE_URL && !SUPABASE_URL.includes('XXXXXXX');
    if (!isConfigured) return;
    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const todayStr = new Date().toISOString().split('T')[0];
      const { data, error } = await sb
        .from('active_votes')
        .select('user_uid, created_at')
        .gte('created_at', todayStr);
      if (error) throw error;
      const userFlags = JSON.parse(localStorage.getItem('nava_user_flags') || '{}');
      const count = (data || []).filter(r => !r.user_uid || userFlags[r.user_uid]?.status !== 'disabled').length;
      document.getElementById('cnt-today').textContent = '+' + count.toLocaleString('fr-FR');
    } catch(e) { /* silencieux */ }
  }
  if (window._mapRefreshInterval) clearInterval(window._mapRefreshInterval);
  window._mapRefreshInterval = setInterval(refreshTodayCount, 60_000);

  // ── Initialisation Supabase & chargement des données ────────────
  async function loadPeaceData() {
    const isConfigured = SUPABASE_URL && !SUPABASE_URL.includes('XXXXXXX');

    if (isConfigured) {
      try {
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Tous les votes
        const { data, error } = await sb
          .from('active_votes')
          .select('user_uid, country, created_at, referred_by')
          .not('country', 'is', null);

        if (error) throw error;

        // Exclure les utilisateurs bloqués (status 'disabled' dans nava_user_flags)
        const userFlags = JSON.parse(localStorage.getItem('nava_user_flags') || '{}');
        const data_active = data.filter(r => !r.user_uid || userFlags[r.user_uid]?.status !== 'disabled');

        // Votes d'aujourd'hui
        const todayStr = new Date().toISOString().split('T')[0];
        const todayCount = data_active.filter(r => r.created_at && r.created_at.startsWith(todayStr)).length;
        document.getElementById('cnt-today').textContent = '+' + todayCount.toLocaleString('fr-FR');

        // Total doves = toutes les actions + bonus référence (1 vote = 1 colombe)
        const dailyDoves    = data_active.length;
        const referralDoves = data_active.filter(r => r.referred_by).length;
        const totalDoves    = dailyDoves + referralDoves;
        document.getElementById('cnt-doves').textContent = totalDoves.toLocaleString('fr-FR');

        // Agréger par pays en comptant les utilisateurs UNIQUES avec user_uid
        // (même logique que l'admin : les entrées sans user_uid sont ignorées)
        const countsByCountry = {};
        const seenUids = new Set();
        data_active.forEach(r => {
          if (!r.user_uid) return; // ignorer les entrées anonymes (pas de UID)
          if (seenUids.has(r.user_uid)) return; // déjà compté
          seenUids.add(r.user_uid);
          countsByCountry[r.country] = (countsByCountry[r.country] || 0) + 1;
        });

        // PEACE LOVERS = tous les utilisateurs uniques, même ceux dont le pays
        // n'a pas de coordonnées (on fixe avant le filtre lat/lon)
        document.getElementById('cnt-people').textContent = seenUids.size.toLocaleString('fr-FR');

        const rows = Object.entries(countsByCountry).map(([country, count]) => {
          // Case-insensitive lookup: try exact, then Title Case, then find by lowercase match
          var coords = COUNTRY_COORDS[country];
          if (!coords) {
            var titleCase = country.charAt(0).toUpperCase() + country.slice(1).toLowerCase();
            coords = COUNTRY_COORDS[titleCase];
          }
          if (!coords) {
            var lc = country.toLowerCase();
            var key = Object.keys(COUNTRY_COORDS).find(function(k) { return k.toLowerCase() === lc; });
            coords = key ? COUNTRY_COORDS[key] : {lat:0,lon:0};
          }
          return { country, user_count: count, lat: coords.lat, lng: coords.lon };
        }).filter(r => r.lat !== 0);

        return rows.length > 0 ? rows : MOCK_DATA;
      } catch(e) {
        console.warn('Supabase non disponible, données mock utilisées.', e);
        return MOCK_DATA;
      }
    }
    return MOCK_DATA;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  async function loadPeaceMessages() {
    const list    = document.getElementById('messages-list');
    const loading = document.getElementById('msgs-loading');
    try {
      const isConfigured = SUPABASE_URL && !SUPABASE_URL.includes('XXXXXXX');
      if (!isConfigured) { list.innerHTML = ''; return; }

      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data, error } = await sb
        .from('peace_messages')
        .select('user_uid, pseudo, message, updated_at')
        .eq('share_msg', true)
        .not('message', 'is', null)
        .neq('message', '')
        .order('updated_at', { ascending: false })
        .limit(20);

      if (error) throw error;

      // Exclure les utilisateurs bloqués
      const userFlags = JSON.parse(localStorage.getItem('nava_user_flags') || '{}');
      const msgs = (data || []).filter(m => !m.user_uid || userFlags[m.user_uid]?.status !== 'disabled');

      if (!msgs.length) {
        list.innerHTML = `<p class="msgs-no-data">${t('no_msgs_yet')}</p>`;
        return;
      }

      list.innerHTML = msgs.map((m, i) => {
        const d       = new Date(m.updated_at);
        const dateStr = d.toLocaleDateString([], { day: '2-digit', month: 'short', year: '2-digit' });
        return `<div class="msg-card" style="animation-delay:${i * 0.05}s">
          <div class="msg-header">
            <span class="msg-pseudo">🕊 ${escapeHtml(m.pseudo)}</span>
            <span class="msg-date">${dateStr}</span>
          </div>
          <p class="msg-text">${escapeHtml(m.message)}</p>
        </div>`;
      }).join('');
    } catch(e) {
      console.warn('Peace messages load error', e);
      if (loading) loading.remove();
    }
  }

  async function generateShareCard() {
    const canvas = document.getElementById('share-canvas');
    const ctx    = canvas.getContext('2d');
    const W = 1080, H = 1920;
    canvas.width = W; canvas.height = H;

    // Show spinner while capturing
    ctx.fillStyle = 'rgba(20,80,140,1)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.textAlign='center'; ctx.font='40px Arial';
    ctx.fillText('Capturing map…', W/2, H/2);

    // 1. Capture the real amCharts map as PNG
    let mapDataUrl = null;
    try {
      if (window._mapExporting) {
        mapDataUrl = await window._mapExporting.export('png');
      } else {
        const chartCanvas = document.querySelector('#chartdiv canvas');
        if (chartCanvas) mapDataUrl = chartCanvas.toDataURL('image/png');
      }
    } catch(e) { console.warn('Map capture error', e); }

    // 2. Generate QR code locally via qrcodejs (renders to hidden DOM canvas → no CORS)
    let qrImg = null;
    try {
      if (typeof QRCode !== 'undefined') {
        const qrHolder = document.createElement('div');
        qrHolder.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
        document.body.appendChild(qrHolder);
        await new Promise(resolve => {
          new QRCode(qrHolder, {
            text: getShareLink(),
            width: 320, height: 320,
            colorDark: '#ffffff', colorLight: '#0a3060',
            correctLevel: QRCode.CorrectLevel.M
          });
          // qrcodejs renders synchronously, but give it a tick to finish painting
          setTimeout(resolve, 80);
        });
        const qrCanvas = qrHolder.querySelector('canvas');
        if (qrCanvas) {
          qrImg = await loadImage(qrCanvas.toDataURL('image/png'));
        }
        document.body.removeChild(qrHolder);
      }
    } catch(e) { console.warn('QR error', e); }

    // 3. Load map + logo in parallel
    const [mapImg, logoImg] = await Promise.all([
      mapDataUrl ? loadImage(mapDataUrl) : Promise.resolve(null),
      loadImage('logo.png').catch(()=>null),
    ]);

    // 4. Draw full portrait card
    drawPortraitCard(ctx, W, H, mapImg, logoImg, qrImg);
  }

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload  = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function drawPortraitCard(ctx, W, H, mapImg, logoImg, qrImg) {
    // ── Background gradient ──
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0,    '#5DC8F0');
    bg.addColorStop(0.35, '#3AACDF');
    bg.addColorStop(0.75, '#1a6fb5');
    bg.addColorStop(1,    '#0a3060');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    // Soft glow circles
    ctx.save(); ctx.globalAlpha=0.07; ctx.fillStyle='#fff';
    [[W*.88,H*.06,380],[W*.08,H*.28,220],[W*.92,H*.78,280]].forEach(([x,y,r])=>{
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();

    const pad = 60;
    let y = 50;

    // ── Logo ──
    if (logoImg) {
      const ls=220; ctx.save();
      ctx.shadowColor='rgba(255,255,255,0.45)'; ctx.shadowBlur=24;
      ctx.drawImage(logoImg, W/2-ls/2, y, ls, ls);
      ctx.restore(); y+=ls+70;
    } else { y+=70; }

    // ── Title ──
    ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.font='bold 76px Nasalization,Arial,sans-serif';
    ctx.fillText('NAVA PEACE', W/2, y); y+=58;
    ctx.globalAlpha=0.7; ctx.font='30px Nasalization,Arial,sans-serif';
    ctx.fillText('TODAY HUMANITY CHOOSES PEACE', W/2, y); ctx.globalAlpha=1; y+=44;

    // ── Days since launch ──
    const c = getCounters();
    ctx.fillStyle='#fff'; ctx.textAlign='center';
    ctx.font='bold 42px Nasalization,Arial,sans-serif';
    ctx.fillText(c.days + '  DAYS SINCE LAUNCH', W/2, y+42);
    ctx.globalAlpha=1;
    y += 76;

    // ── Separator ──
    line(ctx,pad,y,W-pad); y+=26;

    // ── Real map snapshot (BEFORE counters) ──
    const mapH = 520;
    if (mapImg) {
      ctx.save();
      roundRect(ctx,pad,y,W-pad*2,mapH,22);
      ctx.clip();
      const ar = mapImg.width/mapImg.height;
      let dw=W-pad*2, dh=dw/ar;
      if(dh>mapH){dh=mapH; dw=dh*ar;}
      ctx.drawImage(mapImg, W/2-dw/2, y+(mapH-dh)/2, dw, dh);
      ctx.restore();
      ctx.save(); ctx.globalAlpha=0.25; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      roundRect(ctx,pad,y,W-pad*2,mapH,22); ctx.stroke(); ctx.restore();
    } else {
      ctx.save(); ctx.globalAlpha=0.1; ctx.fillStyle='#fff';
      roundRect(ctx,pad,y,W-pad*2,mapH,22); ctx.fill(); ctx.restore();
      ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.textAlign='center';
      ctx.font='36px Arial'; ctx.fillText('🗺', W/2, y+mapH/2+14);
    }
    y += mapH + 28;

    // ── Separator ──
    line(ctx,pad,y,W-pad); y+=28;

    // ── Counters 2×2 (AFTER map) ──
    const stats=[
      {num:c.people,    lbl:'PEACE LOVERS'},
      {num:c.countries, lbl:'COUNTRIES'},
      {num:c.doves,     lbl:'🕊 TOTAL DOVES'},
      {num:c.today,     lbl:'ACTIONS TODAY'},
    ];
    const colW=W/2, rowH=210;
    stats.forEach((s,i)=>{
      const col=i%2, row=Math.floor(i/2);
      const cx=colW*col+colW/2, cy=y+row*rowH;
      ctx.save(); ctx.globalAlpha=0.1; ctx.fillStyle='#fff';
      roundRect(ctx,cx-colW/2+pad/2,cy+8,colW-pad,rowH-16,18); ctx.fill(); ctx.restore();
      ctx.fillStyle='#fff'; ctx.textAlign='center';
      ctx.font='bold 82px Nasalization,Arial,sans-serif';
      ctx.fillText(s.num, cx, cy+106);
      ctx.globalAlpha=0.6; ctx.font='25px Nasalization,Arial,sans-serif';
      ctx.fillText(s.lbl, cx, cy+148); ctx.globalAlpha=1;
    });
    ctx.save(); ctx.globalAlpha=0.15; ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(W/2,y+12); ctx.lineTo(W/2,y+rowH*2-12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad,y+rowH); ctx.lineTo(W-pad,y+rowH); ctx.stroke();
    ctx.restore();
    y += rowH*2 + 26;

    // ── Separator ──
    line(ctx,pad,y,W-pad); y+=36;

    // ── QR code centré, couleurs inversées ──
    const qrSize = 220;
    const qrX = W/2 - qrSize/2;

    // Rounded tile behind QR (dark background since QR modules are white)
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=24;
    ctx.fillStyle='#0a3060';
    roundRect(ctx, qrX-16, y-16, qrSize+32, qrSize+32, 20);
    ctx.fill();
    ctx.restore();

    // QR code image
    if (qrImg) {
      ctx.drawImage(qrImg, qrX, y, qrSize, qrSize);
    } else {
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.font='bold 24px Arial';
      ctx.fillText('nava-peace.app', W/2, y+qrSize/2+8);
    }
    y += qrSize + 50;
  }

  // Helper: wrap text to fit maxWidth
  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    for (let i=0; i<words.length; i++) {
      const test = line + words[i] + ' ';
      if (ctx.measureText(test).width > maxWidth && i > 0) {
        ctx.fillText(line.trim(), x, y);
        line = words[i] + ' ';
        y += lineHeight;
      } else { line = test; }
    }
    ctx.fillText(line.trim(), x, y);
  }

  function line(ctx, x1, y, x2) {
    ctx.save(); ctx.globalAlpha=0.22; ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke(); ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  async function getShareBlob() {
    return new Promise(resolve => {
      document.getElementById('share-canvas').toBlob(resolve, 'image/png');
    });
  }

  async function shareToInstagram() {
    const blob = await getShareBlob();
    const file = new File([blob], 'nava-peace-map.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: 'NAVA PEACE — Peace Map',
          text: 'Today humanity chooses peace 🕊 Join us at ' + getShareLink() + ' #NavaPeace',
        });
        return;
      } catch(e) { if (e.name === 'AbortError') return; }
    }
    // Fallback: download + instruction
    downloadShareCard();
    setTimeout(() => alert('Image downloaded! Open Instagram and share it as a Story or Post 🕊'), 300);
  }

  function shareToX() {
    const c = getCounters();
    const text = encodeURIComponent(
      `🕊 ${c.people} people from ${c.countries} countries chose peace today on NAVA PEACE.\n` +
      `Join the movement → ${getShareLink()}\n#NavaPeace #Peace #ChoosePeace`
    );
    window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
  }

  function shareToFB() {
    const rc = localStorage.getItem('nava_peace_ref_code')||'';
    const link = (typeof NAVA_TG!=='undefined'&&NAVA_TG.isTelegram&&rc) ? 'https://t.me/NavaPeaceBot/app?startapp='+rc : rc ? 'https://nava-peace.app/?ref='+rc : 'https://nava-peace.app';
    window.open('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(link),'_blank','width=600,height=400');
  }

  function shareToMessenger() {
    const link = getShareLink();
    // On mobile: open Messenger app directly; on desktop: fallback to FB send dialog
    if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
      window.location.href = 'fb-messenger://share?link=' + encodeURIComponent(link);
    } else {
      window.open('https://www.facebook.com/dialog/send?link=' + encodeURIComponent(link) + '&redirect_uri=' + encodeURIComponent(link), '_blank');
    }
  }

  function downloadShareCard() {
    const a = document.createElement('a');
    a.href = document.getElementById('share-canvas').toDataURL('image/png');
    a.download = 'nava-peace-map.png';
    a.click();
  }

  // Close share overlay on outside click
  document.getElementById('share-overlay').addEventListener('click', function(e){
    if(e.target === this) closeShareOverlay();
  });

  </script>
