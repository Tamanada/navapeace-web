  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 110px;
      color: #fff;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .header img {
      width: 80px; height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 3px 14px rgba(255,255,255,0.45));
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 36px;
      letter-spacing: 7px;
      text-shadow: 0 1px 16px rgba(255,255,255,0.4);
    }

    /* ── MAIN CARD ── */
    .card {
      width: 100%;
      max-width: 500px;
      background: rgba(247,247,241,0.13);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 28px;
      padding: 36px 28px 32px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 40px rgba(20,80,130,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    /* ── MESSAGE ── */
    .message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .msg-today {
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(240,237,228,0.55);
    }

    .msg-for {
      font-size: 16px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    .msg-want {
      font-size: 34px;
      letter-spacing: 5px;
      color: #FFFFFF;
      text-shadow: 0 1px 20px rgba(255,255,255,0.5);
      line-height: 1.2;
    }

    .msg-world {
      font-size: 16px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    /* ── PEACE BUTTON ── */
    .peace-btn {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.9);
      color: rgba(255,255,255,0.85);
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 52px;
      letter-spacing: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 12px rgba(255,255,255,0.15),
        0 0 0 24px rgba(255,255,255,0.07),
        0 8px 40px rgba(255,255,255,0.3);
      transition: transform 0.15s, box-shadow 0.3s;
      outline: none;
    }

    .peace-btn .btn-logo {
      width: 115px;
      height: 115px;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 2px 10px rgba(30,100,160,0.25));
      transition: opacity 0.4s;
      opacity: 0.22;
      position: absolute;
    }

    /* ── BUTTON HINT TEXT ── */
    .btn-hint {
      position: absolute;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1A5F82;
      text-align: center;
      line-height: 2.1;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 2;
    }

    .peace-btn .btn-status {
      font-size: 52px;
      line-height: 1;
      pointer-events: none;
    }

    .peace-btn:hover:not(:disabled) {
      transform: scale(1.04);
      box-shadow:
        0 0 0 14px rgba(255,255,255,0.2),
        0 0 0 28px rgba(255,255,255,0.08),
        0 12px 50px rgba(255,255,255,0.4);
    }

    .peace-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    /* Pulse ring animation */
    .peace-btn::before,
    .peace-btn::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      animation: ring-pulse 2.5s ease-out infinite;
    }

    .peace-btn::after {
      animation-delay: 1.25s;
    }

    @keyframes ring-pulse {
      0%   { inset: -6px;  opacity: 0.7; }
      100% { inset: -40px; opacity: 0; }
    }

    /* ── NOTIFICATION BANNER ── */
    #notif-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.12) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 14px 52px 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: bannerSlideIn 0.4s ease both;
    }
    @keyframes bannerSlideIn {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    #notif-banner .notif-icon { font-size: 22px; flex-shrink: 0; filter: brightness(0) invert(1); }
    #notif-banner .notif-text {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.6;
      flex: 1;
    }
    #notif-banner .notif-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none; border: none;
      color: rgba(255,255,255,0.7);
      font-size: 20px; cursor: pointer;
      line-height: 1;
    }

    /* DONE state */
    .peace-btn:disabled {
      background: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      cursor: default;
      box-shadow:
        0 0 0 12px rgba(255,255,255,0.07),
        0 4px 20px rgba(255,255,255,0.1);
    }

    .peace-btn:disabled .btn-logo {
      opacity: 0.35;
    }

    .peace-btn:disabled::before,
    .peace-btn:disabled::after {
      display: none;
    }

    /* ── DONE MESSAGE (caché — tout se passe dans le bouton) ── */
    .done-msg { display: none !important; }

    /* ── ANIMATIONS BOUTON DONE ── */
    @keyframes zoomInSlow {
      from { opacity: 0; transform: scale(0.25); }
      to   { opacity: 1; transform: scale(1);    }
    }
    @keyframes zoomOutFade {
      from { opacity: 1; transform: scale(1);    }
      to   { opacity: 0; transform: scale(1.25); }
    }

    /* Wrapper centré dans le bouton */
    .btn-inner-msg {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-align: center;
      pointer-events: none;
      z-index: 2;
      width: 78%;
    }

    /* Phase 1 — THANK YOU / PEACE LOVER */
    .btn-thank-wrap { animation: zoomInSlow 3s cubic-bezier(0.22,1,0.36,1) forwards; }
    .btn-inner-line1 {
      font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
      color: #1A5F82; font-weight: 700; line-height: 1.5;
    }
    .btn-inner-line2 {
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(26,95,130,0.75); font-weight: 700; line-height: 1.5;
    }

    /* Phase 2 — NEXT ACTION IN + timer */
    .btn-next-wrap { animation: zoomInSlow 3s cubic-bezier(0.22,1,0.36,1) forwards; }
    .btn-next-label {
      font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(26,95,130,0.60);
    }
    .btn-next-timer {
      font-size: 17px; letter-spacing: 3px;
      color: #1A5F82; font-weight: 700; margin-top: 2px;
    }

    /* ── COUNTERS ── */
    .counters {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .cnt-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cnt-num {
      font-size: 34px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .cnt-lbl {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,237,228,0.7);
    }

    .cnt-sep {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.25);
      align-self: center;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(20, 90, 140, 0.82);
      backdrop-filter: blur(20px);

      border-top: 1px solid rgba(255,255,255,0.2);

    .nav-item {

      color: rgba(255,255,255,0.45);

      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-item.active { color: #fff; }
    .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
  </style>
</head>

  <script>
    const TODAY        = new Date().toISOString().split('T')[0];
    const PEACE_KEY    = 'nava_peace_action';
    const country      = localStorage.getItem('nava_peace_country') || null;

    // Si pas encore enregistré → inscription d'abord
    if (!localStorage.getItem('nava_peace_voted')) {
      window.location.replace('index.html');
    }

    // Safe Supabase
    let sb = null;
    try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
    catch(e) { console.warn('Supabase init failed', e); }

    // ── Vérifier si déjà cliqué aujourd'hui ────────────────────────
    function checkDone() {
      if (localStorage.getItem(PEACE_KEY) === TODAY) {
        setDone(false); // déjà voté → countdown direct, sans thank you
      }
    }

    function setDone(fresh) {
      const btn = document.getElementById('peaceBtn');
      btn.disabled = true;

      // Contenu du bouton : logo + deux phases superposées
      btn.innerHTML =
        '<img src="logo.png" alt="NAVA" class="btn-logo" style="opacity:0.20;position:absolute;"/>' +
        // Phase 1 — THANK YOU PEACE LOVER
        '<div class="btn-inner-msg btn-thank-wrap" id="btn-thank-wrap"' +
          (fresh ? '' : ' style="display:none;"') + '>' +
          '<span class="btn-inner-line1">THANK YOU</span>' +
          '<span class="btn-inner-line2">PEACE LOVER</span>' +
        '</div>' +
        // Phase 2 — NEXT ACTION IN + countdown
        '<div class="btn-inner-msg btn-next-wrap" id="btn-next-wrap"' +
          (fresh ? ' style="display:none;"' : '') + '>' +
          '<span class="btn-next-label">NEXT ACTION IN</span>' +
          '<span class="btn-next-timer" id="countdown">00:00:00</span>' +
        '</div>';

      if (fresh) {
        // Après 3 s : zoom-out thank you → carte inspiration → countdown
        setTimeout(function () {
          var tw = document.getElementById('btn-thank-wrap');
          if (!tw) return;
          tw.style.animation = 'zoomOutFade 0.5s ease forwards';
          setTimeout(function () {
            if (tw) tw.style.display = 'none';
            // Préparer le countdown en arrière-plan (invisible)
            var nw = document.getElementById('btn-next-wrap');
            if (nw) {
              nw.style.display = 'flex';
              nw.style.animation = 'none';
              void nw.offsetWidth;
              nw.style.animation = 'zoomInSlow 3s cubic-bezier(0.22,1,0.36,1) forwards';
            }
            // Afficher la carte inspiration (par-dessus tout)
            showInspo();
          }, 500);
        }, 3000);
      }

      startCountdown();
    }

    // ── Clic sur le bouton ──────────────────────────────────────────
    let _voting = false; // guard contre double-submit
    async function choosePeace() {
      // Double-submit guard (2 onglets ouverts, double-tap, etc.)
      if (_voting) return;
      if (localStorage.getItem(PEACE_KEY) === TODAY) { setDone(true); return; }
      _voting = true;

      const btn = document.getElementById('peaceBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-status" style="color:#3AACDF;font-size:36px;">···</span>';

      // Marquer localement AVANT l'insert pour bloquer tout autre onglet
      localStorage.setItem(PEACE_KEY, TODAY);

      const uid        = localStorage.getItem('nava_peace_uid');
      const referredBy = localStorage.getItem('nava_peace_referred_by') || null;

      let alreadyVotedToday = false;

      if (sb) {
        // Enregistrer l'action du jour dans peace_votes
        try {
          const { error } = await sb.from('peace_votes').insert({
            user_uid:    uid,
            country:     country,
            referred_by: referredBy,
          });
          if (error) {
            // Code 23505 = unique constraint violation (déjà voté aujourd'hui)
            if (error.code === '23505' || error.message?.includes('unique')) {
              alreadyVotedToday = true;
            } else {
              console.warn('Vote insert error', error);
            }
          }
        } catch(e) { console.warn('Vote insert error', e); }

        // Récompenser le parrain si applicable (seulement si vote réel)
        if (referredBy && !alreadyVotedToday) {
          try {
            await sb.from('referral_points').insert({ referral_code: referredBy });
          } catch(e) { console.warn('Referral point error', e); }
        }
      }

      _voting = false;

      // Incrémenter le compteur local de jours consécutifs
      if (!alreadyVotedToday) {
        const prevDays = parseInt(localStorage.getItem('nava_peace_days') || '1', 10);
        localStorage.setItem('nava_peace_days', prevDays + 1);
      }

      // Si déjà voté aujourd'hui (ex: autre appareil) → countdown direct sans thank you
      setDone(!alreadyVotedToday);
      await loadCounters();
    }

    // ── Charger les compteurs depuis peace_votes ────────────────────
    // Utilise l'API count Supabase (HEAD request, pas de transfert de données)
    // → exact peu importe le nombre de lignes, pas de limite à 1 000 rows.
    async function loadCounters() {
      if (!sb) return;
      try {
        // Calcul du lendemain en UTC pour le filtre "aujourd'hui"
        const d = new Date(); d.setUTCDate(d.getUTCDate() + 1);
        const TOMORROW = d.toISOString().split('T')[0];

        const [{ count: total }, { count: todayCount }] = await Promise.all([
          // Total all-time
          sb.from('peace_votes')
            .select('*', { count: 'exact', head: true }),
          // Actions du jour (UTC, cohérent avec created_at Supabase)
          sb.from('peace_votes')
            .select('*', { count: 'exact', head: true })
            .gte('created_at', TODAY + 'T00:00:00Z')
            .lt('created_at', TOMORROW + 'T00:00:00Z'),
        ]);

        document.getElementById('cnt-total').textContent = (total ?? 0).toLocaleString('fr-FR');
        document.getElementById('cnt-today').textContent = '+' + (todayCount ?? 0).toLocaleString('fr-FR');
      } catch(e) { console.warn('Counter error', e); }
    }

    // ── Countdown to next midnight ──────────────────────────────────
    function startCountdown() {
      function tick() {
        const now  = new Date();
        const next = new Date(now);
        next.setDate(next.getDate() + 1);
        next.setHours(0, 0, 0, 0);
        const diff = next - now;

        // ── Minuit atteint → nouveau jour → réactiver le bouton ──
        if (diff <= 0) {
          clearInterval(_countdownInterval);
          localStorage.removeItem(PEACE_KEY);
          const btn = document.getElementById('peaceBtn');
          if (btn) {
            btn.innerHTML =
              '<img src="logo.png" alt="NAVA PEACE" class="btn-logo" id="btnLogo" />' +
              '<span class="btn-hint" data-i18n-html="press_hint">PRESS<br>TO CHOOSE<br>PEACE</span>';
            btn.disabled = false;
            // Force reflow → redémarre les animations ::before / ::after (pulse rings)
            void btn.offsetWidth;
            if (typeof applyLang === 'function') applyLang(detectLang());
          }
          return;
        }

        const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

        const el = document.getElementById('countdown');
        if (el) el.textContent = h + ':' + m + ':' + s;
      }
      tick();
      _countdownInterval = setInterval(tick, 1000);
    }
    let _countdownInterval = null;

    // ── NOTIFICATION BANNER ────────────────────────────────────────────
    async function checkNotifications() {
      const myUid = localStorage.getItem('nava_peace_uid');
      if (!myUid || !sb) return;
      try {
        const { data } = await sb
          .from('notifications')
          .select('id')
          .eq('to_user_uid', myUid)
          .eq('read', false)
          .order('created_at', { ascending: false })
          .limit(1);

        if (!data || data.length === 0) return;

        // Show banner
        document.getElementById('notif-text').textContent = t('reminder_banner');
        document.getElementById('notif-banner').style.display = 'flex';

        // Mark all as read
        await sb
          .from('notifications')
          .update({ read: true })
          .eq('to_user_uid', myUid)
          .eq('read', false);

      } catch(e) { console.warn('Notifications check error', e); }
    }

    function dismissNotif() {
      const banner = document.getElementById('notif-banner');
      banner.style.animation = 'none';
      banner.style.opacity = '0';
      banner.style.transform = 'translateY(-100%)';
      banner.style.transition = 'opacity 0.3s, transform 0.3s';
      setTimeout(() => { banner.style.display = 'none'; }, 300);
    }

    // ── INSPIRATION CARD ──────────────────────────────────────────────────
    const PEACE_QUOTES = [
      { q:'Peace begins with a smile.',                                            a:'Mother Teresa' },
      { q:'There is no way to peace. Peace is the way.',                           a:'A.J. Muste' },
      { q:'An eye for an eye will only make the whole world blind.',               a:'Mahatma Gandhi' },
      { q:'When the power of love overcomes the love of power, the world will know peace.', a:'Jimi Hendrix' },
      { q:'Peace cannot be kept by force; it can only be achieved by understanding.', a:'Albert Einstein' },
      { q:'You cannot shake hands with a clenched fist.',                          a:'Indira Gandhi' },
      { q:'Peace is the only battle worth waging.',                                a:'Albert Camus' },
      { q:'Every act of love is a vote for peace.',                                a:'Nava Peace' },
      { q:'Peace comes from within. Do not seek it without.',                      a:'Gautama Buddha' },
      { q:'Darkness cannot drive out darkness; only light can do that.',           a:'Martin Luther King Jr.' },
      { q:'Forgiveness is the attribute of the strong.',                           a:'Mahatma Gandhi' },
      { q:'True peace is not merely the absence of tension; it is the presence of justice.', a:'Martin Luther King Jr.' },
      { q:'If we have no peace, it is because we have forgotten that we belong to each other.', a:'Mother Teresa' },
      { q:'A smile is the beginning of peace.',                                    a:'Mother Teresa' },
      { q:'Where there is love there is life.',                                    a:'Mahatma Gandhi' },
      { q:'Give peace a chance.',                                                  a:'John Lennon' },
      { q:'It is not enough to say we must not wage war. It is necessary to love peace and sacrifice for it.', a:'Martin Luther King Jr.' },
      { q:'War is what happens when language fails.',                              a:'Margaret Atwood' },
      { q:'You must not lose faith in humanity.',                                  a:'Mahatma Gandhi' },
      { q:'The world is a dangerous place, not because of those who do evil, but because of those who look on and do nothing.', a:'Albert Einstein' },
      { q:'We shall overcome because the arc of the moral universe is long, but it bends toward justice.', a:'Martin Luther King Jr.' },
      { q:'Peace is not absence of conflict, it is the ability to handle conflict by peaceful means.', a:'Ronald Reagan' },
      { q:'If you want peace, you don\'t talk to your friends. You talk to your enemies.', a:'Desmond Tutu' },
      { q:'One day we must come to see that peace is not merely a distant goal that we seek, but a means by which we arrive at that goal.', a:'Martin Luther King Jr.' },
      { q:'Nonviolence is the greatest force at the disposal of mankind.',          a:'Mahatma Gandhi' },
      { q:'To be prepared for war is one of the most effective means of preserving peace.', a:'George Washington' },
      { q:'I speak to everyone in the same way, whether he is the garbage man or the president.', a:'Albert Einstein' },
      { q:'The most important thing in the world is love — and peace is its language.', a:'Nava Peace' },
      { q:'Those who make peaceful revolution impossible will make violent revolution inevitable.', a:'John F. Kennedy' },
      { q:'Imagine all the people living life in peace.',                          a:'John Lennon' },
    ];

    function getTodayQuote() {
      const start = new Date(new Date().getFullYear(), 0, 0);
      const dayOfYear = Math.floor((Date.now() - start) / 86400000);
      return PEACE_QUOTES[dayOfYear % PEACE_QUOTES.length];
    }

    let _inspoTimer = null;
    function showInspo() {
      const { q, a } = getTodayQuote();
      document.getElementById('inspo-quote').textContent = '\u201C' + q + '\u201D';
      document.getElementById('inspo-author').textContent = '\u2014 ' + a;
      const overlay = document.getElementById('inspo-overlay');
      overlay.style.display = 'flex';
      overlay.style.opacity  = '0';
      overlay.style.transition = 'opacity 0.5s ease';
      void overlay.offsetWidth;
      overlay.style.opacity  = '1';
      // Progress bar countdown
      const bar = document.getElementById('inspo-bar');
      bar.style.transition = 'none';
      bar.style.width = '100%';
      void bar.offsetWidth;
      bar.style.transition = 'width 8s linear';
      bar.style.width = '0%';
      _inspoTimer = setTimeout(closeInspo, 8000);
    }

    function closeInspo() {
      clearTimeout(_inspoTimer);
      const overlay = document.getElementById('inspo-overlay');
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.4s ease';
      setTimeout(() => {
        overlay.style.display = 'none';
        overlay.style.opacity = '';
        overlay.style.transition = '';
      }, 400);
    }

    // ── INSTAGRAM SHARE ──────────────────────────────────────────────────
    async function generateShareCard() {
      const canvas  = document.createElement('canvas');
      canvas.width  = 1080;
      canvas.height = 1080;
      const ctx     = canvas.getContext('2d');

      // Background gradient
      const grad = ctx.createRadialGradient(540, 200, 0, 540, 200, 850);
      grad.addColorStop(0,   '#6DD5F5');
      grad.addColorStop(0.5, '#3AACDF');
      grad.addColorStop(1,   '#1470A0');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 1080, 1080);

      // Subtle vignette
      const vig = ctx.createRadialGradient(540, 540, 300, 540, 540, 760);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,0,0.22)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, 1080, 1080);

      // Logo (white)
      await new Promise(res => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const tmp = document.createElement('canvas');
          tmp.width = tmp.height = 200;
          const tc = tmp.getContext('2d');
          tc.filter = 'brightness(0) invert(1)';
          tc.drawImage(img, 0, 0, 200, 200);
          ctx.drawImage(tmp, 440, 140, 200, 200);
          res();
        };
        img.onerror = res;
        img.src = 'logo.png';
      });

      // NAVA PEACE
      ctx.fillStyle = '#ffffff';
      ctx.textAlign  = 'center';
      ctx.font = '700 76px Arial, sans-serif';
      ctx.fillText('NAVA  PEACE', 540, 430);

      // Divider
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(390, 458, 300, 1.5);

      // Quote
      const { q } = getTodayQuote();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'italic 32px Georgia, serif';
      const words = ('\u201C' + q + '\u201D').split(' ');
      let line = '', lines = [], maxW = 780;
      for (const w of words) {
        const test = line + (line ? ' ' : '') + w;
        if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; }
        else line = test;
      }
      if (line) lines.push(line);
      lines.slice(0, 4).forEach((l, i) => ctx.fillText(l, 540, 530 + i * 46));

      // Dove count
      const days = parseInt(localStorage.getItem('nava_peace_days') || '1');
      ctx.fillStyle = '#ffffff';
      ctx.font = '700 110px Arial, sans-serif';
      ctx.fillText(days, 540, 740);
      ctx.font = '500 26px Arial, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('ACTIONS FOR PEACE', 540, 785);

      // "I CHOSE PEACE TODAY"
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.font = '500 22px Arial, sans-serif';
      const d = new Date();
      const dateStr = d.toLocaleDateString('en-US', {day:'numeric', month:'long', year:'numeric'}).toUpperCase();
      ctx.fillText(dateStr, 540, 860);

      // Bottom branding
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = '18px Arial, sans-serif';
      ctx.fillText('NAVA-PEACE.APP  ·  #CHOOSPEACE  ·  🕊', 540, 990);

      return new Promise(res => canvas.toBlob(res, 'image/png'));
    }

    async function shareInstagram() {
      const btn = document.getElementById('inspo-share-btn');
      if (btn) { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }
      try {
        const blob = await generateShareCard();
        const file = new File([blob], 'nava-peace.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: 'NAVA PEACE',
            text: 'I chose peace today 🕊 #NavaPeace #ChoosePeace'
          });
        } else {
          // Fallback : télécharge l'image
          const url = URL.createObjectURL(blob);
          const a   = document.createElement('a');
          a.href    = url;
          a.download = 'nava-peace.png';
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1500);
          showBanner('IMAGE SAVED — OPEN INSTAGRAM TO SHARE 📸');
        }
      } catch(e) {
        if (e.name !== 'AbortError') console.warn('Share error:', e);
      } finally {
        if (btn) { btn.style.opacity = ''; btn.style.pointerEvents = ''; }
      }
    }

    checkDone();
    loadCounters();
    checkNotifications();
    initPush();

    // ── Compteurs live : polling 30s ──────────────────────────────────────
    setInterval(loadCounters, 30_000);

    // ── Compteurs live : Supabase Realtime (mise à jour instantanée) ──────
    if (sb) {
      sb.channel('nava_votes_rt')
        .on('postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'peace_votes' },
            () => loadCounters())
        .subscribe();
    }

    // ── WEB PUSH ────────────────────────────────────────────────────────────
    const VAPID_PUBLIC_KEY = 'BJ05qnJnaYlLAhvlO4s1CDbh42eD7PYuNDgk33AgzBQ6mhRMDNcPqPj138WWZqA_hAon8CAN9RpYA5yikWEi8p4';

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw     = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    async function initPush() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      try {
        // Register service worker
        const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });

        // Only prompt if user hasn't decided yet
        if (Notification.permission === 'default') {
          // Small delay so it doesn't fire immediately on page load
          setTimeout(() => askPushPermission(reg), 4000);
        } else if (Notification.permission === 'granted') {
          await savePushSubscription(reg);
        }
      } catch(e) { console.warn('SW registration failed:', e); }
    }

    async function askPushPermission(reg) {
      const permission = await Notification.requestPermission();
      if (permission === 'granted') await savePushSubscription(reg);
    }

    async function savePushSubscription(reg) {
      try {
        const uid = localStorage.getItem('nava_peace_uid');
        if (!uid || !sb) return;
        let sub = await reg.pushManager.getSubscription();
        if (!sub) {
          sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
          });
        }
        await sb.from('push_subscriptions').upsert(
          { user_uid: uid, subscription: sub.toJSON(), updated_at: new Date().toISOString() },
          { onConflict: 'user_uid' }
        );
      } catch(e) { console.warn('Push subscription error:', e); }
    }
  </script>
