<!DOCTYPE html>
<html lang="en" data-module="module_peace">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVA PEACE – Choose Peace</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <script src="module_gate.js"></script>
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nava-peace.app/peace.html" />
  <meta property="og:title" content="NAVA PEACE – Choose Peace" />
  <meta property="og:description" content="Join the NAVA PEACE movement. Together we spread peace across the world. Register now and make a difference." />
  <meta property="og:image" content="https://nava-peace.app/logo.png" />

  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="NAVA PEACE Logo" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://nava-peace.app/logo.png" />
  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('nasalization.woff') format('woff');
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="lang.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 20px 110px;
      color: #fff;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .header img {
      width: 80px; height: 80px;
      object-fit: contain;
      filter: drop-shadow(0 3px 14px rgba(255,255,255,0.45));
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 36px;
      letter-spacing: 7px;
      text-shadow: 0 1px 16px rgba(255,255,255,0.4);
    }

    /* ── MAIN CARD ── */
    .card {
      width: 100%;
      max-width: 500px;
      background: rgba(247,247,241,0.13);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 28px;
      padding: 36px 28px 32px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 40px rgba(20,80,130,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    /* ── MESSAGE ── */
    .message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
      text-transform: uppercase;
    }

    .msg-today {
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(240,237,228,0.55);
    }

    .msg-for {
      font-size: 16px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    .msg-want {
      font-size: 34px;
      letter-spacing: 5px;
      color: #FFFFFF;
      text-shadow: 0 1px 20px rgba(255,255,255,0.5);
      line-height: 1.2;
    }

    .msg-world {
      font-size: 16px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.75);
    }

    /* ── PEACE BUTTON ── */
    .peace-btn {
      position: relative;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.9);
      color: rgba(255,255,255,0.85);
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 52px;
      letter-spacing: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 12px rgba(255,255,255,0.15),
        0 0 0 24px rgba(255,255,255,0.07),
        0 8px 40px rgba(255,255,255,0.3);
      transition: transform 0.15s, box-shadow 0.3s;
      outline: none;
    }

    .peace-btn .btn-logo {
      width: 115px;
      height: 115px;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 2px 10px rgba(30,100,160,0.25));
      transition: opacity 0.4s;
      opacity: 0.22;
      position: absolute;
    }

    /* ── BUTTON HINT TEXT ── */
    .btn-hint {
      position: absolute;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #1A5F82;
      text-align: center;
      line-height: 2.1;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 2;
    }

    .peace-btn .btn-status {
      font-size: 52px;
      line-height: 1;
      pointer-events: none;
    }

    .peace-btn:hover:not(:disabled) {
      transform: scale(1.04);
      box-shadow:
        0 0 0 14px rgba(255,255,255,0.2),
        0 0 0 28px rgba(255,255,255,0.08),
        0 12px 50px rgba(255,255,255,0.4);
    }

    .peace-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    /* Pulse ring animation */
    .peace-btn::before,
    .peace-btn::after {
      content: '';
      position: absolute;
      inset: -16px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      animation: ring-pulse 2.5s ease-out infinite;
    }

    .peace-btn::after {
      animation-delay: 1.25s;
    }

    @keyframes ring-pulse {
      0%   { inset: -6px;  opacity: 0.7; }
      100% { inset: -40px; opacity: 0; }
    }

    /* ── NOTIFICATION BANNER ── */
    #notif-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(255,255,255,0.12) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 14px 52px 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: bannerSlideIn 0.4s ease both;
    }
    @keyframes bannerSlideIn {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }
    #notif-banner .notif-icon { font-size: 22px; flex-shrink: 0; }
    #notif-banner .notif-text {
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.6;
      flex: 1;
    }
    #notif-banner .notif-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none; border: none;
      color: rgba(255,255,255,0.7);
      font-size: 20px; cursor: pointer;
      line-height: 1;
    }

    /* DONE state */
    .peace-btn:disabled {
      background: rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.7);
      cursor: default;
      box-shadow:
        0 0 0 12px rgba(255,255,255,0.07),
        0 4px 20px rgba(255,255,255,0.1);
    }

    .peace-btn:disabled .btn-logo {
      opacity: 0.35;
    }

    .peace-btn:disabled::before,
    .peace-btn:disabled::after {
      display: none;
    }

    /* ── DONE MESSAGE ── */
    .done-msg {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      text-align: center;
      animation: fadeInUp 0.6s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .done-thank {
      font-size: 20px;
      letter-spacing: 4px;
      color: #FFFFFF;
      text-shadow: 0 0 24px rgba(255,255,255,0.6);
    }

    .done-sub {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.55);
      line-height: 1.8;
    }

    .done-timer-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .done-timer {
      font-size: 28px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 0 18px rgba(255,255,255,0.3);
    }

    /* ── COUNTERS ── */
    .counters {
      display: flex;
      gap: 24px;
      justify-content: center;
    }

    .cnt-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .cnt-num {
      font-size: 34px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.5);
    }

    .cnt-lbl {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240,237,228,0.7);
    }

    .cnt-sep {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.25);
      align-self: center;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(20, 90, 140, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 10px 0 24px;
      z-index: 200;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: rgba(255,255,255,0.45);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-item.active { color: #fff; }
    .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
  </style>
</head>
<body>

  <!-- NOTIFICATION BANNER (hidden by default) -->
  <div id="notif-banner" style="display:none;">
    <span class="notif-icon">🕊</span>
    <span class="notif-text" id="notif-text"></span>
    <button class="notif-close" onclick="dismissNotif()">×</button>
  </div>

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" alt="NAVA PEACE" />
    <h1>NAVA PEACE</h1>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- MESSAGE -->
    <div class="message">
      <span class="msg-for" data-i18n="msg_for1">TODAY, FOR ME,</span>

    <!-- BUTTON -->

    <div class="done-msg" id="doneMsg">

      <span class="done-sub" data-i18n="done_sub">YOU HAVE CHOSEN PEACE TODAY</span>

    <!-- COUNTERS -->
    <div class="counters">

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="peace.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M11 2C6.48 2 2 6.48 2 11s4.48 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 16c-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7-3.14 7-7 7zm-1-9h2v5h-2zm0-4h2v2h-2z"/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.5"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      <span data-i18n="nav_peace">PEACE</span>
    </a>
    <a href="map.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      <span data-i18n="nav_map">MAP</span>
    </a>
    <a href="market.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-1.66 0-3-1.34-3-3h2c0 .55.45 1 1 1s1-.45 1-1h2c0 1.66-1.34 3-3 3z"/></svg>
      <span data-i18n="nav_market">MARKET</span>
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <span data-i18n="nav_profile">PROFILE</span>

      <span data-i18n="nav_about">ABOUT</span>

  <script>
    const TODAY        = new Date().toISOString().split('T')[0];
    const PEACE_KEY    = 'nava_peace_action';
    const country      = localStorage.getItem('nava_peace_country') || null;

    // Si pas encore enregistré → inscription d'abord
    if (!localStorage.getItem('nava_peace_voted')) {
      window.location.replace('index.html');
    }

    // Safe Supabase
    let sb = null;
    try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
    catch(e) { console.warn('Supabase init failed', e); }

    // ── Vérifier si déjà cliqué aujourd'hui ────────────────────────
    function checkDone() {
      if (localStorage.getItem(PEACE_KEY) === TODAY) {
        setDone();
      }
    }

    function setDone() {
      const btn = document.getElementById('peaceBtn');
      btn.disabled = true;
      btn.innerHTML = '<img src="logo.png" alt="✓" class="btn-logo" style="opacity:0.35;position:absolute;"/><span class="btn-status" style="position:absolute;font-size:42px;">✓</span>';
      document.getElementById('doneMsg').style.display = 'flex';
      startCountdown();
    }

    // ── Clic sur le bouton ──────────────────────────────────────────
    async function choosePeace() {
      const btn = document.getElementById('peaceBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-status" style="color:#3AACDF;font-size:36px;">···</span>';

      // Reward referrer: insert 1 point in referral_points
      const referredBy = localStorage.getItem('nava_peace_referred_by');
      if (sb && referredBy) {
        try {
          await sb.from('referral_points').insert({ referral_code: referredBy });
        } catch(e) { console.warn('Referral point error', e); }
      }

      localStorage.setItem(PEACE_KEY, TODAY);
      setDone();
      loadCounters(); // refresh counters
    }

    // ── Charger les compteurs depuis peace_votes ────────────────────
    // Utilise l'API count Supabase (HEAD request, pas de transfert de données)
    // → exact peu importe le nombre de lignes, pas de limite à 1 000 rows.
    async function loadCounters() {
      if (!sb) return;
      try {
        // Calcul du lendemain en UTC pour le filtre "aujourd'hui"
        const d = new Date(); d.setUTCDate(d.getUTCDate() + 1);
        const TOMORROW = d.toISOString().split('T')[0];

        const [{ count: total }, { count: todayCount }] = await Promise.all([
          // Total all-time
          sb.from('peace_votes')
            .select('*', { count: 'exact', head: true }),
          // Actions du jour (UTC, cohérent avec created_at Supabase)
          sb.from('peace_votes')
            .select('*', { count: 'exact', head: true })
            .gte('created_at', TODAY + 'T00:00:00Z')
            .lt('created_at', TOMORROW + 'T00:00:00Z'),
        ]);

        document.getElementById('cnt-total').textContent = (total ?? 0).toLocaleString('fr-FR');
        document.getElementById('cnt-today').textContent = '+' + (todayCount ?? 0).toLocaleString('fr-FR');
      } catch(e) { console.warn('Counter error', e); }
    }

    // ── Countdown to next midnight ──────────────────────────────────
    function startCountdown() {
      function tick() {
        const now  = new Date();
        const next = new Date(now);
        next.setDate(next.getDate() + 1);
        next.setHours(0, 0, 0, 0);
        const diff = next - now;

        const h = String(Math.floor(diff / 3600000)).padStart(2, '0');
        const m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
        const s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');

        const el = document.getElementById('countdown');
        if (el) el.textContent = h + ':' + m + ':' + s;
      }
      tick();
      setInterval(tick, 1000);
    }

    // ── NOTIFICATION BANNER ────────────────────────────────────────────
    async function checkNotifications() {
      const myUid = localStorage.getItem('nava_peace_uid');
      if (!myUid || !sb) return;
      try {
        const { data } = await sb
          .from('notifications')
          .select('id')
          .eq('to_user_uid', myUid)
          .eq('read', false)
          .order('created_at', { ascending: false })
          .limit(1);

        if (!data || data.length === 0) return;

        // Show banner
        document.getElementById('notif-text').textContent = t('reminder_banner');
        document.getElementById('notif-banner').style.display = 'flex';

        // Mark all as read
        await sb
          .from('notifications')
          .update({ read: true })
          .eq('to_user_uid', myUid)
          .eq('read', false);

      } catch(e) { console.warn('Notifications check error', e); }
    }

    function dismissNotif() {
      const banner = document.getElementById('notif-banner');
      banner.style.animation = 'none';
      banner.style.opacity = '0';
      banner.style.transform = 'translateY(-100%)';
      banner.style.transition = 'opacity 0.3s, transform 0.3s';
      setTimeout(() => { banner.style.display = 'none'; }, 300);
    }

    checkDone();
    loadCounters();
    checkNotifications();
  </script>

</body>
