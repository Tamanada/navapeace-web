    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

.card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(247, 247, 241, 0.18); /* Dove White tinted glass */
      border: 1.5px solid rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      padding: 36px 32px 32px;
      box-shadow:
        0 8px 40px rgba(30, 100, 160, 0.18),
        0 0 0 1px rgba(255,255,255,0.1) inset;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .logo-ring {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .logo-ring img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(255,255,255,0.35));
    }

    h1 {
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: 5px;
      text-align: center;
      color: #FFFFFF;
      text-shadow: 0 1px 18px rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }

    .tagline {
      text-align: center;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 18px;
      letter-spacing: 2.5px;
      color: #FFFFFF;
      opacity: 1;
      margin-bottom: 28px;
      line-height: 1.55;
      text-wrap: balance;
    }

    .divider {
      width: 48px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      margin: 0 auto 28px;
    }

    label {
      display: block;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 2.5px;
      color: #F0EDE4;
      opacity: 0.75;
      margin-bottom: 7px;
      margin-top: 18px;
      text-transform: uppercase;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.14);
      color: #FFFFFF;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 17px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: rgba(240, 237, 228, 0.45);
      font-size: 13px;
    }

    input:focus, select:focus {
      border-color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.22);
    }

    /* Age + Genre côte à côte */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .row-2 label {
      margin-top: 0;
    }

    select option {
      background: #2E9FCC;
      color: #FFFFFF;
    }

    button {
      margin-top: 28px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, #E7E1D4 100%);
      color: #1A6E96;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,255,255,0.25);
      transition: opacity 0.2s, transform 0.15s;
    }

    button:hover {
      opacity: 0.93;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .footer-note {
      text-align: center;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: #F7F7F1;
      opacity: 0.45;
      margin-top: 22px;
    }

    /* ── WELCOME BACK OVERLAY ── */
    #welcome-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;

    @keyframes wbLogoIn {

    }
    @keyframes wbTitleIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }

    @keyframes wbMsgIn {

      pointer-events: none;

  <script>
    // ── Capture referral code from URL (?ref=XXXX) ─────────────────
    (function() {
      const ref = new URLSearchParams(window.location.search).get('ref');
      if (ref && ref.length <= 12) {
        localStorage.setItem('nava_peace_referred_by', ref.toUpperCase());
      }
    })();

    // ── Welcome back animation + redirection utilisateur existant ──
    const TODAY        = new Date().toISOString().split('T')[0];
    const STORAGE_KEY  = 'nava_peace_voted';
    const votedToday   = localStorage.getItem(STORAGE_KEY) === TODAY;
    const isReturning  = !!localStorage.getItem('nava_peace_country'); // set after 1st vote

    if (isReturning) {
      // Destination selon si déjà voté aujourd'hui
      const nextPage = votedToday ? 'map.html' : 'peace.html';

      // Afficher l'overlay de bienvenue
      const overlay = document.getElementById('welcome-overlay');
      overlay.style.display = 'flex';
      document.getElementById('wb-msg').textContent = t('welcome_back');

      // Après 2.3s → fade out → redirect
      setTimeout(() => {
        overlay.classList.add('hiding');
        setTimeout(() => window.location.replace(nextPage), 450);
      }, 2300);

    } else {
      // Nouvel utilisateur : rediriger vers about.html sauf si ?join=1 ou déjà vu
      const params = new URLSearchParams(window.location.search);
      if (!params.get('join') && !localStorage.getItem('nava_peace_seen_about')) {
        window.location.replace('about.html');
      }
    }

    // ── Permanent device UID (persists across sessions, used for code recovery) ──
    function genUID() {
      return 'u_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
    }
    if (!localStorage.getItem('nava_peace_uid')) {
      localStorage.setItem('nava_peace_uid', genUID());
    }

    // ── Stable referral code (generated once, recovered from Supabase via UID) ──
    function genRefCode() {
      return Math.random().toString(36).slice(2, 10).toUpperCase();
    }
    if (!localStorage.getItem('nava_peace_ref_code')) {
      localStorage.setItem('nava_peace_ref_code', genRefCode());
    }

    // ── Safe Supabase init ────────────────────────────────────────
    let sbClient = null;
    try {
      sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch(e) {
      console.warn('Supabase init failed:', e.message);
    }

    document.getElementById('peaceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.textContent = '...';
      btn.disabled = true;

      const country      = document.getElementById('country').value;
      const age          = parseInt(document.getElementById('age').value, 10) || null;
      const gender       = document.getElementById('gender').value || null;
      const referralCode = localStorage.getItem('nava_peace_ref_code') || genRefCode();
      const referredBy   = localStorage.getItem('nava_peace_referred_by') || null;
      const userUid      = localStorage.getItem('nava_peace_uid') || genUID();

      if (sbClient) {
        try {
          const { error } = await sbClient
            .from('peace_votes')
            .insert({ country, age, gender, referral_code: referralCode, referred_by: referredBy, user_uid: userUid });
          if (error) console.warn('Supabase insert error:', error.message);
        } catch (err) {
          console.warn('Supabase unavailable:', err.message);
        }
      }

      // Sauvegarder le profil utilisateur
      localStorage.setItem('nava_peace_country', country);
      localStorage.setItem('nava_peace_age',     age || '');
      localStorage.setItem('nava_peace_gender',  gender || '');

      // Enregistrer le vote du jour + incrémenter le compteur de jours
      localStorage.setItem(STORAGE_KEY, TODAY);
      const prevDays = parseInt(localStorage.getItem('nava_peace_days') || '0', 10);
      localStorage.setItem('nava_peace_days', prevDays + 1);

      // Register push subscription for new user (SW already loaded on peace.html)
      registerPushForNewUser(userUid);

      // Première inscription → page peace pour découvrir le bouton
      window.location.href = 'peace.html';
    });

    // ── WEB PUSH (new user registration) ───────────────────────────────────
    const VAPID_PUBLIC_KEY = 'BJ05qnJnaYlLAhvlO4s1CDbh42eD7PYuNDgk33AgzBQ6mhRMDNcPqPj138WWZqA_hAon8CAN9RpYA5yikWEi8p4';

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const raw     = atob(base64);
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    async function registerPushForNewUser(uid) {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      try {
        const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
        // Will ask on peace.html after 4s — just pre-register the SW here
      } catch(e) { /* silent */ }
    }
