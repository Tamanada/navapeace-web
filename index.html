    }

    .logo-ring {

      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }

    .logo-ring img {

      height: 150px;
      object-fit: contain;

      text-align: center;

      text-shadow: 0 1px 18px rgba(255,255,255,0.45);

    .tagline {

      font-size: 11px;
      letter-spacing: 2px;
      color: #F0EDE4; /* Halo/Soft White */
      opacity: 0.85;
      margin-bottom: 28px;
    }

    .divider {
      width: 48px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      margin: 0 auto 28px;
    }

    label {

      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      color: #F0EDE4;
      opacity: 0.75;
      margin-bottom: 7px;
      margin-top: 18px;
      text-transform: uppercase;
    }

    label:first-of-type {

    }

    input, select {

      padding: 13px 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.14);
      color: #FFFFFF;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: rgba(240, 237, 228, 0.45);
      font-size: 13px;
    }

    input:focus, select:focus {
      border-color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.22);
    }

    select option {
      background: #2E9FCC;
      color: #FFFFFF;
    }

    button {
      margin-top: 28px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, #E7E1D4 100%);
      color: #1A6E96;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,255,255,0.25);
      transition: opacity 0.2s, transform 0.15s;
    }

    button:hover {
      opacity: 0.93;
      transform: translateY(-1px);
    }

    button:active {

    }

    .footer-note {

      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9.5px;
      letter-spacing: 1.5px;
      color: #F7F7F1;
      opacity: 0.45;
      margin-top: 22px;

  <script>
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('peaceForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      btn.textContent = '...';
      btn.disabled = true;

      const country = document.getElementById('country').value;
      const age     = parseInt(document.getElementById('age').value, 10);
      const gender  = document.getElementById('gender').value;

      try {
        const { error } = await supabase
          .from('peace_votes')
          .insert({ country, age, gender });

        if (error) throw error;

        // Redirect to the map after successful submission
        window.location.href = 'map.html';
      } catch (err) {
        console.error(err);
        btn.textContent = 'JOIN THE PEACE MAP';
        btn.disabled = false;
        alert('Something went wrong. Please try again.');
      }
    });
  </script>
