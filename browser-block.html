<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVA PEACE</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050F1A;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 30px;
    }
    .logo {
      width: 90px; height: 90px;
      object-fit: contain;
      margin-bottom: 24px;
      opacity: 0.92;
    }
    .title {
      font-size: 22px;
      letter-spacing: 5px;
      color: #64D2FF;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
    }
    .msg {
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.75);
      line-height: 2.2;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, #3AACDF, #1E8EC4);
      color: #fff;
      border-radius: 14px;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
    }
    .btn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="NAVA PEACE" onerror="this.style.display='none'">
  <div class="title">NAVA PEACE</div>
  <div class="tagline">MAKE PEACE. MAKE CHANGE.</div>
  <div class="msg">THIS APP IS ONLY AVAILABLE<br>INSIDE TELEGRAM</div>
  <a class="btn" href="https://t.me/NavaPeaceBot/app">🕊 &nbsp;OPEN IN TELEGRAM</a>
</body>
</html>
