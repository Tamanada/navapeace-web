    var h = window.location.hash || '';
    var isTg = h.indexOf('tgWebAppData') !== -1 ||
               h.indexOf('tgWebAppVersion') !== -1 ||
               !!window.TelegramWebviewProxy ||
               !!(window.Telegram && window.Telegram.WebApp) ||
               !!localStorage.getItem('nava_peace_country') ||
               (localStorage.getItem('nava_peace_uid') || '').indexOf('tg_') === 0;
    if (!isTg) window.location.replace('https://t.me/NavaPeaceBot/app');
  })();

  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('nasalization.woff') format('woff');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Nasalization', Arial, sans-serif; }

    body {
      background: radial-gradient(ellipse at 50% 0%, #0F3A5A 0%, #050F1A 60%);
      min-height: 100dvh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 72px;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 20px 14px;
      gap: 4px;
    }
    .header img { width: 52px; height: 52px; object-fit: contain; filter: drop-shadow(0 3px 14px rgba(255,255,255,0.3)); }
    .header h1 { font-size: 22px; letter-spacing: 6px; color: #fff; }
    .header .tagline { font-size: 10px; letter-spacing: 4px; color: rgba(100,210,255,0.8); text-transform: uppercase; }

    /* ── USER CARD BANNER ── */
    #my-card-banner {
      width: calc(100% - 32px);
      max-width: 480px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(100,210,255,0.2);
      border-radius: 14px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.6);
    }
    #my-card-banner .banner-label { flex: 1; }
    #my-card-banner .banner-name { color: #64D2FF; font-size: 11px; }
    #my-card-banner .banner-mult { color: rgba(255,255,255,0.4); font-size: 9px; }

    /* ── CARDS LIST ── */
    .cards-list {
      width: 100%;
      max-width: 480px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── PEACE CARD ── */
    .peace-card {
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
      backdrop-filter: blur(12px);
      transition: transform 0.15s;
    }
    .peace-card.owned {
      border-color: rgba(100,255,160,0.35);
      background: linear-gradient(135deg, rgba(100,255,160,0.08) 0%, rgba(20,80,50,0.08) 100%);
    }
    .peace-card.free-card {
      border-color: rgba(100,210,255,0.25);
    }

    .card-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
    }

    /* badge image */
    .card-img-wrap {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .card-img-fallback {
      font-size: 28px;
      text-align: center;
    }

    /* card info */
    .card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }

    .card-name {
      font-size: 12px;
      letter-spacing: 2px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-mult {
      font-size: 11px;
      letter-spacing: 1px;
      color: #64D2FF;
      background: rgba(100,210,255,0.12);
      border: 1px solid rgba(100,210,255,0.25);
      border-radius: 6px;
      padding: 2px 7px;
    }
    .card-price-wrap { display: flex; flex-direction: column; gap: 1px; }
    .card-price-single {
      font-size: 13px;
      letter-spacing: 1px;
      color: #fff;
    }
    .card-price-bundle {
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(255,210,80,0.8);
    }
    .card-price-free {
      font-size: 13px;
      letter-spacing: 2px;
      color: #64FFAA;
    }

    /* stock bar */
    .card-stock-wrap {
      padding: 0 16px 12px;
    }
    .stock-bar-bg {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .stock-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #64D2FF, #3AACDF);
      transition: width 0.6s ease;
    }
    .stock-label {
      font-size: 8px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.35);
    }
    .stock-label span { color: rgba(255,255,255,0.55); }

    /* buy / owned button */
    .card-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-buy {
      background: linear-gradient(135deg, #3AACDF 0%, #1E8EC4 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 8px 14px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-buy:active { transform: scale(0.95); opacity: 0.8; }
    .btn-buy.bundle {
      background: linear-gradient(135deg, #D4A017 0%, #B8860B 100%);
      font-size: 8px;
      padding: 6px 10px;
    }

    .btn-owned {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(100,255,160,0.12);
      border: 1px solid rgba(100,255,160,0.3);
      border-radius: 10px;
      color: #64FFAA;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 8px 12px;
    }

    .btn-free {
      background: linear-gradient(135deg, #64FFAA 0%, #32CC80 100%);
      border: none;
      border-radius: 10px;
      color: #050F1A;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 8px 14px;
    }

    /* tier accent line */
    .card-accent {
      height: 2px;
      width: 100%;
    }

    /* skeleton */
    .card-skeleton {
      height: 106px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%,100% { opacity: 0.4; }
      50%      { opacity: 0.8; }
    }

    /* ── INTRO BOX ── */
    .intro-box {
      width: calc(100% - 32px);
      max-width: 480px;
      background: rgba(100,210,255,0.07);
      border: 1px solid rgba(100,210,255,0.18);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 14px;
      text-align: center;
    }
    .intro-box p {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
      line-height: 1.8;
    }
    .intro-box strong { color: #64D2FF; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 62px;
      background: rgba(5,15,26,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-item.active { color: #64D2FF; }
    .nav-item svg { width: 22px; height: 22px; fill: currentColor; }

    /* lang button */
    #lang-btn {
      position: fixed; top: 56px; right: 14px; z-index: 200;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px; padding: 5px 11px;
      color: #fff; font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9px; letter-spacing: 2px; cursor: pointer;
    }
  </style>
</head>

  <script>
    var sb = (typeof supabase !== 'undefined' && typeof SUPABASE_URL !== 'undefined')
      ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

    var uid = localStorage.getItem('nava_peace_uid');

    // Tier accent colors
    var TIER_COLORS = {
      'PEACE_LOVER':      '#64D2FF',
      'PEACE_GARDENER':   '#64FFAA',
      'PEACE_GUARDIAN':   '#3AACDF',
      'PEACE_GUIDE':      '#7B9FFF',
      'PEACE_ILLUMINATOR':'#BF7FFF',
      'PEACE_LEGEND':     '#FFD040',
      'ANGEL_OF_PEACE':   '#FF8FB0',
      'PEACE_POWER':      '#FF6B6B',
    };

    var TIER_ICONS = {
      'PEACE_LOVER':      '🕊',
      'PEACE_GARDENER':   '🌱',
      'PEACE_GUARDIAN':   '🛡️',
      'PEACE_GUIDE':      '🌟',
      'PEACE_ILLUMINATOR':'✨',
      'PEACE_LEGEND':     '👑',
      'ANGEL_OF_PEACE':   '😇',
      'PEACE_POWER':      '⚡',
    };

    function fmtStock(sold, total) {
      if (!total) return null;
      var remaining = total - (sold || 0);
      if (remaining < 0) remaining = 0;
      return remaining.toLocaleString();
    }

    function pct(sold, total) {
      if (!total) return 0;
      return Math.min(100, ((sold || 0) / total) * 100);
    }

    function renderCards(cards, ownedCodes) {
      var list = document.getElementById('cards-list');
      if (!cards || cards.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.4);font-size:11px;padding:40px 0;">No cards found.</p>';
        return;
      }

      // Update banner with highest owned card
      var owned = cards.filter(c => ownedCodes.has(c.code)).sort((a,b) => b.sort_order - a.sort_order);
      if (owned.length > 0) {
        var top = owned[0];
        var banner = document.getElementById('my-card-banner');
        banner.style.display = 'flex';
        document.getElementById('banner-icon').textContent = TIER_ICONS[top.code] || '🕊';
        document.getElementById('banner-name').textContent = top.name;
        document.getElementById('banner-mult').textContent = '×' + top.multiplier + ' MULTIPLIER';
      }

      list.innerHTML = cards.map(function(c) {
        var isOwned  = ownedCodes.has(c.code);
        var isFree   = !c.price_usd || c.price_usd === 0;
        var color    = TIER_COLORS[c.code] || '#64D2FF';
        var icon     = TIER_ICONS[c.code] || '🕊';
        var remaining= fmtStock(c.stock_sold, c.stock_total);
        var soldPct  = pct(c.stock_sold, c.stock_total);
        var imgSrc   = 'cards/' + c.code + '.png';

        // Price display
        var priceHtml = '';
        if (isFree) {
          priceHtml = '<span class="card-price-free">FREE</span>';
        } else {
          priceHtml = '<div class="card-price-wrap">'
            + '<span class="card-price-single">$' + c.price_usd + '</span>'
            + (c.bundle_price_usd ? '<span class="card-price-bundle">BUNDLE $' + c.bundle_price_usd + '</span>' : '')
            + '</div>';
        }

        // Button
        var btnHtml = '';
        if (isOwned) {
          btnHtml = '<div class="btn-owned">✓ YOURS</div>';
        } else if (isFree) {
          btnHtml = '<button class="btn-free" onclick="claimFree(\'' + c.code + '\')">CLAIM</button>';
        } else {
          btnHtml = '<div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end;">'
            + '<button class="btn-buy" onclick="buyCard(\'' + c.code + '\',false)">BUY $' + c.price_usd + '</button>'
            + (c.bundle_price_usd ? '<button class="btn-buy bundle" onclick="buyCard(\'' + c.code + '\',true)">BUNDLE $' + c.bundle_price_usd + '</button>' : '')
            + '</div>';
        }

        // Stock section
        var stockHtml = '';
        if (c.stock_total) {
          var avail = (c.stock_total - (c.stock_sold || 0)).toLocaleString();
          stockHtml = '<div class="card-stock-wrap">'
            + '<div class="stock-bar-bg"><div class="stock-bar-fill" style="width:' + soldPct + '%;background:linear-gradient(90deg,' + color + '88,' + color + ');"></div></div>'
            + '<div class="stock-label"><span>' + avail + '</span> AVAILABLE</div>'
            + '</div>';
        } else {
          stockHtml = '<div class="card-stock-wrap"><div class="stock-label" style="color:rgba(100,255,160,0.5);">UNLIMITED</div></div>';
        }

        return '<div class="peace-card' + (isOwned ? ' owned' : '') + (isFree ? ' free-card' : '') + '">'
          + '<div class="card-accent" style="background:linear-gradient(90deg,' + color + '60,transparent);"></div>'
          + '<div class="card-inner">'
          +   '<div class="card-img-wrap">'
          +     '<img src="' + imgSrc + '" alt="' + c.name + '" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\';">'
          +     '<div class="card-img-fallback" style="display:none;">' + icon + '</div>'
          +   '</div>'
          +   '<div class="card-info">'
          +     '<div class="card-name">' + c.name + '</div>'
          +     '<div class="card-meta">'
          +       '<span class="card-mult" style="color:' + color + ';border-color:' + color + '44;background:' + color + '18;">×' + c.multiplier + '</span>'
          +       priceHtml
          +     '</div>'
          +   '</div>'
          +   '<div class="card-btn-wrap">' + btnHtml + '</div>'
          + '</div>'
          + stockHtml
          + '</div>';
      }).join('');
    }

    async function loadCards() {
      if (!sb) {
        renderCards([], new Set());
        return;
      }
      try {
        // Load all cards
        var cardsRes = await sb.from('nava_badges').select('*').order('sort_order');
        var cards = cardsRes.data || [];

        // Load user's owned cards
        var ownedCodes = new Set(['PEACE_LOVER']); // everyone has it
        if (uid) {
          var ownedRes = await sb.from('user_badges').select('badge_code').eq('user_uid', uid);
          (ownedRes.data || []).forEach(function(r) { ownedCodes.add(r.badge_code); });
        }

        renderCards(cards, ownedCodes);
      } catch(e) {
        console.warn('Cards load error', e);
        document.getElementById('cards-list').innerHTML =
          '<p style="text-align:center;color:rgba(255,100,100,0.7);font-size:10px;padding:40px 0;letter-spacing:2px;">CONNECTION ERROR</p>';
      }
    }

    async function claimFree(code) {
      if (!uid || !sb) return;
      try {
        await sb.from('user_badges').upsert({ user_uid: uid, badge_code: code }, { onConflict: 'user_uid,badge_code' });
        loadCards();
      } catch(e) { console.warn('Claim error', e); }
    }

    function buyCard(code, isBundle) {
      var old = document.getElementById('buy-toast');
      if (old) old.remove();
      var el = document.createElement('div');
      el.id = 'buy-toast';
      el.style.cssText =
        'position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:99999;' +
        'background:linear-gradient(135deg,rgba(58,172,223,0.97),rgba(30,142,196,0.97));' +
        'border:1px solid rgba(255,255,255,0.3);border-radius:50px;' +
        'padding:10px 26px;font-family:Nasalization,Arial,sans-serif;' +
        'font-size:9px;letter-spacing:3px;color:#fff;white-space:nowrap;' +
        'box-shadow:0 4px 24px rgba(58,172,223,0.4);' +
        'opacity:0;transition:opacity 0.4s ease,top 0.4s ease;pointer-events:none;';
      el.textContent = '🕊  COMING SOON — STAY TUNED!';
      document.body.appendChild(el);
      requestAnimationFrame(function () {
        el.style.opacity = '1';
        setTimeout(function () {
          el.style.opacity = '0';
          el.style.top = '8px';
          setTimeout(function () { el.remove(); }, 450);
        }, 2800);
      });
    }

    // ── Lang button ──────────────────────────────────────────────────────
    var LANGS = ['en','fr','es','ar','zh','hi','pt','ru','ja','ko','th','de','it'];
    function cycleLang() {
      if (typeof window.NAVA_LANG === 'undefined') return;
      var idx = LANGS.indexOf(window.NAVA_LANG);
      var next = LANGS[(idx + 1) % LANGS.length];
      if (typeof setLang === 'function') { setLang(next); updateLangBtn(); }
    }
    function updateLangBtn() {
      var FLAGS = {en:'🇬🇧',fr:'🇫🇷',es:'🇪🇸',ar:'🇸🇦',zh:'🇨🇳',hi:'🇮🇳',pt:'🇧🇷',ru:'🇷🇺',ja:'🇯🇵',ko:'🇰🇷',th:'🇹🇭',de:'🇩🇪',it:'🇮🇹'};
      var l = window.NAVA_LANG || 'en';
      var btn = document.getElementById('lang-btn');
      if (btn) btn.textContent = (FLAGS[l] || '🌐') + ' ' + l.toUpperCase();
    }

    // ── Init ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      updateLangBtn();
      loadCards();
      // Discovery dove
      try { NAVA_DISCOVERY.check('market', sb); } catch(e) {}
    });
  </script>
</body>
</html>
