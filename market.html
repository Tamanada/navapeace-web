<!DOCTYPE html>
<html lang="en" data-module="module_market">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVA PEACE – Market</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <script src="module_gate.js"></script>
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nava-peace.app/market.html" />
  <meta property="og:title" content="NAVA PEACE – Peace Store" />
  <meta property="og:description" content="Shop the NAVA PEACE collection. Wear the movement — choose peace every day." />
  <meta property="og:image" content="https://nava-peace.app/logo.png" />
  <meta property="og:image:width" content="512" />
  <meta property="og:image:height" content="512" />
  <meta property="og:image:alt" content="NAVA PEACE Logo" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://nava-peace.app/logo.png" />
  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('nasalization.woff') format('woff');
    }
  </style>
  <script src="supabase_config.js"></script>
  <script src="lang.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 14px 110px;
      color: #fff;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }
    .header img {
      width: 60px; height: 60px;
      object-fit: contain;
      filter: drop-shadow(0 3px 10px rgba(255,255,255,0.4));
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 30px;
      letter-spacing: 7px;
      text-shadow: 0 1px 16px rgba(255,255,255,0.4);
    }
    .header .tagline {
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
      text-transform: uppercase;
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      width: 100%;
      max-width: 600px;
      margin-bottom: 18px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 12px 18px 12px 44px;
      border-radius: 16px;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      outline: none;
      text-transform: uppercase;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,0.4); }
    .search-wrap input:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.2); }
    .search-wrap .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ── GRID ── */
    .grid {
      width: 100%;
      max-width: 600px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: rgba(247,247,241,0.13);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 4px 24px rgba(20,80,130,0.18);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .product-card:active { transform: scale(0.97); }

    .product-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.08);
    }

    .product-body {
      padding: 12px 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .product-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #fff;
      text-transform: uppercase;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-size: 13px;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.7);
    }
    .product-price .from {
      font-size: 9px;
      letter-spacing: 2px;
      opacity: 0.6;
      display: block;
      margin-bottom: 1px;
    }
    .product-price .amount {
      font-size: 16px;
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.3);
    }

    .product-buy {
      display: block;
      width: 100%;
      padding: 9px 4px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,255,255,0.88) 0%, #E7E1D4 100%);
      color: #1A6E96;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(255,255,255,0.18);
      transition: opacity 0.2s;
      margin-top: auto;
    }
    .product-buy:hover { opacity: 0.88; }

    /* ── SKELETON ── */
    .skeleton {
      background: rgba(247,247,241,0.13);
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      overflow: hidden;
    }
    .skeleton-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.1);
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line {
      height: 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      animation: shimmer 1.4s ease-in-out infinite;
    }
    .skeleton-line.short { width: 55%; }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ── PAGINATION ── */
    .pagination {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 22px;
      justify-content: center;
    }
    .page-btn {
      padding: 10px 22px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.14);
      color: #fff;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .page-btn:hover:not(:disabled) { background: rgba(255,255,255,0.25); }
    .page-btn:disabled { opacity: 0.35; cursor: default; }
    .page-info {
      font-size: 11px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.55);
    }

    /* ── EMPTY / ERROR ── */
    .status-msg {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 48px 20px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      line-height: 2;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(20, 90, 140, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 10px 0 24px;
      z-index: 200;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
      color: rgba(255,255,255,0.45);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-item.active { color: #fff; }
    .nav-item svg { width: 24px; height: 24px; fill: currentColor; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" alt="NAVA PEACE" />
    <h1>NAVA PEACE</h1>
    <p class="tagline" data-i18n="market_tagline">PEACE STORE</p>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" data-i18n-ph="market_search" placeholder="SEARCH PRODUCTS…" oninput="onSearch()" />
  </div>

  <!-- PRODUCT GRID -->
  <div class="grid" id="grid"></div>

  <!-- STATUS (empty/error) -->
  <div class="status-msg" id="statusMsg" style="display:none;"></div>

  <!-- PAGINATION -->
  <div class="pagination" id="pagination" style="display:none;">
    <button class="page-btn" id="btnPrev" onclick="goPage(currentPage - 1)" disabled data-i18n="market_prev">← PREV</button>
    <span class="page-info" id="pageInfo"></span>
    <button class="page-btn" id="btnNext" onclick="goPage(currentPage + 1)" data-i18n="market_next">NEXT →</button>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="peace.html" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.8"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      <span data-i18n="nav_peace">PEACE</span>
    </a>
    <a href="map.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      <span data-i18n="nav_map">MAP</span>
    </a>
    <a href="market.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M19 6h-2c0-2.76-2.24-5-5-5S7 3.24 7 6H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7-3c1.66 0 3 1.34 3 3H9c0-1.66 1.34-3 3-3zm0 10c-1.66 0-3-1.34-3-3h2c0 .55.45 1 1 1s1-.45 1-1h2c0 1.66-1.34 3-3 3z"/></svg>
      <span data-i18n="nav_market">MARKET</span>
    </a>
    <a href="profile.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <span data-i18n="nav_profile">PROFILE</span>
    </a>
    <a href="about.html" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="12" y1="11" x2="12" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/></svg>
      <span data-i18n="nav_about">ABOUT</span>
    </a>
  </nav>

  <script>
    // ── CONFIG ──────────────────────────────────────────────────────────
    // Replace with your Supabase Edge Function URL after deploying
    const EDGE_FN_URL   = SUPABASE_URL + '/functions/v1/printify-proxy';
    const ITEMS_PER_PAGE = 20;

    // Replace with your Printify Pop-up Store base URL
    // e.g. 'https://printify.me/app/store/your-handle'
    const SHOP_URL = 'https://printify.me/app/store/YOUR_HANDLE';

    // ── STATE ────────────────────────────────────────────────────────────
    let currentPage = 1;
    let totalPages  = 1;
    let searchQuery = '';
    let allProducts = [];   // local cache of current page
    let searchTimer = null;

    // ── INIT ─────────────────────────────────────────────────────────────
    loadPage(1);

    // ── FETCH & RENDER ───────────────────────────────────────────────────
    async function loadPage(page) {
      currentPage = page;
      renderSkeletons();

      try {
        const url = `${EDGE_FN_URL}?action=products&page=${page}&limit=${ITEMS_PER_PAGE}`;
        const res  = await fetch(url, {
          headers: { 'apikey': typeof SUPABASE_ANON_KEY !== 'undefined' ? SUPABASE_ANON_KEY : '' }
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        allProducts = data.data ?? [];
        totalPages  = data.last_page ?? 1;

        renderProducts(filterProducts(allProducts));
        renderPagination();

      } catch (err) {
        showStatus(t('market_error') || 'Failed to load products.');
        console.warn('Market load error', err);
      }
    }

    function filterProducts(products) {
      if (!searchQuery) return products;
      const q = searchQuery.toLowerCase();
      return products.filter(p =>
        (p.title || '').toLowerCase().includes(q) ||
        (p.tags  || []).some(tag => tag.toLowerCase().includes(q))
      );
    }

    function onSearch() {
      searchQuery = document.getElementById('searchInput').value.trim();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const filtered = filterProducts(allProducts);
        renderProducts(filtered);
      }, 280);
    }

    // ── RENDER HELPERS ────────────────────────────────────────────────────
    function renderSkeletons() {
      const grid = document.getElementById('grid');
      document.getElementById('statusMsg').style.display = 'none';
      grid.innerHTML = Array(6).fill(0).map(() => `
        <div class="skeleton">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
            <div class="skeleton-line short"></div>
          </div>
        </div>`).join('');
    }

    function renderProducts(products) {
      const grid = document.getElementById('grid');

      if (!products || products.length === 0) {
        grid.innerHTML = '';
        showStatus(t('market_empty') || 'No products found.');
        return;
      }

      document.getElementById('statusMsg').style.display = 'none';
      grid.innerHTML = products.map(p => productCard(p)).join('');
    }

    function productCard(p) {
      const price   = p.min_price ? (p.min_price / 100).toFixed(2) : '—';
      const imgSrc  = p.image || '';
      const buyHref = productUrl(p);
      const fromLbl = t('market_from') || 'FROM';

      return `
        <div class="product-card">
          ${imgSrc
            ? `<img class="product-img" src="${imgSrc}" alt="${escHtml(p.title)}" loading="lazy" />`
            : `<div class="product-img" style="display:flex;align-items:center;justify-content:center;font-size:40px;">🕊</div>`
          }
          <div class="product-body">
            <p class="product-title">${escHtml(p.title)}</p>
            <div class="product-price">
              <span class="from">${fromLbl}</span>
              <span class="amount">$${price}</span>
            </div>
            <a class="product-buy" href="${buyHref}" target="_blank" rel="noopener"
               data-i18n="market_buy">🛍 SHOP</a>
          </div>
        </div>`;
    }

    function productUrl(p) {
      // If product is published to a sales channel, use external handle
      if (p.external && p.external.handle) {
        return `${SHOP_URL}/${p.external.handle}`;
      }
      // Fallback to the main shop URL
      return SHOP_URL;
    }

    function renderPagination() {
      const pag      = document.getElementById('pagination');
      const btnPrev  = document.getElementById('btnPrev');
      const btnNext  = document.getElementById('btnNext');
      const pageInfo = document.getElementById('pageInfo');

      if (totalPages <= 1) {
        pag.style.display = 'none';
        return;
      }

      pag.style.display      = 'flex';
      btnPrev.disabled       = currentPage <= 1;
      btnNext.disabled       = currentPage >= totalPages;
      pageInfo.textContent   = `${currentPage} / ${totalPages}`;
    }

    function goPage(page) {
      if (page < 1 || page > totalPages) return;
      window.scrollTo({ top: 0, behavior: 'smooth' });
      loadPage(page);
    }

    function showStatus(msg) {
      const el = document.getElementById('statusMsg');
      el.style.display = 'block';
      el.textContent   = msg;
      document.getElementById('pagination').style.display = 'none';
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
