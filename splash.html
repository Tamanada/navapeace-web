  <!-- ① Telegram detection — runs synchronously, zero network, no blocking -->
  <script>
  (function () {
    var h = window.location.hash || '';
    var isTg =
      h.indexOf('tgWebAppData')    !== -1 ||
      h.indexOf('tgWebAppVersion') !== -1 ||
      !!window.TelegramWebviewProxy ||
      !!(window.Telegram && window.Telegram.WebApp) ||
      !!localStorage.getItem('nava_peace_country') ||
      (localStorage.getItem('nava_peace_uid') || '').indexOf('tg_') === 0;
    window._NAVA_IS_TG = isTg;

    if (isTg) {
      document.documentElement.classList.add('in-tg');
    } else {
      // Might not be Telegram — show block page, redirect after short delay
      // (delay allows async telegram-web-app.js to load and re-confirm)
      document.documentElement.classList.add('not-tg');
      setTimeout(function() {
        // Re-check after CDN script may have loaded
        if (window.Telegram && window.Telegram.WebApp) {
          document.documentElement.classList.remove('not-tg');
          document.documentElement.classList.add('in-tg');
        } else {
          window.location.replace('https://t.me/NavaPeaceBot/app');
        }
      }, 800);
    }
  })();
  </script>

    #tg-block { display: none !important; }

    html.not-tg .ticker-wrap { display: none !important; }
    html.not-tg .enter-link  { display: none !important; }

    /* ── STAGE ── */
    .stage {
      position: fixed; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: 90px;
      transition: opacity 0.6s ease;
    }
    .stage::before {
      content: '';
      position: fixed; top: -5%; left: 50%;
      transform: translateX(-50%);
      width: 130vw; height: 75vh;
      background: radial-gradient(ellipse, rgba(255,255,255,0.10) 0%, transparent 68%);

      animation: bgBreath 14s ease-in-out infinite;

    /* ── LOGO ── */

      animation: logoFadeIn 1.2s ease-out both,
                 logoFloat 10s 1.3s ease-in-out infinite;

    .logo-img {
      width: min(220px, 26vh); height: min(220px, 26vh); object-fit: contain;

    /* ── BRAND ── */
    .brand {

      text-transform: uppercase;

      text-shadow: 0 0 60px rgba(255,255,255,0.35), 0 4px 30px rgba(30,100,170,0.4);
      animation: heroReveal 2s 1.8s ease-out both;
      user-select: none;
      transition: opacity 0.4s ease;

    /* ── DIVIDER ── */
    .divider {
      width: clamp(60px, 10vw, 140px); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);

      animation: fadeIn 0.8s 0.4s ease both;

      animation: ticker 40s linear infinite;
      will-change: transform;
    }
    .ticker-item {
      display: inline-flex; align-items: center;
      padding: 0 30px;

    /* ── ENTER LINK ── */
    .enter-link {
      position: fixed; bottom: 86px; right: 28px;

      color: rgba(255,255,255,0.55);

    /* ── ANIMATIONS ── */
    @keyframes fadeIn    { from { opacity: 0; } to { opacity: 1; } }
    @keyframes ticker    { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    @keyframes logoFadeIn { 0% { opacity:0; transform:scale(0.84); } 60% { opacity:.9; } 100% { opacity:1; transform:scale(1); } }
    @keyframes logoBlur  { 0% { filter:blur(8px) brightness(1.6); } 50% { filter:blur(2px) brightness(1.1); } 100% { filter:blur(0) brightness(1) drop-shadow(0 12px 50px rgba(255,255,255,.5)) drop-shadow(0 0 70px rgba(109,213,245,.35)); } }
    @keyframes logoGlow  { 0%,100% { filter:drop-shadow(0 12px 50px rgba(255,255,255,.48)) drop-shadow(0 0 70px rgba(109,213,245,.28)); } 50% { filter:drop-shadow(0 18px 80px rgba(255,255,255,.78)) drop-shadow(0 0 120px rgba(109,213,245,.55)); } }
    @keyframes logoFloat { 0%,100% { transform:translateY(0) rotate(0deg); } 35% { transform:translateY(-12px) rotate(0.5deg); } 70% { transform:translateY(-6px) rotate(-0.3deg); } }
    @keyframes brandReveal { 0% { opacity:0; letter-spacing:4px; } 100% { opacity:1; } }
    @keyframes heroReveal  { 0% { opacity:0; filter:blur(10px); } 50% { opacity:.7; filter:blur(2px); } 100% { opacity:1; filter:blur(0); } }
    @keyframes msgReveal   { 0% { opacity:0; transform:translateY(10px); } 100% { opacity:1; transform:translateY(0); } }
    @keyframes tapPulse    { 0%,100% { opacity:.3; } 50% { opacity:.75; } }

    /* ── MOBILE ── */

      .brand { letter-spacing: 7px; font-size: 15px; }

      .ticker-track { animation-duration: 30s; }
      .enter-link { bottom: 66px; right: 16px; font-size: 10px; }
    }
  </style>

      try { sessionStorage.setItem('nava_splash_shown', '1'); } catch(e) {}
      // Clear stale module cache
      try { localStorage.removeItem('nava_modules'); localStorage.removeItem('nava_modules_ts'); } catch(e) {}

      // Call Telegram.WebApp.ready() if available
      try {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          try {
            window.Telegram.WebApp.setHeaderColor('#43b4e4');
            window.Telegram.WebApp.setBackgroundColor('#43b4e4');
          } catch(e) {}
        }
      } catch(e) {}

      // Check for returning user in localStorage
      var country = ls('nava_peace_country');
      var uid     = ls('nava_peace_uid');

      if (uid && country) {
        // Returning user — refresh pseudo/message from DB in background
        sbGet('peace_messages?select=pseudo,message&user_uid=eq.' + encodeURIComponent(uid) + '&limit=1')
          .then(function (d) {
            if (d && d[0]) {
              if (d[0].pseudo)  ls('nava_peace_pseudo',  d[0].pseudo);
              if (d[0].message) ls('nava_peace_message', d[0].message);
            }
          }).catch(function(){});

        // Redirect after logo is visible (~1s)
        var today = new Date().toISOString().split('T')[0];
        var dest  = (ls('nava_peace_voted') === today) ? 'map.html' : 'peace.html';
        setTimeout(function () { fadeAndGo(dest); }, 1000);
        return;
      }

      // New visitor — read Telegram user to check DB
      var _attempts = 0;
      function tryRestore() {
        _attempts++;
        var tg = null;
        try { tg = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user; } catch(e) {}

        if (tg && tg.id) {
          // Store uid & startParam
          var myUID = 'tg_' + tg.id;
          ls('nava_peace_uid', myUID);
          try {
            var sp = window.Telegram.WebApp.initDataUnsafe.start_param;
            if (sp) ls('nava_peace_referred_by', sp.toUpperCase());
            // Store language from Telegram
            if (tg.language_code) {
              var supported = ['en','fr','es','pt','ar','zh','hi','ja','ru','de','ko','uk'];
              var lc = tg.language_code.substring(0,2).toLowerCase();
              if (supported.indexOf(lc) !== -1 && !ls('nava_peace_lang')) ls('nava_peace_lang', lc);
            }
          } catch(e) {}

          // Check DB: has this user registered?
          sbGet('peace_votes?select=referral_code,referred_by,country,age,gender,created_at&user_uid=eq.' + encodeURIComponent(myUID) + '&order=created_at.desc&limit=1')
            .then(function (data) {
              if (data && data.length > 0) {
                var row = data[0];
                ls('nava_peace_country', row.country || 'XX');
                if (row.referral_code) ls('nava_peace_ref_code',    row.referral_code);
                if (row.age)           ls('nava_peace_age',         row.age);
                if (row.gender)        ls('nava_peace_gender',      row.gender);
                if (row.referred_by)   ls('nava_peace_referred_by', row.referred_by);
                if (row.created_at)    ls('nava_peace_voted',       row.created_at.split('T')[0]);
                // Also fetch pseudo/message
                return sbGet('peace_messages?select=pseudo,message&user_uid=eq.' + encodeURIComponent(myUID) + '&limit=1')
                  .then(function (pm) {
                    if (pm && pm[0]) {
                      if (pm[0].pseudo)  ls('nava_peace_pseudo',  pm[0].pseudo);
                      if (pm[0].message) ls('nava_peace_message', pm[0].message);
                    }
                    fadeAndGo('peace.html');
                  }).catch(function () { fadeAndGo('peace.html'); });
              }
              // Check nava_discoveries
              return sbGet('nava_discoveries?select=user_uid&user_uid=eq.' + encodeURIComponent(myUID) + '&limit=1')
                .then(function (disc) {
                  if (disc && disc.length > 0) {
                    ls('nava_peace_uid', myUID);
                    fadeAndGo('peace.html');
                  } else {
                    showForm(); // Truly new visitor
                  }
                });
            }).catch(function () { showForm(); });

        } else if (_attempts < 6) {
          // WebApp not ready yet — retry
          setTimeout(tryRestore, 300);
        } else {
          // Give up — show form
          showForm();
        }
      }

      // Hard fallback: show form after 2s no matter what
      setTimeout(function () { showForm(); }, 2000);

      // Start restore after short delay (let WebApp initialize on mobile)
      setTimeout(tryRestore, 250);
    })();

  })();
  </script>

  <!-- ④ Support scripts — loaded last, non-blocking.
       supabase_config.js sets SUPABASE_URL/KEY globals for module_gate.js.
       telegram.js sets NAVA_TG global used by other pages.
       module_gate.js hides disabled nav items. -->
  <script src="supabase_config.js"></script>
  <script src="telegram.js"></script>
  <script src="module_gate.js?v=6"></script>

</body>
</html>
