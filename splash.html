  <!-- FIRST script — runs before body renders, zero network dependency -->
  <script>
  (function(){
    var h = window.location.hash || '';
    var isTg = h.indexOf('tgWebAppData') !== -1 ||
               h.indexOf('tgWebAppVersion') !== -1 ||
               !!window.TelegramWebviewProxy ||
               !!(window.Telegram && window.Telegram.WebApp) ||
               !!localStorage.getItem('nava_peace_country') ||
               (localStorage.getItem('nava_peace_uid') || '').indexOf('tg_') === 0;
    window._NAVA_IN_TG = isTg;
    if (isTg) {
      document.documentElement.classList.add('in-tg');
    } else {
      window.location.replace('https://t.me/NavaPeaceBot/app');
    }
  })();

  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal; font-weight: 400; font-display: swap;
      src: url('nasalization.woff') format('woff');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Nasalization', Arial, sans-serif;
    }

    html {
      height: 100%; width: 100%;
      /* pas d'overflow:hidden — iOS Safari clippe les position:fixed quand html OU body ont overflow:hidden */
    }
    body {
      height: 100%; width: 100%;
      overscroll-behavior: none; /* empêche le pull-to-refresh sans bloquer le ticker */
      font-family: var(--font);
      background: radial-gradient(ellipse at 50% 20%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
    }

    /* ── MAIN LAYOUT ───────────────────────────── */
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: 90px; /* room for ticker */
    }

    /* ── BACKGROUND BREATH ─────────────────────── */
    .stage::before {
      content: '';
      position: fixed; top: -5%; left: 50%;
      transform: translateX(-50%);
      width: 130vw; height: 75vh;
      background: radial-gradient(ellipse, rgba(255,255,255,0.10) 0%, transparent 68%);
      pointer-events: none;
      animation: bgBreath 14s ease-in-out infinite;
    }

    /* ── LOGO ──────────────────────────────────── */
    .logo-wrap {
      margin-bottom: min(36px, 3.5vh);
      animation: logoFadeIn 1.5s ease-out both,
                 logoFloat 10s 1.7s ease-in-out infinite;
    }
    .logo-img {
      /* min(286px, 28vh) : sur PC 800px de haut → 224px ; mobile portrait inchangé */
      width: min(286px, 28vh); height: min(286px, 28vh); object-fit: contain;
      animation: logoBlur 1.5s ease-out both,
                 logoGlow 7s 1.7s ease-in-out infinite;
    }
    .logo-fallback {
      font-size: min(170px, 20vh);
      line-height: 1;
      animation: logoBlur 1.5s ease-out both,
                 logoGlow 7s 1.7s ease-in-out infinite;
    }

    /* ── BRAND NAME ────────────────────────────── */
    .brand {
      font-size: clamp(18px, 3vw, 30px);
      letter-spacing: clamp(10px, 2vw, 22px);
      color: rgba(255,255,255,0.72);
      text-transform: uppercase;
      margin-bottom: 20px;
      animation: brandReveal 2.2s 1.8s ease-out both;
    }

    /* ── HERO TEXT ─────────────────────────────── */
    .hero {
      /* min(11vw, 9vh) : sur PC 1280×800 → min(140px, 72px) = 72px ; mobile portrait inchangé */
      font-size: clamp(48px, min(11vw, 9vh), 160px);
      letter-spacing: clamp(4px, min(1.2vw, 0.8vh), 18px);
      color: #ffffff;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
      text-shadow:
        0 0 60px rgba(255,255,255,0.35),
        0 0 120px rgba(255,255,255,0.15),
        0 4px 30px rgba(30,100,170,0.4);
      animation: heroReveal 2.8s 2.6s ease-out both;
      user-select: none;
    }

    /* ── DIVIDER ───────────────────────────────── */
    .divider {
      width: clamp(60px, 10vw, 140px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      margin: 28px auto 16px;
      animation: fadeIn 2s 4s ease both;
    }

    /* ── DAILY MESSAGE ──────────────────────────── */
    .daily-msg {
      font-size: clamp(14px, 1.9vw, 22px);
      letter-spacing: clamp(2px, 0.5vw, 5px);
      color: rgba(255,255,255,0.58);
      text-transform: uppercase;
      text-align: center;
      max-width: 560px;
      padding: 0 24px;
      line-height: 1.65;
      animation: msgReveal 2.5s 4.6s ease both;
    }
    .daily-msg-date {
      display: block;
      font-size: clamp(10px, 1.1vw, 13px);
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    /* ── BOTTOM TICKER ─────────────────────────── */
    .ticker-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      height: 72px;
      background: rgba(10, 40, 80, 0.72);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center;
      overflow: hidden;
      animation: fadeIn 1s 0.8s ease both;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker 42s linear infinite;
      will-change: transform;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      padding: 0 36px;
      font-size: clamp(14px, 1.9vw, 24px);
      letter-spacing: clamp(3px, 0.6vw, 8px);
      color: rgba(255,255,255,0.88);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-sep {
      width: 1px; height: 26px;
      background: rgba(255,255,255,0.22);
      flex-shrink: 0;
    }

    /* ── TAP TO CONTINUE ───────────────────────── */
    .tap-hint {
      margin-top: clamp(18px, 3vh, 28px);
      font-size: clamp(9px, 1.1vw, 12px);
      letter-spacing: clamp(5px, 1vw, 10px);
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      opacity: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    @keyframes tapPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.75; }
    }

    /* ── LINK (nouveau visiteur) ────────────────── */
    .enter-link {
      position: fixed;
      bottom: 90px; right: 32px;
      font-size: 13px; letter-spacing: 4px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
      animation: fadeIn 1.2s 1.4s ease both;
      z-index: 10;
    }
    .enter-link:hover { color: #fff; border-color: rgba(255,255,255,0.7); }

    /* ── ANIMATIONS ────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Background glow pulse — very subtle */
    @keyframes bgBreath {
      0%, 100% { opacity: 0.55; transform: translateX(-50%) scale(1);    }
      50%       { opacity: 1;    transform: translateX(-50%) scale(1.18); }
    }

    /* Logo — slow materialise from light */
    @keyframes logoFadeIn {
      0%   { opacity: 0; transform: scale(0.82); }
      60%  { opacity: 0.88; }
      100% { opacity: 1;  transform: scale(1); }
    }

    /* Logo blur clearing — filter only */
    @keyframes logoBlur {
      0%   { filter: blur(8px)  brightness(1.6)
                     drop-shadow(0 0 0px rgba(255,255,255,0)); }
      50%  { filter: blur(2px)  brightness(1.15)
                     drop-shadow(0 8px 30px rgba(255,255,255,0.3)); }
      100% { filter: blur(0px)  brightness(1)
                     drop-shadow(0 12px 50px rgba(255,255,255,0.50))
                     drop-shadow(0 0 80px rgba(109,213,245,0.35)); }
    }

    /* Logo glow breathing — continuous */
    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 12px 50px rgba(255,255,255,0.48))
                         drop-shadow(0 0 70px rgba(109,213,245,0.28)); }
      50%       { filter: drop-shadow(0 18px 80px rgba(255,255,255,0.78))
                         drop-shadow(0 0 120px rgba(109,213,245,0.55)); }
    }

    /* Logo float — slow, like breathing */
    @keyframes logoFloat {
      0%,  100% { transform: translateY(0px)   rotate(0deg);    }
      35%        { transform: translateY(-14px) rotate(0.6deg);  }
      70%        { transform: translateY(-8px)  rotate(-0.4deg); }
    }

    /* Brand name — letter-spacing expansion */
    @keyframes brandReveal {
      0%   { opacity: 0; letter-spacing: 5px; }
      100% { opacity: 1; letter-spacing: clamp(10px, 2vw, 22px); }
    }

    /* Hero text — blur to sharp */
    @keyframes heroReveal {
      0%   { opacity: 0; filter: blur(10px); }
      45%  { opacity: 0.7; filter: blur(2px); }
      100% { opacity: 1; filter: blur(0); }
    }

    /* Daily message — soft rise */
    @keyframes msgReveal {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ────────────────────────────── */
    @media (max-width: 600px) {
      .brand { letter-spacing: 8px; font-size: 16px; }
      .logo-img { width: 195px; height: 195px; }
      .logo-fallback { font-size: 120px; }

      /* Ticker mobile */
      .ticker-wrap {
        height: 56px;
      }
      .ticker-item {
        padding: 0 18px;
        font-size: clamp(13px, 4.2vw, 18px);
        letter-spacing: clamp(2px, 0.8vw, 5px);
      }
      .ticker-track {
        animation-duration: 32s; /* plus rapide car écran plus petit */
      }

      /* Ajustement stage pour ticker plus court */
      .stage { padding-bottom: 72px; }

      .enter-link { bottom: 68px; right: 18px; font-size: 11px; }
      .daily-msg { font-size: 13px; padding: 0 18px; }
      .daily-msg-date { font-size: 9px; }
    }

    /* ── TELEGRAM GATE — static CSS, zero injection, zero flash ── */
    /* Default (browser): block page visible, splash hidden        */
    #tg-block { display: flex !important; }
    .stage, .enter-link, .ticker-wrap { display: none !important; }
    /* Telegram confirmed (html.in-tg): block hidden, splash shown */
    html.in-tg #tg-block         { display: none !important; }
    html.in-tg .stage            { display: flex !important; }
    html.in-tg .enter-link       { display: block; }
    html.in-tg .ticker-wrap      { display: flex !important; }

  </style>
</head>
<body style="background:#050F1A;">

  <!-- Telegram-only block page — hidden by default, shown via CSS injected in <head> when not in Telegram -->
  <div id="tg-block" style="position:fixed;inset:0;z-index:9999;flex-direction:column;align-items:center;justify-content:center;background:#050F1A;color:#fff;font-family:Arial,sans-serif;text-align:center;padding:30px;">
    <img src="logo.png" style="width:80px;height:80px;object-fit:contain;margin-bottom:20px;opacity:0.9;" onerror="this.style.display='none'">
    <div style="font-size:22px;letter-spacing:4px;color:#64D2FF;margin-bottom:8px;">NAVA PEACE</div>
    <div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.5);margin-bottom:32px;">MAKE PEACE. MAKE CHANGE.</div>
    <div style="font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.8);margin-bottom:32px;line-height:2;">THIS APP IS ONLY AVAILABLE<br>INSIDE TELEGRAM</div>
    <a href="https://t.me/NavaPeaceBot/app" target="_blank" style="display:inline-block;padding:14px 32px;cursor:pointer;background:linear-gradient(135deg,#3AACDF,#1E8EC4);color:#fff;border-radius:12px;text-decoration:none;font-size:13px;letter-spacing:3px;">🕊 OPEN IN TELEGRAM</a>

  <!-- Optional: enter app link -->
  <a class="enter-link" href="peace.html">ENTER →</a>

  <!-- ── MAIN STAGE ─────────────────────────── -->
  <div class="stage">

    <!-- Logo -->
    <div class="logo-wrap">
      <img class="logo-img" src="logo.png" alt="NAVA PEACE"
           onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'" />

    <!-- Brand -->

  <!-- ── TICKER ─────────────────────────────── -->
  <div class="ticker-wrap" aria-label="Born to grow in 12 languages">
    <div class="ticker-track" id="ticker-track">
      <!-- filled by JS; duplicated for seamless loop -->
    </div>
  </div>

  <script>
    // Marquer la session : la splash a été vue — empêche les boucles de redirect
    sessionStorage.setItem('nava_splash_shown', '1');

    // Toujours vider le cache des modules au démarrage — l'état sera refetché depuis Supabase
    localStorage.removeItem('nava_modules');
    localStorage.removeItem('nava_modules_ts');

    // ── SESSION STATE ──────────────────────────────────────────────────────────
    var _sessionCheckDone = false;
    var _animationStarted = false;

    function _forceStartAnimation() {
      // Always start animation — bypass all guards
      if (_animationStarted) return;
      _animationStarted = true;
      // Force isTelegram flag so animation guard passes
      if (window.Telegram && window.Telegram.WebApp) {
        window._NAVA_IN_TG = true;
        NAVA_TG.isTelegram = true;
        try {
          var _u = window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
          if (_u && _u.id) {
            NAVA_TG.uid = 'tg_' + _u.id;
            localStorage.setItem('nava_peace_uid', NAVA_TG.uid);
            var _sp = window.Telegram.WebApp.initDataUnsafe.start_param;
            if (_sp) localStorage.setItem('nava_peace_referred_by', _sp.toUpperCase());
          }
        } catch(e) {}
      }
      _startSplashAnimation();
    }

    function _runSplashLogic() {
      if (_sessionCheckDone) return;
      _sessionCheckDone = true;

      // Returning user already in localStorage
      if (localStorage.getItem('nava_peace_country')) {
        var _today = new Date().toISOString().split('T')[0];
        var _dest = (localStorage.getItem('nava_peace_voted') === _today) ? 'map.html' : 'peace.html';
        window.location.replace(_dest);
        return;
      }

      _forceStartAnimation();
    }

    // ── HARD SAFETY TIMEOUT — fires no matter what after 1.5s ───────────────
    // New visitor stuck? Force animation unconditionally.
    setTimeout(function() {
      if (!_sessionCheckDone && !_animationStarted) {
        _sessionCheckDone = true;
        _forceStartAnimation();
      }
    }, 1500);

    (function restoreSession() {
      // Re-check with SDK (handles edge cases where hash was empty on mobile)
      if (!window._NAVA_IN_TG) {
        var tgSDK = window.Telegram && window.Telegram.WebApp;
        if (tgSDK && (tgSDK.initData || tgSDK.initDataUnsafe)) {
          window._NAVA_IN_TG = true;
          document.documentElement.classList.add('in-tg');
          document.body.style.background = '';
          // Re-detect user if NAVA_TG missed the race
          if (!NAVA_TG.isTelegram) {
            try {
              var _u = tgSDK.initDataUnsafe && tgSDK.initDataUnsafe.user;
              if (_u && _u.id) {
                NAVA_TG.isTelegram = true;
                NAVA_TG.uid = 'tg_' + _u.id;
                localStorage.setItem('nava_peace_uid', NAVA_TG.uid);
                var _sp = tgSDK.initDataUnsafe.start_param;
                if (_sp) localStorage.setItem('nava_peace_referred_by', _sp.toUpperCase());
              }
            } catch(e) {}
          }
        } else {
          return; // Confirmed not Telegram
        }
      }

      // ── IN TELEGRAM — restore blue splash background ───────────────────────
      document.body.style.background = '';
      if (window.Telegram && window.Telegram.WebApp) {
        try { window.Telegram.WebApp.ready(); } catch(e) {}
      }

      if (localStorage.getItem('nava_peace_country')) {
        // Returning user already in localStorage — sync pseudo in background
        var _uid = localStorage.getItem('nava_peace_uid');
        if (_uid && typeof SUPABASE_URL !== 'undefined' && window.supabase) {
          try {
            var _sbg = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            _sbg.from('peace_messages').select('pseudo, message')
              .eq('user_uid', _uid).limit(1)
              .then(function(r) {
                if (r.data && r.data[0]) {
                  if (r.data[0].pseudo)  localStorage.setItem('nava_peace_pseudo',  r.data[0].pseudo);
                  if (r.data[0].message) localStorage.setItem('nava_peace_message', r.data[0].message);
                }
              }).catch(function(){});
          } catch(e) {}
        }
        setTimeout(_runSplashLogic, 0);
        return;
      }

      // New user in Telegram — restore session from DB
      var _doRestoreAttempts = 0;
      function _doRestore() {
        _doRestoreAttempts++;
        var tgUser = window.Telegram.WebApp.initDataUnsafe &&
                     window.Telegram.WebApp.initDataUnsafe.user;

        // Retry up to 8 times (2.4s total), then give up and show splash
        if (!tgUser || !tgUser.id) {
          if (_doRestoreAttempts < 8) {
            setTimeout(_doRestore, 300);
          } else {
            _runSplashLogic(); // give up, show animation for new visitor
          }
          return;
        }

        var expectedUID = 'tg_' + tgUser.id;
        var _h = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY };
        var _base = SUPABASE_URL + '/rest/v1/';

        // 1. Cherche dans peace_votes
        fetch(_base + 'peace_votes?select=referral_code,referred_by,country,age,gender,created_at&user_uid=eq.' + encodeURIComponent(expectedUID) + '&order=created_at.desc&limit=1', { headers: _h })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data && data.length > 0) {
              var row = data[0];
              localStorage.setItem('nava_peace_uid', expectedUID);
              localStorage.setItem('nava_peace_country', row.country || 'XX');
              if (row.referral_code) localStorage.setItem('nava_peace_ref_code',    row.referral_code);
              if (row.age)           localStorage.setItem('nava_peace_age',         row.age);
              if (row.gender)        localStorage.setItem('nava_peace_gender',      row.gender);
              if (row.referred_by)   localStorage.setItem('nava_peace_referred_by', row.referred_by);
              if (row.created_at)    localStorage.setItem('nava_peace_voted',       row.created_at.split('T')[0]);
              // 2. Restaurer pseudo/message depuis peace_messages
              return fetch(_base + 'peace_messages?select=pseudo,message&user_uid=eq.' + encodeURIComponent(expectedUID) + '&limit=1', { headers: _h })
                .then(function(r2) { return r2.json(); })
                .then(function(pm) {
                  if (pm && pm[0]) {
                    if (pm[0].pseudo)  localStorage.setItem('nava_peace_pseudo',  pm[0].pseudo);
                    if (pm[0].message) localStorage.setItem('nava_peace_message', pm[0].message);
                  }
                  window.location.replace('peace.html');
                })
                .catch(function() { window.location.replace('peace.html'); });
            }
            // 3. Pas de vote — vérifier nava_discoveries
            return fetch(_base + 'nava_discoveries?select=user_uid&user_uid=eq.' + encodeURIComponent(expectedUID) + '&limit=1', { headers: _h })
              .then(function(r3) { return r3.json(); })
              .then(function(disc) {
                if (disc && disc.length > 0) {
                  localStorage.setItem('nava_peace_uid', expectedUID);
                  window.location.replace('peace.html');
                  return;
                }
                _runSplashLogic(); // Vraiment nouveau visiteur
              });
          })
          .catch(function() { _runSplashLogic(); });
      } // end _doRestore

      // We are in Telegram — start session restore
      var tgUserImmediate = window.Telegram.WebApp.initDataUnsafe &&
                            window.Telegram.WebApp.initDataUnsafe.user;
      if (tgUserImmediate && tgUserImmediate.id) {
        _doRestore(); // Telegram PC / user already available
      } else {
        setTimeout(_doRestore, 350); // Telegram mobile: wait for WebApp to be ready
      }

      // Safety timeout: if nothing happened in 2s → show splash normally
      setTimeout(function() { _runSplashLogic(); }, 2000);
    })();
    // ──────────────────────────────────────────────────────────────────────
    // 12 languages — flag · translation
    const translations = [
      { flag: '🇬🇧', lang: 'EN', text: 'BORN TO GROW'          },
      { flag: '🇫🇷', lang: 'FR', text: 'NÉ POUR GRANDIR'       },
      { flag: '🇪🇸', lang: 'ES', text: 'NACIDO PARA CRECER'    },
      { flag: '🇵🇹', lang: 'PT', text: 'NASCIDO PARA CRESCER'  },
      { flag: '🇩🇪', lang: 'DE', text: 'ZUM WACHSEN GEBOREN'   },
      { flag: '🇮🇹', lang: 'IT', text: 'NATO PER CRESCERE'     },
      { flag: '🇷🇺', lang: 'RU', text: 'РОЖДЁН РАСТИ'          },
      { flag: '🇸🇦', lang: 'AR', text: 'وُلِدَ لِيَنمُو'            },
      { flag: '🇨🇳', lang: 'ZH', text: '生而成长'               },
      { flag: '🇯🇵', lang: 'JA', text: '成長のために生まれた'   },
      { flag: '🇮🇳', lang: 'HI', text: 'बढ़ने के लिए जन्मा'     },
      { flag: '🌍',  lang: 'SW', text: 'AMEZALIWA KUKUA'        },
      { flag: '🇺🇦', lang: 'UK', text: 'НАРОДЖЕНИЙ ЗРОСТАТИ'    },
    ];

    function buildTicker() {
      const track = document.getElementById('ticker-track');
      // Build one full set, then duplicate it for seamless loop
      const html = translations.map((t, i) => `
        <span class="ticker-item">${t.text}</span>
        <span class="ticker-sep"></span>
      `).join('');
      // Double it so the loop is invisible
      track.innerHTML = html + html;
    }

    buildTicker();

    // ── DAILY MESSAGE ──────────────────────────────────
    const DAILY_MESSAGES = [
      "Peace begins within.",
      "Every choice for peace matters.",
      "We grow together.",
      "Be the peace you wish to see.",
      "One heart at a time, we change the world.",
      "Your peace is your power.",
      "Peace is not a destination. It is the path.",
      "Silence is the language of peace.",
      "We are all seeds of the same tree.",
      "Love is the root of all growth.",
      "Hope is the dove we send ahead.",
      "You were born to bloom.",
      "Small acts of kindness move mountains.",
      "Peace is possible. You are the proof.",
      "Together we rise.",
      "The universe leans toward peace.",
      "In stillness, we hear the voice of peace.",
      "Grow where you are planted.",
      "One world, one heart.",
      "Peace is a daily practice.",
      "You are part of something beautiful.",
      "Act for peace. Live in peace.",
      "Choose peace. Choose love. Choose growth.",
      "Every sunrise is a new chance for peace.",
      "What you give to the world, the world gives back.",
      "Peace is a seed — plant it today.",
      "Compassion is the highest courage.",
      "Your presence is a gift to the world.",
      "In every moment, choose light.",
      "The world needs your peace.",
      "Peace flows where intention goes.",
      "We are more alike than we are different.",
      "A peaceful heart changes everything.",
      "Your kindness is contagious.",
      "Today, be the reason someone smiles.",
    ];

    function setDailyMessage() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / 86400000);
      const msg = DAILY_MESSAGES[dayOfYear % DAILY_MESSAGES.length];

      const dateStr = now.toLocaleDateString('en-GB', {
        day: '2-digit', month: 'long', year: 'numeric'
      }).toUpperCase();

      document.getElementById('daily-date').textContent = dateStr;

      // Split message into two balanced lines
      const words = msg.split(' ');
      let display = msg;
      if (words.length >= 4) {
        const mid = Math.round(words.length / 2);
        display = words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
      }
      document.getElementById('daily-text').innerHTML = display;
    }

    setDailyMessage();

    // ── Ref code screen — first-time visitors ───────────────────────
    var REF_CODE_LABELS = {
      en: { title: 'GOT A REFERRAL CODE?', placeholder: 'ENTER CODE (OPTIONAL)', enter: 'JOIN WITH CODE', skip: 'SKIP' },
      fr: { title: 'TU AS UN CODE PARRAIN?', placeholder: 'ENTRER LE CODE (FACULTATIF)', enter: 'REJOINDRE AVEC CODE', skip: 'PASSER' },
      es: { title: '¿TIENES UN CÓDIGO?', placeholder: 'INGRESA EL CÓDIGO (OPCIONAL)', enter: 'UNIRME CON CÓDIGO', skip: 'OMITIR' },
      pt: { title: 'TEM UM CÓDIGO?', placeholder: 'INSERIR CÓDIGO (OPCIONAL)', enter: 'ENTRAR COM CÓDIGO', skip: 'PULAR' },
      de: { title: 'HAST DU EINEN CODE?', placeholder: 'CODE EINGEBEN (OPTIONAL)', enter: 'MIT CODE BEITRETEN', skip: 'ÜBERSPRINGEN' },
      ar: { title: 'هل لديك رمز إحالة؟', placeholder: 'أدخل الرمز (اختياري)', enter: 'انضم برمز', skip: 'تخطي' },
      zh: { title: '有邀请码？', placeholder: '输入邀请码（可选）', enter: '用邀请码加入', skip: '跳过' },
      ru: { title: 'ЕСТЬ КОД ПРИГЛАШЕНИЯ?', placeholder: 'ВВЕДИ КОД (НЕОБЯЗАТЕЛЬНО)', enter: 'ВОЙТИ С КОДОМ', skip: 'ПРОПУСТИТЬ' },
      ja: { title: '招待コードはありますか？', placeholder: 'コードを入力（任意）', enter: 'コードで参加', skip: 'スキップ' },
      hi: { title: 'क्या आपके पास रेफरल कोड है?', placeholder: 'कोड डालें (वैकल्पिक)', enter: 'कोड से जुड़ें', skip: 'छोड़ें' },
      uk: { title: 'Є КОД ЗАПРОШЕННЯ?', placeholder: 'ВВЕДІТЬ КОД (НЕОБОВ\'ЯЗКОВО)', enter: 'ПРИЄДНАТИСЯ З КОДОМ', skip: 'ПРОПУСТИТИ' },
    };

    function showRefCodeScreen() {
      var stage = document.querySelector('.stage');
      var hero  = document.querySelector('.hero');
      var tapEl = document.getElementById('tap-hint');
      if (tapEl) tapEl.style.display = 'none';

      var lang = (typeof detectLang === 'function') ? detectLang() : 'en';
      var lbl  = REF_CODE_LABELS[lang] || REF_CODE_LABELS.en;

      // Fade out hero text
      if (hero) {
        hero.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        hero.style.opacity    = '0';
        hero.style.transform  = 'scale(0.95)';
      }

      setTimeout(function () {
        // Build ref code UI inside stage
        var refBox = document.createElement('div');
        refBox.id  = 'ref-code-box';
        refBox.style.cssText =
          'display:flex;flex-direction:column;align-items:center;gap:16px;' +
          'width:100%;max-width:320px;padding:0 24px;' +
          'animation:fadeIn 0.7s ease both;';

        refBox.innerHTML =
          '<p style="font-family:Nasalization,Arial,sans-serif;font-size:10px;letter-spacing:3px;' +
          'color:rgba(255,255,255,0.65);text-transform:uppercase;text-align:center;margin:0;">' +
          lbl.title + '</p>' +

          '<input id="ref-code-input" type="text" maxlength="16" autocomplete="off" spellcheck="false"' +
          ' placeholder="' + lbl.placeholder + '"' +
          ' style="width:100%;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.3);' +
          'border-radius:12px;color:#fff;font-family:Nasalization,Arial,sans-serif;font-size:12px;' +
          'letter-spacing:3px;padding:13px 16px;text-align:center;outline:none;' +
          'text-transform:uppercase;box-sizing:border-box;">' +

          '<button id="ref-enter-btn" style="' +
          'width:100%;padding:14px;border-radius:14px;border:none;cursor:pointer;' +
          'background:linear-gradient(135deg,#3AACDF,#1E6E9A);color:#fff;' +
          'font-family:Nasalization,Arial,sans-serif;font-size:10px;letter-spacing:3px;">' +
          lbl.enter + '</button>' +

          '<button id="ref-skip-btn" style="' +
          'background:none;border:none;color:rgba(255,255,255,0.4);' +
          'font-family:Nasalization,Arial,sans-serif;font-size:9px;letter-spacing:3px;' +
          'text-transform:uppercase;cursor:pointer;text-decoration:underline;">' +
          lbl.skip + '</button>';

        if (stage) stage.appendChild(refBox);

        // Auto-fill ref code if referred by someone
        var inp = document.getElementById('ref-code-input');
        var autoRef = (NAVA_TG && NAVA_TG.startParam) || localStorage.getItem('nava_peace_referred_by') || '';
        if (inp && autoRef) { inp.value = autoRef.toUpperCase(); }
        if (inp) inp.addEventListener('input', function() { this.value = this.value.toUpperCase(); });

        // Enter button
        document.getElementById('ref-enter-btn').addEventListener('click', function() {
          var code = (document.getElementById('ref-code-input').value || '').trim().toUpperCase();
          if (code) {
            localStorage.setItem('nava_peace_referred_by', code);
          }
          goToApp();
        });

        // Skip button
        document.getElementById('ref-skip-btn').addEventListener('click', function() {
          goToApp();
        });

        // Also allow pressing Enter key
        if (inp) inp.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') document.getElementById('ref-enter-btn').click();
        });

      }, 500);
    }

    function goToApp() {
      // 1. Fade out form
      var refBox = document.getElementById('ref-code-box');
      if (refBox) { refBox.style.transition = 'opacity 0.3s ease'; refBox.style.opacity = '0'; }

      setTimeout(function() {
        if (refBox) refBox.remove();

        // 2. Play BIENVENUE in 13 languages
        var hero = document.querySelector('.hero');
        if (hero) {
          hero.style.animation = 'none';
          hero.style.transition = 'none';
          hero.style.opacity   = '1';
          hero.style.filter    = 'blur(0)';
          hero.style.transform = 'scale(1)';
          hero.textContent     = WELCOME_WORDS[0];
        }

        var idx = 0;
        var timer = setInterval(function() {
          idx++;
          if (idx >= WELCOME_WORDS.length) {
            clearInterval(timer);
            // 3. Fade out and go to app
            var stage = document.querySelector('.stage');
            if (stage) { stage.style.transition = 'opacity 0.6s ease'; stage.style.opacity = '0'; }
            setTimeout(function() { window.location.href = 'index.html'; }, 650);
            return;
          }
          if (hero) hero.textContent = WELCOME_WORDS[idx];
        }, 600);
      }, 300);
    }

    // ── Navigation tap/click → page suivante ────────────────────────
    function enableTap(dest) {
      var tapEl  = document.getElementById('tap-hint');
      var stage  = document.querySelector('.stage');

      // Afficher le hint avec pulsation
      if (tapEl) {
        tapEl.style.animation = 'tapPulse 2.2s ease-in-out infinite';
        tapEl.style.opacity   = '1';
      }

      // Toute la page répond au clic ET au touch (mobile)
      function goNext(e) {
        e.preventDefault();
        document.removeEventListener('click',    goNext);
        document.removeEventListener('touchend', goNext);
        if (tapEl) tapEl.style.animation = 'none';
        if (stage) { stage.style.transition = 'opacity 0.7s ease'; stage.style.opacity = '0'; }
        setTimeout(function () { window.location.href = dest; }, 720);
      }
      document.addEventListener('click',    goNext);
      document.addEventListener('touchend', goNext, { passive: false });
    }

    // ── 13 traductions de "BIENVENUE" ──────────────────────────────────
    var WELCOME_WORDS = [
      'WELCOME',           // EN
      'BIENVENUE',         // FR
      'BIENVENIDO',        // ES
      'BEM-VINDO',         // PT
      'WILLKOMMEN',        // DE
      'مرحباً',              // AR
      '欢迎',               // ZH
      'ДОБРО ПОЖАЛОВАТЬ',  // RU
      'ยินดีต้อนรับ',         // TH
      'ようこそ',            // JA
      'ကြိုဆိုပါသည်',        // MY
      'स्वागत है',           // HI
      'ЛАСКАВО ПРОСИМО',   // UK
    ];

    // ── SPLASH LOGIC ──────────────────────────────────────────────────
    function _startSplashAnimation() {
      // Only block if truly not in Telegram at all (pure browser with no WebApp SDK)
      if (!NAVA_TG.isTelegram && !window._NAVA_IN_TG && !_animationStarted) return;
      var uid = localStorage.getItem('nava_peace_uid');
      var isRegistered = uid && localStorage.getItem('nava_peace_country');

      if (!isRegistered) {
        // ═══════════════════════════════════════════════
        // NOUVEAU VISITEUR — inscription directement
        // ═══════════════════════════════════════════════
        var enterEl = document.querySelector('.enter-link');
        if (enterEl) enterEl.setAttribute('href', 'index.html');
        showRefCodeScreen();
        return;
      }

      // ═══════════════════════════════════════════════
      // UTILISATEUR ENREGISTRÉ — WELCOME BACK
      // ═══════════════════════════════════════════════
      var enterEl = document.querySelector('.enter-link');
      if (enterEl) enterEl.style.display = 'none';

      var pseudo = localStorage.getItem('nava_peace_pseudo') || '';

      // Total doves — vérifie le statut du compte
      var doveCount = 0;
      try {
        var adminFlags = JSON.parse(localStorage.getItem('nava_user_flags') || '{}');
        var isDisabled = adminFlags[uid] && adminFlags[uid].status === 'disabled';
        if (!isDisabled) {
          doveCount = parseInt(localStorage.getItem('nava_peace_days') || '0', 10);
        }
      } catch(e) {}

      // ① Logo + hero pleinement visibles (3 s)
      setTimeout(function () {
        var hero   = document.querySelector('.hero');
        var dateEl = document.getElementById('daily-date');
        var textEl = document.getElementById('daily-text');
        var divEl  = document.querySelector('.divider');

        // Fade-out lent (1.4 s)
        [hero, dateEl, textEl, divEl].forEach(function (el) {
          if (el) { el.style.transition = 'opacity 1.4s ease'; el.style.opacity = '0'; }
        });

        setTimeout(function () {

          // ② WELCOME BACK : blur → net (2.5 s)
          if (hero) {
            hero.textContent      = 'WELCOME BACK';
            hero.style.transition = 'none';
            hero.style.opacity    = '0';
            hero.style.filter     = 'blur(20px)';
            void hero.offsetWidth;
            hero.style.transition = 'opacity 2.5s ease, filter 2.5s ease';
            hero.style.opacity    = '1';
            hero.style.filter     = 'blur(0px)';
          }

          // ③ Pseudo — 2 s après WB, letter-spacing expand (2 s)
          setTimeout(function () {
            if (textEl) {
              textEl.textContent         = pseudo ? pseudo.toUpperCase() : 'PEACE LOVER';
              textEl.style.transition    = 'none';
              textEl.style.opacity       = '0';
              textEl.style.letterSpacing = '1px';
              void textEl.offsetWidth;
              textEl.style.transition    = 'opacity 2s ease, letter-spacing 2s ease';
              textEl.style.opacity       = '1';
              textEl.style.letterSpacing = 'clamp(5px, 1.1vw, 12px)';
            }
          }, 2000);

          // ④ Divider + total DOVES — 2.5 s après WB
          setTimeout(function () {
            if (divEl) { divEl.style.transition = 'opacity 1.5s ease'; divEl.style.opacity = '0.4'; }
            if (dateEl) {
              dateEl.style.transition    = 'opacity 1.5s ease';
              dateEl.style.fontSize      = 'clamp(22px, 4vw, 52px)';
              dateEl.style.letterSpacing = '3px';
              dateEl.style.color         = 'rgba(255,255,255,0.85)';
              dateEl.style.marginBottom  = '0';
              dateEl.innerHTML =
                '🕊&ensp;' + doveCount +
                '<span style="display:block;font-size:clamp(8px,0.9vw,11px);' +
                             'letter-spacing:6px;color:rgba(255,255,255,0.38);' +
                             'margin-top:6px;">DOVES OFFERED</span>';
              void dateEl.offsetWidth;
              dateEl.style.opacity = '1';
            }

            // ⑤ TAP TO CONTINUE — 1.5 s après DOVES (laisse le temps de les lire)
            setTimeout(function () {
              enableTap('peace.html');
            }, 1500);

          }, 2500);

        }, 1400); // fade-out terminé
      }, 1500);   // logo + hero pleinement visibles

    } // end _startSplashAnimation
  </script>
</body>
