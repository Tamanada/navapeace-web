  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal; font-weight: 400; font-display: swap;
      src: url('nasalization.woff') format('woff');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Nasalization', Arial, sans-serif;
    }

    html {
      height: 100%; width: 100%;
      /* pas d'overflow:hidden — iOS Safari clippe les position:fixed quand html OU body ont overflow:hidden */
    }
    body {
      height: 100%; width: 100%;
      overscroll-behavior: none; /* empêche le pull-to-refresh sans bloquer le ticker */
      font-family: var(--font);
      background: radial-gradient(ellipse at 50% 20%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
    }

    /* ── MAIN LAYOUT ───────────────────────────── */
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: 90px; /* room for ticker */
    }

    /* ── BACKGROUND BREATH ─────────────────────── */
    .stage::before {
      content: '';
      position: fixed; top: -5%; left: 50%;
      transform: translateX(-50%);
      width: 130vw; height: 75vh;
      background: radial-gradient(ellipse, rgba(255,255,255,0.10) 0%, transparent 68%);
      pointer-events: none;
      animation: bgBreath 14s ease-in-out infinite;
    }

    /* ── LOGO ──────────────────────────────────── */
    .logo-wrap {
      margin-bottom: min(36px, 3.5vh);
      animation: logoFadeIn 3s ease-out both,
                 logoFloat 10s 3.2s ease-in-out infinite;
    }
    .logo-img {
      /* min(286px, 28vh) : sur PC 800px de haut → 224px ; mobile portrait inchangé */
      width: min(286px, 28vh); height: min(286px, 28vh); object-fit: contain;
      animation: logoBlur 3s ease-out both,
                 logoGlow 7s 3.2s ease-in-out infinite;
    }
    .logo-fallback {
      font-size: min(170px, 20vh);
      line-height: 1;
      animation: logoBlur 3s ease-out both,
                 logoGlow 7s 3.2s ease-in-out infinite;
    }

    /* ── BRAND NAME ────────────────────────────── */
    .brand {
      font-size: clamp(18px, 3vw, 30px);
      letter-spacing: clamp(10px, 2vw, 22px);
      color: rgba(255,255,255,0.72);
      text-transform: uppercase;
      margin-bottom: 20px;
      animation: brandReveal 2.2s 1.8s ease-out both;
    }

    /* ── HERO TEXT ─────────────────────────────── */
    .hero {
      /* min(11vw, 9vh) : sur PC 1280×800 → min(140px, 72px) = 72px ; mobile portrait inchangé */
      font-size: clamp(48px, min(11vw, 9vh), 160px);
      letter-spacing: clamp(4px, min(1.2vw, 0.8vh), 18px);
      color: #ffffff;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
      text-shadow:
        0 0 60px rgba(255,255,255,0.35),
        0 0 120px rgba(255,255,255,0.15),
        0 4px 30px rgba(30,100,170,0.4);
      animation: heroReveal 2.8s 2.6s ease-out both;
      user-select: none;
    }

    /* ── DIVIDER ───────────────────────────────── */
    .divider {
      width: clamp(60px, 10vw, 140px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      margin: 28px auto 16px;
      animation: fadeIn 2s 4s ease both;
    }

    /* ── DAILY MESSAGE ──────────────────────────── */
    .daily-msg {
      font-size: clamp(14px, 1.9vw, 22px);
      letter-spacing: clamp(2px, 0.5vw, 5px);
      color: rgba(255,255,255,0.58);
      text-transform: uppercase;
      text-align: center;
      max-width: 560px;
      padding: 0 24px;
      line-height: 1.65;
      animation: msgReveal 2.5s 4.6s ease both;
    }
    .daily-msg-date {
      display: block;
      font-size: clamp(10px, 1.1vw, 13px);
      letter-spacing: 4px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }

    /* ── BOTTOM TICKER ─────────────────────────── */
    .ticker-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      height: 72px;
      background: rgba(10, 40, 80, 0.72);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-top: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center;
      overflow: hidden;
      animation: fadeIn 1s 0.8s ease both;
    }

    .ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      animation: ticker 42s linear infinite;
      will-change: transform;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      padding: 0 36px;
      font-size: clamp(14px, 1.9vw, 24px);
      letter-spacing: clamp(3px, 0.6vw, 8px);
      color: rgba(255,255,255,0.88);
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-sep {
      width: 1px; height: 26px;
      background: rgba(255,255,255,0.22);
      flex-shrink: 0;
    }

    /* ── TAP TO CONTINUE ───────────────────────── */
    .tap-hint {
      margin-top: clamp(18px, 3vh, 28px);
      font-size: clamp(9px, 1.1vw, 12px);
      letter-spacing: clamp(5px, 1vw, 10px);
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      opacity: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    @keyframes tapPulse {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.75; }
    }

    /* ── LINK (nouveau visiteur) ────────────────── */
    .enter-link {
      position: fixed;
      bottom: 90px; right: 32px;
      font-size: 13px; letter-spacing: 4px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
      animation: fadeIn 1.2s 1.4s ease both;
      z-index: 10;
    }
    .enter-link:hover { color: #fff; border-color: rgba(255,255,255,0.7); }

    /* ── ANIMATIONS ────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* Background glow pulse — very subtle */
    @keyframes bgBreath {
      0%, 100% { opacity: 0.55; transform: translateX(-50%) scale(1);    }
      50%       { opacity: 1;    transform: translateX(-50%) scale(1.18); }
    }

    /* Logo — slow materialise from light */
    @keyframes logoFadeIn {
      0%   { opacity: 0; transform: scale(0.82); }
      60%  { opacity: 0.88; }
      100% { opacity: 1;  transform: scale(1); }
    }

    /* Logo blur clearing — filter only */
    @keyframes logoBlur {
      0%   { filter: blur(22px) brightness(2.2)
                     drop-shadow(0 0 0px rgba(255,255,255,0)); }
      55%  { filter: blur(4px)  brightness(1.3)
                     drop-shadow(0 8px 30px rgba(255,255,255,0.3)); }
      100% { filter: blur(0px)  brightness(1)
                     drop-shadow(0 12px 50px rgba(255,255,255,0.50))
                     drop-shadow(0 0 80px rgba(109,213,245,0.35)); }
    }

    /* Logo glow breathing — continuous */
    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 12px 50px rgba(255,255,255,0.48))
                         drop-shadow(0 0 70px rgba(109,213,245,0.28)); }
      50%       { filter: drop-shadow(0 18px 80px rgba(255,255,255,0.78))
                         drop-shadow(0 0 120px rgba(109,213,245,0.55)); }
    }

    /* Logo float — slow, like breathing */
    @keyframes logoFloat {
      0%,  100% { transform: translateY(0px)   rotate(0deg);    }
      35%        { transform: translateY(-14px) rotate(0.6deg);  }
      70%        { transform: translateY(-8px)  rotate(-0.4deg); }
    }

    /* Brand name — letter-spacing expansion */
    @keyframes brandReveal {
      0%   { opacity: 0; letter-spacing: 5px; }
      100% { opacity: 1; letter-spacing: clamp(10px, 2vw, 22px); }
    }

    /* Hero text — blur to sharp */
    @keyframes heroReveal {
      0%   { opacity: 0; filter: blur(10px); }
      45%  { opacity: 0.7; filter: blur(2px); }
      100% { opacity: 1; filter: blur(0); }
    }

    /* Daily message — soft rise */
    @keyframes msgReveal {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ────────────────────────────── */
    @media (max-width: 600px) {
      .brand { letter-spacing: 8px; font-size: 16px; }
      .logo-img { width: 195px; height: 195px; }
      .logo-fallback { font-size: 120px; }

      /* Ticker mobile */
      .ticker-wrap {
        height: 56px;
      }
      .ticker-item {
        padding: 0 18px;
        font-size: clamp(13px, 4.2vw, 18px);
        letter-spacing: clamp(2px, 0.8vw, 5px);
      }
      .ticker-track {
        animation-duration: 32s; /* plus rapide car écran plus petit */
      }

      /* Ajustement stage pour ticker plus court */
      .stage { padding-bottom: 72px; }

      .enter-link { bottom: 68px; right: 18px; font-size: 11px; }
      .daily-msg { font-size: 13px; padding: 0 18px; }
      .daily-msg-date { font-size: 9px; }
    }

  </style>
</head>
<body>

  <!-- Optional: enter app link -->
  <a class="enter-link" href="peace.html">ENTER →</a>

  <!-- ── MAIN STAGE ─────────────────────────── -->
  <div class="stage">

    <!-- Logo -->
    <div class="logo-wrap">
      <img class="logo-img" src="logo.png" alt="NAVA PEACE"
           onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='block'" />

    </div>

    <!-- Brand -->
    <p class="brand">NAVA PEACE</p>

    <!-- Hero -->
    <h1 class="hero">BORN TO GROW</h1>

    <!-- Divider line -->
    <div class="divider"></div>

    <!-- Daily message -->
    <div class="daily-msg" id="daily-msg">
      <span class="daily-msg-date" id="daily-date"></span>
      <span id="daily-text"></span>
    </div>

    <!-- Tap / click to continue -->
    <p class="tap-hint" id="tap-hint">TAP TO CONTINUE</p>

  </div>

  <!-- ── TICKER ─────────────────────────────── -->
  <div class="ticker-wrap" aria-label="Born to grow in 12 languages">
    <div class="ticker-track" id="ticker-track">
      <!-- filled by JS; duplicated for seamless loop -->
    </div>
  </div>

  <script>
    // Marquer la session : la splash a été vue — empêche les boucles de redirect
    sessionStorage.setItem('nava_splash_shown', '1');

    // Toujours vider le cache des modules au démarrage — l'état sera refetché depuis Supabase
    localStorage.removeItem('nava_modules');
    localStorage.removeItem('nava_modules_ts');

    // ── AUTO-RESTORE SESSION (domain change / cleared localStorage) ────────
    // Bloque toute navigation jusqu'à ce que le check Supabase soit terminé
    var _sessionCheckDone = false;

    function _runSplashLogic() {
      if (_sessionCheckDone) return; // déjà lancé
      _sessionCheckDone = true;

      // Returning user already in localStorage
      if (NAVA_TG.isTelegram && localStorage.getItem('nava_peace_country')) {
        var _today = new Date().toISOString().split('T')[0];
        var _dest = (localStorage.getItem('nava_peace_voted') === _today) ? 'map.html' : 'peace.html';
        window.location.replace(_dest);
        return;
      }

      // Lance l'animation splash (nouveau visiteur ou session à restaurer)
      _startSplashAnimation();
    }

    (function restoreSession() {
      // ── TELEGRAM CHECK FIRST — always, before any localStorage logic ──────
      var _hasTgSDK   = !!(window.Telegram && window.Telegram.WebApp);
      var _initData   = _hasTgSDK ? (window.Telegram.WebApp.initData || '') : '';
      var _isTelegram = !!_initData;

      if (!_isTelegram) {
        // Not inside Telegram — block immediately, no flash, no redirect
        document.body.style.cssText = 'margin:0;padding:0;background:#050F1A;';
        document.body.innerHTML = [
          '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;',
          'height:100vh;background:#050F1A;color:#fff;font-family:Arial,sans-serif;',
          'text-align:center;padding:30px;">',
          '<img src="logo.png" style="width:80px;margin-bottom:20px;opacity:0.9;"',
          ' onerror="this.style.display=\'none\'">',
          '<div style="font-size:22px;letter-spacing:4px;color:#64D2FF;margin-bottom:8px;">NAVA PEACE</div>',
          '<div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.5);margin-bottom:32px;">MAKE PEACE. MAKE CHANGE.</div>',
          '<div style="font-size:13px;letter-spacing:2px;color:rgba(255,255,255,0.8);margin-bottom:32px;line-height:2;">',
          'THIS APP IS ONLY AVAILABLE<br>INSIDE TELEGRAM</div>',
          '<a href="https://t.me/NavaPeaceBot/app" target="_blank"',
          ' style="display:inline-block;padding:14px 32px;cursor:pointer;z-index:9999;',
          'background:linear-gradient(135deg,#3AACDF,#1E8EC4);color:#fff;border-radius:12px;',
          'text-decoration:none;font-family:Arial,sans-serif;font-size:13px;letter-spacing:3px;">',
          '🕊 OPEN IN TELEGRAM</a>',
          '</div>'
        ].join('');
        return; // Stop ALL other logic — no timers, no redirects
      }

      // ── IN TELEGRAM ────────────────────────────────────────────────────────
      if (window.Telegram && window.Telegram.WebApp) {
        try { window.Telegram.WebApp.ready(); } catch(e) {}
      }

      if (localStorage.getItem('nava_peace_country')) {
        // Returning user already in localStorage — sync pseudo in background
        var _uid = localStorage.getItem('nava_peace_uid');
        if (_uid && typeof SUPABASE_URL !== 'undefined' && window.supabase) {
          try {
            var _sbg = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            _sbg.from('peace_messages').select('pseudo, message')
              .eq('user_uid', _uid).limit(1)
              .then(function(r) {
                if (r.data && r.data[0]) {
                  if (r.data[0].pseudo)  localStorage.setItem('nava_peace_pseudo',  r.data[0].pseudo);
                  if (r.data[0].message) localStorage.setItem('nava_peace_message', r.data[0].message);
                }
              }).catch(function(){});
          } catch(e) {}
        }
        setTimeout(_runSplashLogic, 0);
        return;
      }

      // New user in Telegram — restore session from DB
      var _blocked = false;
      function _doRestore() {
        // Re-check initData (might now be available after ready())
        var initData = window.Telegram.WebApp.initData || '';
        var tgUser   = initData &&
                       window.Telegram.WebApp.initDataUnsafe &&
                       window.Telegram.WebApp.initDataUnsafe.user;

        // In Telegram but user not yet available (mobile slow init) → retry
        if (!tgUser || !tgUser.id) {
          setTimeout(_doRestore, 300);
          return;
        }

        var expectedUID = 'tg_' + tgUser.id;
      try {
        var sbr = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        // Cherche d'abord dans peace_votes (utilisateurs ayant voté)
        sbr.from('peace_votes')
          .select('referral_code, referred_by, country, age, gender, created_at')
          .eq('user_uid', expectedUID)
          .order('created_at', { ascending: false })
          .limit(1)
          .then(function(res) {
            if (res.data && res.data.length > 0) {
              var row = res.data[0];
              localStorage.setItem('nava_peace_uid', expectedUID);
              // country peut être null en DB → on met 'XX' pour signaler "inscrit"
              localStorage.setItem('nava_peace_country', row.country || 'XX');
              if (row.referral_code) localStorage.setItem('nava_peace_ref_code',    row.referral_code);
              if (row.age)           localStorage.setItem('nava_peace_age',         row.age);
              if (row.gender)        localStorage.setItem('nava_peace_gender',      row.gender);
              if (row.referred_by)   localStorage.setItem('nava_peace_referred_by', row.referred_by);
              // Restaurer la date du dernier vote pour éviter la boucle peace.html→index.html
              if (row.created_at) {
                var lastVoteDate = row.created_at.split('T')[0];
                localStorage.setItem('nava_peace_voted', lastVoteDate);
              }
              // Restaurer le peace message depuis peace_messages
              sbr.from('peace_messages').select('pseudo, message')
                .eq('user_uid', expectedUID).limit(1)
                .then(function(pm) {
                  if (pm.data && pm.data[0]) {
                    if (pm.data[0].pseudo)  localStorage.setItem('nava_peace_pseudo',  pm.data[0].pseudo);
                    if (pm.data[0].message) localStorage.setItem('nava_peace_message', pm.data[0].message);
                  }
                  window.location.replace('peace.html');
                })
                .catch(function() { window.location.replace('peace.html'); });
              return;
              return;
            }
            // Aucun vote trouvé — peut-être inscrit mais pas encore voté
            // Cherche dans nava_discoveries pour confirmer l'inscription
            return sbr.from('nava_discoveries')
              .select('user_uid')
              .eq('user_uid', expectedUID)
              .limit(1)
              .then(function(res2) {
                if (res2.data && res2.data.length > 0) {
                  // Inscrit mais pas voté → va directement à peace.html
                  localStorage.setItem('nava_peace_uid', expectedUID);
                  window.location.replace('peace.html');
                  return;
                }
                // Vraiment nouveau → animation normale
                _runSplashLogic();
              });
          })
          .catch(function() { _runSplashLogic(); }); // erreur réseau → animation normale
      } catch(e) { _runSplashLogic(); }
      } // end _doRestore

      // We are in Telegram — start session restore
      var tgUserImmediate = window.Telegram.WebApp.initDataUnsafe &&
                            window.Telegram.WebApp.initDataUnsafe.user;
      if (tgUserImmediate && tgUserImmediate.id) {
        _doRestore(); // Telegram PC / user already available
      } else {
        setTimeout(_doRestore, 350); // Telegram mobile: wait for WebApp to be ready
      }

      // Safety timeout: if nothing happened in 5s → show splash normally
      setTimeout(function() { if (!_blocked) _runSplashLogic(); }, 5000);
    })();
    // ──────────────────────────────────────────────────────────────────────
    // 12 languages — flag · translation
    const translations = [
      { flag: '🇬🇧', lang: 'EN', text: 'BORN TO GROW'          },
      { flag: '🇫🇷', lang: 'FR', text: 'NÉ POUR GRANDIR'       },
      { flag: '🇪🇸', lang: 'ES', text: 'NACIDO PARA CRECER'    },
      { flag: '🇵🇹', lang: 'PT', text: 'NASCIDO PARA CRESCER'  },
      { flag: '🇩🇪', lang: 'DE', text: 'ZUM WACHSEN GEBOREN'   },
      { flag: '🇮🇹', lang: 'IT', text: 'NATO PER CRESCERE'     },
      { flag: '🇷🇺', lang: 'RU', text: 'РОЖДЁН РАСТИ'          },
      { flag: '🇸🇦', lang: 'AR', text: 'وُلِدَ لِيَنمُو'            },
      { flag: '🇨🇳', lang: 'ZH', text: '生而成长'               },
      { flag: '🇯🇵', lang: 'JA', text: '成長のために生まれた'   },
      { flag: '🇮🇳', lang: 'HI', text: 'बढ़ने के लिए जन्मा'     },
      { flag: '🌍',  lang: 'SW', text: 'AMEZALIWA KUKUA'        },
      { flag: '🇺🇦', lang: 'UK', text: 'НАРОДЖЕНИЙ ЗРОСТАТИ'    },
    ];

    function buildTicker() {
      const track = document.getElementById('ticker-track');
      // Build one full set, then duplicate it for seamless loop
      const html = translations.map((t, i) => `
        <span class="ticker-item">${t.text}</span>
        <span class="ticker-sep"></span>
      `).join('');
      // Double it so the loop is invisible
      track.innerHTML = html + html;
    }

    buildTicker();

    // ── DAILY MESSAGE ──────────────────────────────────
    const DAILY_MESSAGES = [
      "Peace begins within.",
      "Every choice for peace matters.",
      "We grow together.",
      "Be the peace you wish to see.",
      "One heart at a time, we change the world.",
      "Your peace is your power.",
      "Peace is not a destination. It is the path.",
      "Silence is the language of peace.",
      "We are all seeds of the same tree.",
      "Love is the root of all growth.",
      "Hope is the dove we send ahead.",
      "You were born to bloom.",
      "Small acts of kindness move mountains.",
      "Peace is possible. You are the proof.",
      "Together we rise.",
      "The universe leans toward peace.",
      "In stillness, we hear the voice of peace.",
      "Grow where you are planted.",
      "One world, one heart.",
      "Peace is a daily practice.",
      "You are part of something beautiful.",
      "Act for peace. Live in peace.",
      "Choose peace. Choose love. Choose growth.",
      "Every sunrise is a new chance for peace.",
      "What you give to the world, the world gives back.",
      "Peace is a seed — plant it today.",
      "Compassion is the highest courage.",
      "Your presence is a gift to the world.",
      "In every moment, choose light.",
      "The world needs your peace.",
      "Peace flows where intention goes.",
      "We are more alike than we are different.",
      "A peaceful heart changes everything.",
      "Your kindness is contagious.",
      "Today, be the reason someone smiles.",
    ];

    function setDailyMessage() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const dayOfYear = Math.floor((now - start) / 86400000);
      const msg = DAILY_MESSAGES[dayOfYear % DAILY_MESSAGES.length];

      const dateStr = now.toLocaleDateString('en-GB', {
        day: '2-digit', month: 'long', year: 'numeric'
      }).toUpperCase();

      document.getElementById('daily-date').textContent = dateStr;

      // Split message into two balanced lines
      const words = msg.split(' ');
      let display = msg;
      if (words.length >= 4) {
        const mid = Math.round(words.length / 2);
        display = words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
      }
      document.getElementById('daily-text').innerHTML = display;
    }

    setDailyMessage();

    // ── Navigation tap/click → page suivante ────────────────────────
    function enableTap(dest) {
      var tapEl  = document.getElementById('tap-hint');
      var stage  = document.querySelector('.stage');

      // Afficher le hint avec pulsation
      if (tapEl) {
        tapEl.style.animation = 'tapPulse 2.2s ease-in-out infinite';
        tapEl.style.opacity   = '1';
      }

      // Toute la page répond au clic ET au touch (mobile)
      function goNext(e) {
        e.preventDefault();
        document.removeEventListener('click',    goNext);
        document.removeEventListener('touchend', goNext);
        if (tapEl) tapEl.style.animation = 'none';
        if (stage) { stage.style.transition = 'opacity 0.7s ease'; stage.style.opacity = '0'; }
        setTimeout(function () { window.location.href = dest; }, 720);
      }
      document.addEventListener('click',    goNext);
      document.addEventListener('touchend', goNext, { passive: false });
    }

    // ── 13 traductions de "BIENVENUE" ──────────────────────────────────
    var WELCOME_WORDS = [
      'WELCOME',           // EN
      'BIENVENUE',         // FR
      'BIENVENIDO',        // ES
      'BEM-VINDO',         // PT
      'WILLKOMMEN',        // DE
      'مرحباً',              // AR
      '欢迎',               // ZH
      'ДОБРО ПОЖАЛОВАТЬ',  // RU
      'ยินดีต้อนรับ',         // TH
      'ようこそ',            // JA
      'ကြိုဆိုပါသည်',        // MY
      'स्वागत है',           // HI
      'ЛАСКАВО ПРОСИМО',   // UK
    ];

    // ── SPLASH LOGIC ──────────────────────────────────────────────────
    function _startSplashAnimation() {
      var uid = localStorage.getItem('nava_peace_uid');
      var isRegistered = uid && localStorage.getItem('nava_peace_country');

      if (!isRegistered) {
        // ═══════════════════════════════════════════════
        // NOUVEAU VISITEUR — "Bienvenue" cycling en 13 langues
        // ═══════════════════════════════════════════════
        var enterEl = document.querySelector('.enter-link');
        if (enterEl) enterEl.setAttribute('href', 'index.html');

        // Après 3s (logo visible), fade out BORN TO GROW + daily msg
        setTimeout(function () {
          var hero   = document.querySelector('.hero');
          var dateEl = document.getElementById('daily-date');
          var textEl = document.getElementById('daily-text');
          var divEl  = document.querySelector('.divider');

          [hero, dateEl, textEl, divEl].forEach(function (el) {
            if (el) { el.style.transition = 'opacity 1.2s ease'; el.style.opacity = '0'; }
          });

          setTimeout(function () {
            if (!hero) return;
            // Hide daily msg area
            if (dateEl) dateEl.style.display = 'none';
            if (textEl) textEl.style.display = 'none';
            if (divEl)  divEl.style.display  = 'none';

            // Start cycling welcome words
            var idx = 0;
            hero.textContent      = WELCOME_WORDS[0];
            hero.style.transition = 'none';
            hero.style.opacity    = '0';
            hero.style.filter     = 'blur(12px)';
            hero.style.transform  = 'scale(0.9)';
            void hero.offsetWidth;
            hero.style.transition = 'opacity 0.8s ease, filter 0.8s ease, transform 0.8s ease';
            hero.style.opacity    = '1';
            hero.style.filter     = 'blur(0)';
            hero.style.transform  = 'scale(1)';

            var cycleTimer = setInterval(function () {
              idx++;
              if (idx >= WELCOME_WORDS.length) {
                clearInterval(cycleTimer);
                // After all words shown, enable tap
                setTimeout(function () { enableTap('index.html'); }, 800);
                return;
              }
              // Fade out current
              hero.style.transition = 'opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease';
              hero.style.opacity    = '0';
              hero.style.filter     = 'blur(8px)';
              hero.style.transform  = 'scale(0.95)';

              setTimeout(function () {
                hero.textContent      = WELCOME_WORDS[idx];
                hero.style.transition = 'none';
                hero.style.opacity    = '0';
                hero.style.filter     = 'blur(12px)';
                hero.style.transform  = 'scale(0.9)';
                void hero.offsetWidth;
                hero.style.transition = 'opacity 0.6s ease, filter 0.6s ease, transform 0.6s ease';
                hero.style.opacity    = '1';
                hero.style.filter     = 'blur(0)';
                hero.style.transform  = 'scale(1)';
              }, 400);
            }, 1200); // 1.2s per word

          }, 1200); // after fade-out
        }, 4000);   // after logo visible

        return;
      }

      // ═══════════════════════════════════════════════
      // UTILISATEUR ENREGISTRÉ — WELCOME BACK
      // ═══════════════════════════════════════════════
      var enterEl = document.querySelector('.enter-link');
      if (enterEl) enterEl.style.display = 'none';

      var pseudo = localStorage.getItem('nava_peace_pseudo') || '';

      // Total doves — vérifie le statut du compte
      var doveCount = 0;
      try {
        var adminFlags = JSON.parse(localStorage.getItem('nava_user_flags') || '{}');
        var isDisabled = adminFlags[uid] && adminFlags[uid].status === 'disabled';
        if (!isDisabled) {
          doveCount = parseInt(localStorage.getItem('nava_peace_days') || '0', 10);
        }
      } catch(e) {}

      // ① Logo + hero pleinement visibles (3 s)
      setTimeout(function () {
        var hero   = document.querySelector('.hero');
        var dateEl = document.getElementById('daily-date');
        var textEl = document.getElementById('daily-text');
        var divEl  = document.querySelector('.divider');

        // Fade-out lent (1.4 s)
        [hero, dateEl, textEl, divEl].forEach(function (el) {
          if (el) { el.style.transition = 'opacity 1.4s ease'; el.style.opacity = '0'; }
        });

        setTimeout(function () {

          // ② WELCOME BACK : blur → net (2.5 s)
          if (hero) {
            hero.textContent      = 'WELCOME BACK';
            hero.style.transition = 'none';
            hero.style.opacity    = '0';
            hero.style.filter     = 'blur(20px)';
            void hero.offsetWidth;
            hero.style.transition = 'opacity 2.5s ease, filter 2.5s ease';
            hero.style.opacity    = '1';
            hero.style.filter     = 'blur(0px)';
          }

          // ③ Pseudo — 2 s après WB, letter-spacing expand (2 s)
          setTimeout(function () {
            if (textEl) {
              textEl.textContent         = pseudo ? pseudo.toUpperCase() : 'PEACE LOVER';
              textEl.style.transition    = 'none';
              textEl.style.opacity       = '0';
              textEl.style.letterSpacing = '1px';
              void textEl.offsetWidth;
              textEl.style.transition    = 'opacity 2s ease, letter-spacing 2s ease';
              textEl.style.opacity       = '1';
              textEl.style.letterSpacing = 'clamp(5px, 1.1vw, 12px)';
            }
          }, 2000);

          // ④ Divider + total DOVES — 2.5 s après WB
          setTimeout(function () {
            if (divEl) { divEl.style.transition = 'opacity 1.5s ease'; divEl.style.opacity = '0.4'; }
            if (dateEl) {
              dateEl.style.transition    = 'opacity 1.5s ease';
              dateEl.style.fontSize      = 'clamp(22px, 4vw, 52px)';
              dateEl.style.letterSpacing = '3px';
              dateEl.style.color         = 'rgba(255,255,255,0.85)';
              dateEl.style.marginBottom  = '0';
              dateEl.innerHTML =
                '🕊&ensp;' + doveCount +
                '<span style="display:block;font-size:clamp(8px,0.9vw,11px);' +
                             'letter-spacing:6px;color:rgba(255,255,255,0.38);' +
                             'margin-top:6px;">DOVES OFFERED</span>';
              void dateEl.offsetWidth;
              dateEl.style.opacity = '1';
            }

            // ⑤ TAP TO CONTINUE — 1.5 s après DOVES (laisse le temps de les lire)
            setTimeout(function () {
              enableTap('peace.html');
            }, 1500);

          }, 2500);

        }, 1400); // fade-out terminé
      }, 4000);   // logo + hero pleinement visibles

    } // end _startSplashAnimation
  </script>
</body>
</html>
