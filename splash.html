  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal; font-weight: 400; font-display: swap;
      src: url('nasalization.woff') format('woff');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; width: 100%; overscroll-behavior: none; }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      /* Start invisible — eliminates any white flash */
      opacity: 0;
      background: radial-gradient(ellipse at 50% 20%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      animation: bodyReveal 0.35s ease 0.05s both;
    }

    #tg-block { display: none !important; }

    /* ── GLOW ORB behind logo ── */
    .glow-orb {
      position: fixed;
      top: 18%; left: 50%;
      transform: translateX(-50%);
      width: 70vw; height: 70vw;
      max-width: 420px; max-height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(109,213,245,0.14) 0%, transparent 68%);
      pointer-events: none;
      z-index: 1;
      animation: orbReveal 2s ease 0.6s both, orbPulse 7s ease-in-out 2.6s infinite;
    }

    /* ── STAGE ── */
    .stage {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: 72px;
      z-index: 2;
    }

    /* ── LOGO ── */
    .logo-wrap {
      margin-bottom: min(28px, 3vh);
      /* Enter animation — single, clean, no filter conflict */
      animation: logoIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }
    .logo-wrap.floating {
      animation: logoFloat 9s ease-in-out infinite;
    }
    .logo-img {
      width: min(190px, 23vh); height: min(190px, 23vh);
      object-fit: contain;
      filter: drop-shadow(0 6px 28px rgba(255,255,255,0.25));
    }
    .logo-img.glowing {
      animation: logoGlow 6s ease-in-out infinite;
    }

    /* ── BRAND ── */
    .brand {
      font-size: clamp(20px, 5vw, 36px);
      letter-spacing: clamp(10px, 2.8vw, 24px);
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      margin-bottom: 14px;
      animation: brandIn 1s cubic-bezier(0.22, 1, 0.36, 1) 0.75s both;
    }

    /* ── HERO ── */
    .hero {
      font-size: clamp(38px, min(9.5vw, 8vh), 110px);
      letter-spacing: clamp(3px, min(0.9vw, 0.6vh), 13px);
      color: #fff;
      text-transform: uppercase;
      text-align: center;
      line-height: 1;
      text-shadow: 0 0 70px rgba(255,255,255,0.28), 0 2px 35px rgba(109,213,245,0.18);
      animation: heroIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) 1.1s both;
      user-select: none;
    }
    /* Cross-fade state for welcome word cycling */
    .hero.cycling        { animation: none; transition: opacity 0.22s ease; }
    .hero.cycling.fading { opacity: 0; }

    /* ── DIVIDER ── */
    .divider {
      width: clamp(48px, 7vw, 110px); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      margin: 18px auto 12px;
      animation: fadeUp 0.7s ease 1.5s both;
    }

    /* ── DAILY MSG ── */
    .daily-msg {
      font-size: clamp(10px, 1.5vw, 16px);
      letter-spacing: clamp(1.5px, 0.35vw, 3.5px);
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      text-align: center;
      max-width: 460px;
      padding: 0 24px;
      line-height: 1.75;
      animation: fadeUp 0.7s ease 1.7s both;
    }
    .daily-msg-date {
      display: block;
      font-size: clamp(8px, 0.85vw, 10px);
      letter-spacing: 4px;
      color: rgba(255,255,255,0.18);
      margin-bottom: 8px;
    }

    /* ── TICKER ── */
    .ticker-wrap {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      height: 60px;
      background: rgba(4,16,36,0.78);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center; overflow: hidden;
      animation: fadeUp 0.6s ease 0.25s both;
    }
    .ticker-track {
      display: flex; align-items: center;
      white-space: nowrap;
      animation: ticker 42s linear infinite;
      will-change: transform;
    }
    .ticker-item {
      display: inline-flex; align-items: center;
      padding: 0 26px;
      font-size: clamp(10px, 1.5vw, 16px);
      letter-spacing: clamp(2px, 0.4vw, 5px);
      color: rgba(255,255,255,0.62);
      text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
    }
    .ticker-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.14); flex-shrink: 0; }

    /* ── KEYFRAMES ── */
    @keyframes bodyReveal  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes orbReveal   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes orbPulse    { 0%,100% { opacity:.55; transform:translateX(-50%) scale(1); } 50% { opacity:1; transform:translateX(-50%) scale(1.14); } }
    @keyframes logoIn      { from { opacity:0; transform:scale(0.76) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
    @keyframes logoFloat   { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
    @keyframes logoGlow    { 0%,100% { filter:drop-shadow(0 6px 28px rgba(255,255,255,.28)) drop-shadow(0 0 45px rgba(109,213,245,.18)); } 50% { filter:drop-shadow(0 10px 50px rgba(255,255,255,.5)) drop-shadow(0 0 90px rgba(109,213,245,.38)); } }
    @keyframes brandIn     { from { opacity:0; letter-spacing:3px; transform:translateY(8px); } to { opacity:1; letter-spacing:clamp(9px,2.2vw,20px); transform:translateY(0); } }
    @keyframes heroIn      { from { opacity:0; transform:translateY(14px); filter:blur(3px); } to { opacity:1; transform:translateY(0); filter:blur(0); } }
    @keyframes fadeUp      { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes ticker      { from { transform:translateX(0); } to { transform:translateX(-50%); } }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .brand { letter-spacing: 8px; font-size: 22px; }
      .stage { padding-bottom: 62px; }
      .ticker-wrap { height: 50px; }
      .ticker-item { padding: 0 14px; font-size: clamp(9px, 3.2vw, 13px); }
    }
  </style>

            '<p style="font-family:Nasalization,Arial,sans-serif;font-size:9px;letter-spacing:3px;' +
            'color:rgba(255,255,255,.6);text-transform:uppercase;text-align:center;margin:0;">' + il.invited + '</p>' +
            '<div style="background:rgba(255,255,255,0.10);border:1.5px solid rgba(255,255,255,0.45);' +
            'border-radius:14px;padding:14px 28px;text-align:center;">' +
            '<div style="font-family:Nasalization,Arial,sans-serif;font-size:8px;letter-spacing:3px;' +
            'color:rgba(255,255,255,.45);margin-bottom:8px;text-transform:uppercase;">' + il.by + '</div>' +
            '<div style="font-family:Nasalization,Arial,sans-serif;font-size:22px;letter-spacing:6px;' +
            'color:#fff;text-shadow:0 0 20px rgba(255,255,255,0.5);">' + autoRef + '</div>' +
            '</div>' +
            '<button id="ref-btn" style="width:100%;padding:15px;border-radius:14px;cursor:pointer;' +
            'background:linear-gradient(135deg,rgba(255,255,255,0.22),rgba(255,255,255,0.08));' +
            'border:1.5px solid rgba(255,255,255,0.45);color:#fff;' +
            'font-family:Nasalization,Arial,sans-serif;font-size:10px;letter-spacing:3px;">' + il.join + '</button>' +
            '<input id="ref-inp" type="hidden" value="' + autoRef + '">' +
            '<button id="skip-btn" style="background:none;border:none;color:rgba(255,255,255,.32);' +
            'font-family:Nasalization,Arial,sans-serif;font-size:8px;letter-spacing:2px;' +
            'text-transform:uppercase;cursor:pointer;text-decoration:underline;">' + il.change + '</button>';
        } else {
          box.innerHTML =
            '<p style="font-family:Nasalization,Arial,sans-serif;font-size:10px;letter-spacing:3px;' +
            'color:rgba(255,255,255,.65);text-transform:uppercase;text-align:center;margin:0">' + lbl.title + '</p>' +
            '<input id="ref-inp" type="text" maxlength="16" autocomplete="off" spellcheck="false"' +
            ' placeholder="' + lbl.ph + '"' +
            ' style="width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.28);' +
            'border-radius:12px;color:#fff;font-family:Nasalization,Arial,sans-serif;font-size:12px;' +
            'letter-spacing:3px;padding:13px 16px;text-align:center;outline:none;text-transform:uppercase;box-sizing:border-box">' +
            '<p id="ref-err" style="font-family:Nasalization,Arial,sans-serif;font-size:9px;letter-spacing:2px;' +
            'color:rgba(255,100,100,0.9);text-align:center;margin:0;min-height:14px;"></p>' +
            '<button id="ref-btn" style="width:100%;padding:14px;border-radius:14px;cursor:pointer;' +
            'background:linear-gradient(135deg,#3AACDF,#1E6E9A);border:none;color:#fff;' +
            'font-family:Nasalization,Arial,sans-serif;font-size:10px;letter-spacing:3px">' + lbl.btn + '</button>' +
            '<p style="font-family:Nasalization,Arial,sans-serif;font-size:9px;letter-spacing:1.5px;' +
            'color:rgba(255,255,255,0.35);text-align:center;margin:4px 0 0 0;line-height:1.6;">' +
            (lbl.hint || 'ASK YOUR FRIENDS IF THEY CAN INVITE YOU ;)') + '</p>' +
            '<a href="https://t.me/+89fB2Zrp4r5hODg9" target="_blank" ' +
            'style="display:block;margin-top:14px;padding:11px 16px;border-radius:12px;' +
            'background:rgba(41,182,246,0.10);border:1px solid rgba(41,182,246,0.28);' +
            'color:rgba(100,210,255,0.9);font-family:Nasalization,Arial,sans-serif;' +
            'font-size:9px;letter-spacing:2px;text-align:center;text-decoration:none;">' +
            '🕊️ ' + (lbl.community || 'JOIN OUR COMMUNITY → GET INVITED') + '</a>';
        }

        var s = document.getElementById('main-stage');
        if (s) s.appendChild(box);

        var inp = document.getElementById('ref-inp');
        if (inp && inp.type !== 'hidden') {
          inp.addEventListener('input', function () { this.value = this.value.toUpperCase(); });
        }

        var _goLock = false;
        function go() {
          if (_goLock) return;
          var code = (document.getElementById('ref-inp').value || '').trim().toUpperCase();
          // ── INVITE-ONLY GATE: code is mandatory ─────────────────────────
          if (!code) {
            var errEl = document.getElementById('ref-err');
            if (errEl) errEl.textContent = lbl.required || 'INVITATION CODE REQUIRED';
            var inp2 = document.getElementById('ref-inp');
            if (inp2) { inp2.style.borderColor = 'rgba(255,100,100,0.7)'; inp2.focus(); }
            return;
          }
          _goLock = true;
          ls('nava_peace_referred_by', code);
          var b = document.getElementById('ref-box');
          if (b) { b.style.transition = 'opacity 0.3s'; b.style.opacity = '0'; }
          setTimeout(function () {
            if (b) b.remove();
            playBienvenue(function () { fadeAndGo('index.html'); });
          }, 300);
        }

        function showChangeForm() {
          var b = document.getElementById('ref-box');
          if (b) { b.style.transition = 'opacity 0.2s'; b.style.opacity = '0'; }
          setTimeout(function () {
            if (b) b.remove();
            autoRef = '';
            _formShown = false;
            showForm();
          }, 200);
        }

        var eb = document.getElementById('ref-btn');
        var sb = document.getElementById('skip-btn');
        if (eb) eb.addEventListener('click', go);
        if (sb) sb.addEventListener('click', autoRef ? showChangeForm : null);
        if (inp && inp.type !== 'hidden') {
          inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') go(); });
          inp.addEventListener('input', function () {
            var errEl = document.getElementById('ref-err');
            if (errEl) errEl.textContent = '';
            this.style.borderColor = 'rgba(255,255,255,.28)';
          });
        }

      }, 380);
    }

    // ── MAIN SESSION LOGIC ────────────────────────────────────────────────
    (function init() {
      try { localStorage.setItem('nava_splash_shown', Date.now().toString()); } catch(e) {}
      try { localStorage.removeItem('nava_modules'); localStorage.removeItem('nava_modules_ts'); } catch(e) {}

      // Non-Telegram redirect
      setTimeout(function() {
        var h = window.location.hash || '';
        var hasTg = !!(window.Telegram && window.Telegram.WebApp) ||
                    !!window.TelegramWebviewProxy ||
                    h.indexOf('tgWebAppData') !== -1 ||
                    h.indexOf('tgWebAppVersion') !== -1 ||
                    !!localStorage.getItem('nava_peace_country') ||
                    (localStorage.getItem('nava_peace_uid') || '').indexOf('tg_') === 0;
        if (!hasTg) window.location.replace('https://t.me/NavaPeaceBot/app');
      }, 3000);

      try {
        if (window.Telegram && window.Telegram.WebApp) {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          try {
            window.Telegram.WebApp.setHeaderColor('#071828');
            window.Telegram.WebApp.setBackgroundColor('#071828');
          } catch(e) {}
        }
      } catch(e) {}

      var country = ls('nava_peace_country');
      var uid     = ls('nava_peace_uid');

      if (uid && country) {
        sbGet('peace_messages?select=pseudo,message&user_uid=eq.' + encodeURIComponent(uid) + '&limit=1')
          .then(function (d) {
            if (d && d[0]) {
              if (d[0].pseudo)  ls('nava_peace_pseudo',  d[0].pseudo);
              if (d[0].message) ls('nava_peace_message', d[0].message);
            }
          }).catch(function(){});
        var today = new Date().toISOString().split('T')[0];
        var dest  = (ls('nava_peace_voted') === today) ? 'map.html' : 'peace.html';
        setTimeout(function () { fadeAndGo(dest); }, 3200);
        return;
      }

      var _attempts = 0;
      function tryRestore() {
        _attempts++;
        var tg = null;
        try { tg = window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user; } catch(e) {}

        if (tg && tg.id) {
          var myUID = 'tg_' + tg.id;
          ls('nava_peace_uid', myUID);
          try {
            var sp = window.Telegram.WebApp.initDataUnsafe.start_param;
            if (sp) ls('nava_peace_referred_by', sp.toUpperCase());
            if (tg.language_code) {
              var supported = ['en','fr','es','pt','ar','zh','hi','ja','ru','de','ko','uk'];
              var lc = tg.language_code.substring(0,2).toLowerCase();
              if (supported.indexOf(lc) !== -1 && !ls('nava_peace_lang')) ls('nava_peace_lang', lc);
            }
          } catch(e) {}

          sbGet('peace_votes?select=referral_code,referred_by,country,age,gender,created_at&user_uid=eq.' + encodeURIComponent(myUID) + '&order=created_at.desc&limit=1')
            .then(function (data) {
              if (data && data.length > 0) {
                var row = data[0];
                ls('nava_peace_country', row.country || 'XX');
                if (row.referral_code) ls('nava_peace_ref_code',    row.referral_code);
                if (row.age)           ls('nava_peace_age',         row.age);
                if (row.gender)        ls('nava_peace_gender',      row.gender);
                if (row.referred_by)   ls('nava_peace_referred_by', row.referred_by);
                if (row.created_at)    ls('nava_peace_voted',       row.created_at.split('T')[0]);
                return sbGet('peace_messages?select=pseudo,message&user_uid=eq.' + encodeURIComponent(myUID) + '&limit=1')
                  .then(function (pm) {
                    if (pm && pm[0]) {
                      if (pm[0].pseudo)  ls('nava_peace_pseudo',  pm[0].pseudo);
                      if (pm[0].message) ls('nava_peace_message', pm[0].message);
                    }
                    fadeAndGo('peace.html');
                  }).catch(function () { fadeAndGo('peace.html'); });
              }
              return sbGet('nava_discoveries?select=user_uid&user_uid=eq.' + encodeURIComponent(myUID) + '&limit=1')
                .then(function (disc) {
                  if (disc && disc.length > 0) {
                    ls('nava_peace_uid', myUID);
                    fadeAndGo('peace.html');
                  } else {
                    showForm();
                  }
                });
            }).catch(function () { showForm(); });

        } else if (_attempts < 6) {
          setTimeout(tryRestore, 300);
        } else {
          showForm();
        }
      }

      setTimeout(function () { showForm(); }, 2000);
      setTimeout(tryRestore, 250);
    })();

  })();
  </script>

  <script src="supabase_config.js"></script>
  <script src="telegram.js"></script>
  <script src="module_gate.js?v=6"></script>

  <!-- PWA install prompt + Service Worker registration -->
  <script>
  (function() {
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(function(){});
    }

    // Capture install prompt (Android Chrome)
    var _deferredInstall = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _deferredInstall = e;
      // Show install banner after a short delay (only on web, not in TG)
      if (typeof NAVA_TG !== 'undefined' && NAVA_TG.isTelegram) return;
      setTimeout(function() {
        var banner = document.getElementById('pwa-install-banner');
        if (banner) banner.style.display = 'flex';
      }, 3000);
    });

    window._triggerPwaInstall = function() {
      if (_deferredInstall) {
        _deferredInstall.prompt();
        _deferredInstall.userChoice.then(function() { _deferredInstall = null; });
      }
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    };

    window.addEventListener('appinstalled', function() {
      var banner = document.getElementById('pwa-install-banner');
      if (banner) banner.style.display = 'none';
    });
  })();
  </script>
