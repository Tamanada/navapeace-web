  <script>
    const _std = new Date();
    const TODAY = _std.getFullYear() + '-' + String(_std.getMonth()+1).padStart(2,'0') + '-' + String(_std.getDate()).padStart(2,'0');
    let sb = null;
    try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
    catch(e) { console.warn('Supabase init failed', e); }

    // ── OVERVIEW COUNTERS ──
    async function loadOverview() {
      if (!sb) return;
      try {
        const _tsStart = new Date(); _tsStart.setHours(0,0,0,0);
        const _tsEnd   = new Date(_tsStart); _tsEnd.setDate(_tsEnd.getDate() + 1);

        const [totalR, todayR] = await Promise.all([
          sb.from('active_votes').select('*', { count: 'exact', head: true }),
          sb.from('active_votes').select('*', { count: 'exact', head: true })
            .gte('created_at', _tsStart.toISOString())
            .lt('created_at', _tsEnd.toISOString()),
        ]);

        document.getElementById('st-total').textContent = (totalR.count ?? 0).toLocaleString('fr-FR');
        document.getElementById('st-today').textContent = '+' + (todayR.count ?? 0).toLocaleString('fr-FR');
      } catch(e) { console.warn('Overview error', e); }

      // Users + Countries count — same deduplicated source for consistency
      try {
        const { data } = await sb.from('active_votes').select('user_uid, country').order('created_at', { ascending: false });
        if (data) {
          const seen = {};
          data.forEach(r => { if (r.user_uid && !seen[r.user_uid]) seen[r.user_uid] = r; });
          const uniqueUsers = Object.values(seen);
          document.getElementById('st-users').textContent = uniqueUsers.length.toLocaleString('fr-FR');
          const uniqueCountries = new Set(uniqueUsers.map(r => (r.country || '').toUpperCase().trim()).filter(Boolean));
          document.getElementById('st-countries').textContent = uniqueCountries.size;
        }
      } catch(e) { console.warn('Users/Countries count error', e); }
    }

    // ── Helper: unique ACTIVE users from active_votes (blocked excluded) ──
    let _blockedSet = null; // cache pour éviter de refetch à chaque appel
    async function getBlockedSet() {
      if (_blockedSet) return _blockedSet;
      const { data } = await sb.from('blocked_users').select('user_uid');
      _blockedSet = new Set((data || []).map(b => b.user_uid));
      return _blockedSet;
    }

    async function loadUniqueUsers() {
      const [{ data, error }, blocked] = await Promise.all([
        sb.from('active_votes').select('user_uid, country, age, gender').order('created_at', { ascending: false }),
        getBlockedSet(),
      ]);
      if (error || !data) return [];
      const seen = {};
      data.forEach(r => {
        if (r.user_uid && !blocked.has(r.user_uid) && !seen[r.user_uid]) seen[r.user_uid] = r;
      });
      return Object.values(seen);
    }

    // ── TOP COUNTRIES ──
    async function loadTopCountries() {
      if (!sb) return;
      const container = document.getElementById('top-countries');
      try {
        const users = await loadUniqueUsers();
        if (!users.length) { container.innerHTML = '<p class="no-data">NO DATA YET</p>'; return; }

        const counts = {};
        users.forEach(r => {
          const c = (r.country || '').toUpperCase().trim();
          if (c) counts[c] = (counts[c] || 0) + 1;
        });

        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
        const max = sorted[0] ? sorted[0][1] : 1;

        container.innerHTML = sorted.map(([name, count], i) => `
          <div class="country-row">
            <span class="country-rank">${i + 1}</span>
            <span class="country-name">${name}</span>
            <div class="country-bar">
              <div class="country-bar-fill" style="width:${Math.round(count/max*100)}%"></div>
            </div>
            <span class="country-count">${count}</span>
          </div>`).join('');
      } catch(e) { container.innerHTML = '<p class="no-data">ERROR</p>'; }
    }

    // ── AGE & GENDER ──
    const AGE_GROUPS = [
      { label: '≤17',   min: 0,   max: 17  },
      { label: '18-24', min: 18,  max: 24  },
      { label: '25-34', min: 25,  max: 34  },
      { label: '35-49', min: 35,  max: 49  },
      { label: '50-64', min: 50,  max: 64  },
      { label: '65+',   min: 65,  max: 999 },
    ];

    async function loadDemographics() {
      if (!sb) return;
      let data = [];
      try {
        // Unique users only — one entry per user_uid (most recent vote)
        data = await loadUniqueUsers();
      } catch(e) { console.warn('Demographics error', e); }

      renderAge(data);
      renderGender(data);
    }

    function renderAge(data) {
      const withAge = data.filter(r => r.age && r.age > 0);
      const container = document.getElementById('age-bars');
      if (withAge.length === 0) {
        container.innerHTML = '<p class="no-data" data-i18n="no_age_data">NO AGE DATA YET</p>'; return;
      }
      const counts = AGE_GROUPS.map(g => ({
        label: g.label,
        count: withAge.filter(r => r.age >= g.min && r.age <= g.max).length
      }));
      const max = Math.max(...counts.map(c => c.count), 1);
      container.innerHTML = counts.map(c => `
        <div class="bar-row">
          <span class="bar-label">${c.label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(c.count/max*100)}%"></div>
          </div>
          <span class="bar-count">${c.count}</span>
        </div>`).join('');
    }

    function normalizeGender(g) {
      const v = (g || '').toLowerCase().trim();
      if (v === 'male'   || v === 'm' || v === 'homme') return 'MALE';
      if (v === 'female' || v === 'f' || v === 'femme') return 'FEMALE';
      return null;
    }

    function renderGender(data) {
      const container = document.getElementById('gender-pills');
      const groups = { MALE: 0, FEMALE: 0 };
      data.forEach(r => {
        const n = normalizeGender(r.gender);
        if (n) groups[n]++;
      });
      const total = groups.MALE + groups.FEMALE;
      if (total === 0) {
        container.innerHTML = '<p class="no-data" data-i18n="no_gender_data">NO GENDER DATA YET</p>'; return;
      }
      container.innerHTML = Object.entries(groups)
        .filter(([, count]) => count > 0)
        .sort((a, b) => b[1] - a[1])
        .map(([label, count]) => `
          <div class="gender-pill">
            <span class="pct">${Math.round(count / total * 100)}%</span>
            <span class="lbl">${label}</span>
          </div>`).join('');
    }

    // ── LEADERBOARD ──
    async function loadLeaderboard() {
      if (!sb) return;
      const container = document.getElementById('leaderboard-list');
      try {
        // Exclude blocked users (uses shared cache from getBlockedSet)
        const blockedSet = await getBlockedSet();

        // Fetch all votes (user_uid + country) — active users only
        const { data: votes, error: vErr } = await sb
          .from('peace_votes')
          .select('user_uid, country');
        if (vErr || !votes) { container.innerHTML = '<p class="no-data">NO DATA YET</p>'; return; }

        // Count votes per user, skipping blocked accounts
        const counts = {};
        const countries = {};
        votes.forEach(r => {
          if (!r.user_uid || blockedSet.has(r.user_uid)) return;
          counts[r.user_uid] = (counts[r.user_uid] || 0) + 1;
          if (r.country && !countries[r.user_uid]) countries[r.user_uid] = r.country;
        });

        // Fetch pseudos from peace_messages
        const { data: msgs } = await sb.from('peace_messages').select('user_uid, pseudo');
        const pseudoMap = {};
        (msgs || []).forEach(m => { if (m.user_uid) pseudoMap[m.user_uid] = m.pseudo; });

        const myUid = localStorage.getItem('nava_peace_uid') || '';
        const MEDALS = ['🥇','🥈','🥉'];

        // Sort by vote count desc, take top 10
        const sorted = Object.entries(counts)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);

        if (!sorted.length) { container.innerHTML = '<p class="no-data">NO DATA YET</p>'; return; }

        const max = sorted[0][1];
        container.innerHTML = sorted.map(([uid, count], i) => {
          const pseudo   = pseudoMap[uid] || '🕊 PEACE LOVER';
          const country  = countries[uid] || '';
          const flag     = countryToFlag(country);
          const isMe     = uid === myUid;
          const rowClass = i === 0 ? 'lb-top1' : i === 1 ? 'lb-top2' : i === 2 ? 'lb-top3' : '';
          const medal    = MEDALS[i] || `<span style="font-size:11px;color:rgba(255,255,255,0.5)">${i+1}</span>`;
          return `<div class="lb-row ${rowClass}">
            <span class="lb-medal">${medal}</span>
            <span class="lb-pseudo">${pseudo.toUpperCase()}</span>
            ${flag ? `<span class="lb-country">${flag}</span>` : ''}
            ${isMe ? '<span class="lb-you">YOU</span>' : ''}
            <span class="lb-doves"><span class="lb-doves-icon">🕊</span>${count}</span>
          </div>`;
        }).join('');
      } catch(e) { container.innerHTML = '<p class="no-data">ERROR</p>'; console.warn('Leaderboard error', e); }
    }

    function countryToFlag(name) {
      if (!name) return '';
      // Map common country names to ISO 3166-1 alpha-2 codes for flag emoji
      const MAP = {
        'FRANCE':'FR','UNITED STATES':'US','GERMANY':'DE','SPAIN':'ES','ITALY':'IT',
        'UNITED KINGDOM':'GB','BELGIUM':'BE','NETHERLANDS':'NL','PORTUGAL':'PT','BRAZIL':'BR',
        'CANADA':'CA','AUSTRALIA':'AU','JAPAN':'JP','CHINA':'CN','INDIA':'IN','RUSSIA':'RU',
        'SOUTH KOREA':'KR','MEXICO':'MX','ARGENTINA':'AR','SOUTH AFRICA':'ZA','EGYPT':'EG',
        'THAILAND':'TH','VIETNAM':'VN','INDONESIA':'ID','MALAYSIA':'MY','PHILIPPINES':'PH',
        'PAKISTAN':'PK','BANGLADESH':'BD','NIGERIA':'NG','KENYA':'KE','GHANA':'GH',
        'UKRAINE':'UA','POLAND':'PL','SWEDEN':'SE','NORWAY':'NO','DENMARK':'DK','FINLAND':'FI',
        'SWITZERLAND':'CH','AUSTRIA':'AT','GREECE':'GR','TURKEY':'TR','IRAN':'IR','IRAQ':'IQ',
        'SAUDI ARABIA':'SA','UAE':'AE','ISRAEL':'IL','PALESTINE':'PS','MYANMAR':'MM',
        'CAMBODIA':'KH','SINGAPORE':'SG','TAIWAN':'TW','HONG KONG':'HK','NEW ZEALAND':'NZ',
        'BARBADOS':'BB','VATICAN CITY':'VA','ALGERIA':'DZ','UKRAINE':'UA','COLOMBIA':'CO',
        'CHILE':'CL','PERU':'PE','VENEZUELA':'VE','MOROCCO':'MA','TUNISIA':'TN',
        'UNITED STATES':'US','USA':'US','UK':'GB',
      };
      const code = MAP[name.toUpperCase().trim()];
      if (!code) return '';
      // Convert country code to flag emoji using regional indicator letters
      return code.split('').map(c => String.fromCodePoint(0x1F1E6 + c.charCodeAt(0) - 65)).join('');
    }

    // ── INIT ──
    loadOverview();
    loadTopCountries();
    loadLeaderboard();
    loadDemographics();

    if (typeof applyLang === 'function') applyLang(detectLang());

    // ── Discovery dove — première visite STATS ────────────────────
    if (window.NAVA_DISCOVERY) {
      try { NAVA_DISCOVERY.check('stats', window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)); } catch(e) {}
    }
  </script>
