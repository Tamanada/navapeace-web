<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVA PEACE – Profile</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <style>
    @font-face {
      font-family: 'Nasalization';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('nasalization.woff') format('woff');
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase_config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      font-family: 'Nasalization', Arial, sans-serif;
    }

    body {
      font-family: 'Nasalization', Arial, sans-serif;
      background: radial-gradient(ellipse at 50% 30%, #6DD5F5 0%, #3AACDF 45%, #1E8EC4 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 110px;
      color: #fff;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .header img {
      width: 72px; height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 3px 10px rgba(255,255,255,0.4));
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 400;
      letter-spacing: 7px;
      text-shadow: 0 1px 16px rgba(255,255,255,0.4);
    }

    .header .tagline {
      font-size: 16px;
      letter-spacing: 3.5px;
      color: #F0EDE4;
      opacity: 0.8;
      margin-top: 4px;
    }

    /* ── SECTION CARD ── */
    .card {
      width: 100%;
      max-width: 600px;
      background: rgba(247,247,241,0.12);
      border: 1.5px solid rgba(255,255,255,0.35);
      border-radius: 24px;
      padding: 24px 28px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 8px 40px rgba(20,80,130,0.2);
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── BARS ── */
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .bar-label {
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      width: 70px;
      flex-shrink: 0;
      text-align: right;
    }

    .bar-track {
      flex: 1;
      height: 22px;
      background: rgba(255,255,255,0.1);
      border-radius: 11px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: rgba(255,255,255,0.75);
      border-radius: 11px;
      transition: width 1s ease;
      width: 0%;
    }

    .bar-count {
      font-size: 14px;
      letter-spacing: 1px;
      color: #fff;
      width: 36px;
      flex-shrink: 0;
      text-align: left;
    }

    /* ── GENDER PILLS ── */
    .gender-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .gender-pill {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 14px 20px;
      min-width: 110px;
    }

    .gender-pill .pct {
      font-size: 28px;
      letter-spacing: 1px;
      color: #fff;
    }

    .gender-pill .lbl {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* ── YOUR PROFILE ── */
    .my-profile {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .my-badge {
      background: rgba(255,255,255,0.15);
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 14px;
      padding: 12px 20px;
      text-align: center;
    }

    .my-badge .val {
      font-size: 24px;
      letter-spacing: 1px;
      color: #fff;
    }

    .my-badge .key {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
    }

    .no-data {
      text-align: center;
      font-size: 13px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.45);
      padding: 10px 0;
    }

    /* ── EDIT ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .card-header .section-title { margin-bottom: 0; }

    .edit-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 20px;
      color: rgba(255,255,255,0.75);
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .edit-btn:hover { background: rgba(255,255,255,0.25); }

    .edit-form {
      display: none;
      flex-direction: column;
      gap: 14px;
      margin-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 20px;
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .edit-field label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    .edit-field input,
    .edit-field select {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      color: #fff;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 14px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .edit-field input::placeholder { color: rgba(255,255,255,0.3); }
    .edit-field input:focus,
    .edit-field select:focus { border-color: rgba(255,255,255,0.65); }

    .edit-field select option {
      background: #1E8EC4;
      color: #fff;
    }

    .save-btn {
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 12px;
      color: #1A6E96;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .save-btn:hover { opacity: 0.88; }

    /* ── INVITE FRIENDS ── */
    .invite-link-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }

    .invite-link-row span {
      flex: 1;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.85);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 8px;
      color: #1A6E96;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .copy-btn:hover { opacity: 0.85; }

    .qr-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .qr-wrap > div {
      border-radius: 12px;
      overflow: hidden;
      padding: 10px;
      background: #fff;
    }

    .share-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: 20px;
      font-family: 'Nasalization', Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      transition: opacity 0.2s, transform 0.15s;
    }

    .share-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .share-btn.wa  { background: #25D366; }
    .share-btn.tg  { background: #229ED9; }
    .share-btn.tw  { background: #000; }
    .share-btn.sms { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); }

    .points-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 18px;
    }

    .points-num {
      font-size: 48px;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }

    .points-lbl {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .referrals-lbl {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    .points-row-dual {
      display: flex;
      gap: 0;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .points-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .points-divider {
      width: 1px;
      height: 70px;
      background: rgba(255,255,255,0.2);
      flex-shrink: 0;
      margin: 0 12px;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(20, 90, 140, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.2);
      padding: 10px 0 24px;
      z-index: 200;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-item.active { color: #fff; }
    .nav-item svg { width: 26px; height: 26px; fill: currentColor; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="logo.png" alt="NAVA PEACE" />
    <h1>NAVA PEACE</h1>
    <p class="tagline">COMMUNITY PROFILE</p>
  </div>

  <!-- YOUR PROFILE -->
  <div class="card" id="my-card">
    <div class="card-header">
      <p class="section-title">YOUR PROFILE</p>
      <button class="edit-btn" onclick="toggleEdit()">EDIT</button>
    </div>
    <div class="my-profile" id="my-profile">
      <p class="no-data">VOTE FIRST TO SEE YOUR PROFILE</p>
    </div>

    <!-- EDIT FORM -->
    <div class="edit-form" id="edit-form">
      <div class="edit-field">
        <label>COUNTRY (2-letter code)</label>
        <input id="edit-country" type="text" maxlength="2" placeholder="FR" />
      </div>
      <div class="edit-field">
        <label>AGE</label>
        <input id="edit-age" type="number" min="1" max="120" placeholder="25" />
      </div>
      <div class="edit-field">
        <label>GENDER</label>
        <select id="edit-gender">
          <option value="">— SELECT —</option>
          <option value="male">MALE</option>
          <option value="female">FEMALE</option>
        </select>
      </div>
      <button class="save-btn" onclick="saveProfile()">SAVE</button>
    </div>
  </div>

  <!-- INVITE FRIENDS -->
  <div class="card" id="invite-card">
    <p class="section-title">INVITE FRIENDS</p>

    <div class="invite-link-row">
      <span id="ref-link-display">GENERATING LINK...</span>
      <button class="copy-btn" onclick="copyLink()">COPY</button>
    </div>

    <div class="qr-wrap">
      <div id="qrcode"></div>
    </div>

    <div class="share-row">
      <a class="share-btn wa" id="share-wa" href="#" target="_blank">🕊 WHATSAPP</a>
      <a class="share-btn tg" id="share-tg" href="#" target="_blank">🕊 TELEGRAM</a>
      <a class="share-btn tw" id="share-tw" href="#" target="_blank">🕊 X</a>
      <a class="share-btn sms" id="share-sms" href="#">🕊 SMS</a>
    </div>

    <div class="points-box">
      <div class="points-row-dual">
        <div class="points-col">
          <span class="points-num" id="ref-friends">—</span>
          <span class="points-lbl">FRIENDS</span>
          <span class="referrals-lbl">INVITED</span>
        </div>
        <div class="points-divider"></div>
        <div class="points-col">
          <span class="points-num" id="ref-points">—</span>
          <span class="points-lbl">PEACE POINTS</span>
          <span class="referrals-lbl">FROM THEIR ACTIONS</span>
        </div>
      </div>
    </div>
  </div>

  <!-- AGE DISTRIBUTION -->
  <div class="card">
    <p class="section-title">AGE DISTRIBUTION</p>
    <div id="age-bars">
      <p class="no-data">LOADING...</p>
    </div>
  </div>

  <!-- GENDER DISTRIBUTION -->
  <div class="card">
    <p class="section-title">GENDER DISTRIBUTION</p>
    <div class="gender-row" id="gender-pills">
      <p class="no-data">LOADING...</p>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <a href="peace.html" class="nav-item">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.8"/><line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
      <span>PEACE</span>
    </a>
    <a href="map.html" class="nav-item">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      <span>MAP</span>
    </a>
    <a href="profile.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <span>PROFILE</span>
    </a>
  </nav>

  <script>
  // ── Your personal profile (localStorage) ────────────────────────
  function renderMyProfile() {
    const country  = localStorage.getItem('nava_peace_country');
    const age      = localStorage.getItem('nava_peace_age');
    const gender   = localStorage.getItem('nava_peace_gender');
    const days     = localStorage.getItem('nava_peace_days');

    const container = document.getElementById('my-profile');
    container.innerHTML = '';

    if (!country && !age) {
      container.innerHTML = '<p class="no-data">VOTE FIRST TO SEE YOUR PROFILE</p>';
      return;
    }

    if (country) container.innerHTML += `
      <div class="my-badge"><div class="val">${country.toUpperCase()}</div><div class="key">COUNTRY</div></div>`;
    if (age && age !== 'null') container.innerHTML += `
      <div class="my-badge"><div class="val">${age}</div><div class="key">AGE</div></div>`;
    if (gender && gender !== 'null') container.innerHTML += `
      <div class="my-badge"><div class="val">${gender.toUpperCase()}</div><div class="key">GENDER</div></div>`;
    if (days) container.innerHTML += `
      <div class="my-badge"><div class="val">${days}</div><div class="key">DAYS</div></div>`;
  }

  function toggleEdit() {
    const form = document.getElementById('edit-form');
    const open = form.style.display === 'flex';
    if (!open) {
      // Pre-fill with current values
      document.getElementById('edit-country').value = (localStorage.getItem('nava_peace_country') || '').toUpperCase();
      document.getElementById('edit-age').value     = localStorage.getItem('nava_peace_age') || '';
      document.getElementById('edit-gender').value  = localStorage.getItem('nava_peace_gender') || '';
    }
    form.style.display = open ? 'none' : 'flex';
    document.querySelector('.edit-btn').textContent = open ? 'EDIT' : 'CANCEL';
  }

  function saveProfile() {
    const country = document.getElementById('edit-country').value.trim().toUpperCase();
    const age     = document.getElementById('edit-age').value.trim();
    const gender  = document.getElementById('edit-gender').value;

    if (country) localStorage.setItem('nava_peace_country', country);
    if (age)     localStorage.setItem('nava_peace_age', age);
    if (gender)  localStorage.setItem('nava_peace_gender', gender);

    renderMyProfile();
    document.getElementById('edit-form').style.display = 'none';
    document.querySelector('.edit-btn').textContent = 'EDIT';
  }

  renderMyProfile();

  // ── Age groups ───────────────────────────────────────────────────
  const AGE_GROUPS = [
    { label: '≤17',   min: 0,   max: 17  },
    { label: '18-24', min: 18,  max: 24  },
    { label: '25-34', min: 25,  max: 34  },
    { label: '35-49', min: 35,  max: 49  },
    { label: '50-64', min: 50,  max: 64  },
    { label: '65+',   min: 65,  max: 999 },
  ];

  // ── Load from Supabase ───────────────────────────────────────────
  async function loadStats() {
    let data = [];
    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const { data: rows, error } = await sb
        .from('peace_votes')
        .select('age, gender')
        .not('country', 'is', null);
      if (!error && rows) data = rows;
    } catch(e) { console.warn('Supabase error', e); }

    renderAge(data);
    renderGender(data);
  }

  function renderAge(data) {
    const withAge = data.filter(r => r.age && r.age > 0);
    const container = document.getElementById('age-bars');
    if (withAge.length === 0) {
      container.innerHTML = '<p class="no-data">NO AGE DATA YET</p>'; return;
    }

    const counts = AGE_GROUPS.map(g => ({
      label: g.label,
      count: withAge.filter(r => r.age >= g.min && r.age <= g.max).length
    }));
    const max = Math.max(...counts.map(c => c.count), 1);

    container.innerHTML = counts.map(c => `
      <div class="bar-row">
        <span class="bar-label">${c.label}</span>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.round(c.count/max*100)}%"></div>
        </div>
        <span class="bar-count">${c.count}</span>
      </div>`).join('');
  }

  function normalizeGender(g) {
    const v = (g || '').toLowerCase().trim();
    if (v === 'male'   || v === 'm' || v === 'homme') return 'MALE';
    if (v === 'female' || v === 'f' || v === 'femme') return 'FEMALE';
    return null; // ignore anything else
  }

  function renderGender(data) {
    const container = document.getElementById('gender-pills');
    const groups = { MALE: 0, FEMALE: 0 };

    data.forEach(r => {
      const n = normalizeGender(r.gender);
      if (n) groups[n]++;
    });

    const total = groups.MALE + groups.FEMALE;
    if (total === 0) {
      container.innerHTML = '<p class="no-data">NO GENDER DATA YET</p>'; return;
    }

    container.innerHTML = Object.entries(groups)
      .filter(([, count]) => count > 0)
      .sort((a, b) => b[1] - a[1])
      .map(([label, count]) => `
        <div class="gender-pill">
          <span class="pct">${Math.round(count / total * 100)}%</span>
          <span class="lbl">${label}</span>
        </div>`).join('');
  }

  loadStats();

  // ── INVITE FRIENDS ───────────────────────────────────────────────
  (function initInvite() {
    const BASE    = 'https://nava-peace.app';
    let refCode   = localStorage.getItem('nava_peace_ref_code');

    // Generate one if missing (existing users without registration flow)
    if (!refCode) {
      refCode = Math.random().toString(36).slice(2, 10).toUpperCase();
      localStorage.setItem('nava_peace_ref_code', refCode);
    }

    const inviteURL = BASE + '/?ref=' + refCode;
    const msg       = encodeURIComponent('🕊 I choose PEACE every day. Join me: ' + inviteURL);

    // Show link
    document.getElementById('ref-link-display').textContent = inviteURL;

    // QR code
    new QRCode(document.getElementById('qrcode'), {
      text: inviteURL, width: 140, height: 140,
      colorDark: '#1A6E96', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });

    // Share links
    document.getElementById('share-wa').href  = 'https://wa.me/?text=' + msg;
    document.getElementById('share-tg').href  = 'https://t.me/share/url?url=' + encodeURIComponent(inviteURL) + '&text=' + encodeURIComponent('🕊 I choose PEACE every day. Join me!');
    document.getElementById('share-tw').href  = 'https://x.com/intent/tweet?text=' + msg;
    document.getElementById('share-sms').href = 'sms:?body=' + msg;

    // Load peace points
    loadPeacePoints(refCode);
  })();

  function copyLink() {
    const link = 'https://nava-peace.app/?ref=' + localStorage.getItem('nava_peace_ref_code');
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ COPIED';
      setTimeout(() => btn.textContent = 'COPY', 2000);
    });
  }

  async function loadPeacePoints(refCode) {
    if (!refCode) return;
    try {
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Peace points = rows in referral_points for this referrer
      const { data: pts } = await sb
        .from('referral_points')
        .select('id')
        .eq('referral_code', refCode);

      // Referred users = rows in peace_votes where referred_by = refCode
      const { data: friends } = await sb
        .from('peace_votes')
        .select('id')
        .eq('referred_by', refCode);

      const ptsCount     = pts     ? pts.length     : 0;
      const friendsCount = friends ? friends.length : 0;

      document.getElementById('ref-points').textContent  = ptsCount;
      document.getElementById('ref-friends').textContent = friendsCount;
    } catch(e) { console.warn('Peace points error', e); }
  }
  </script>
</body>
</html>
